<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨讀器 PureReader</title>
    <meta name="description" content="過濾廣告，還原乾淨的網頁閱讀體驗。貼上網址，自動提取正文與圖片。">

    <!-- PWA -->
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="./icons/pureReader-192.svg">
    <link rel="apple-touch-icon" href="./icons/pureReader-192.svg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="淨讀器">
    <meta name="theme-color" content="#3b82f6">

    <!-- Tailwind CSS with Typography Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>

    <!-- Mozilla Readability (Extracts article content) -->
    <script src="https://unpkg.com/@mozilla/readability/Readability.js"></script>
    <!-- DOMPurify (Sanitizes HTML to remove malicious scripts/ads) -->
    <script src="https://unpkg.com/dompurify@3.0.6/dist/purify.min.js"></script>

    <style>
        /* Hide scrollbar for a cleaner look but keep functionality */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* Smooth transitions */
        body { transition: background-color 0.3s ease, color 0.3s ease; }

        /* Typography adjustments for images */
        .prose img {
            border-radius: 0.5rem;
            margin-left: auto;
            margin-right: auto;
            max-height: 60vh;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col font-sans">

    <!-- Navigation / Header -->
    <header class="sticky top-0 z-10 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700 shadow-sm">
        <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
            <h1 class="text-xl font-bold tracking-tight text-blue-500 flex items-center gap-2 cursor-pointer" onclick="resetView()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                淨讀器
            </h1>

            <div class="flex items-center gap-3">
                <!-- Font Size Controls (Visible only when reading) -->
                <div id="font-controls" class="hidden flex items-center gap-1 bg-gray-100 dark:bg-gray-700 rounded-full px-2 py-1">
                    <button onclick="changeFontSize(-1)" class="p-1 hover:text-blue-500 transition-colors" title="縮小字體">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path></svg>
                    </button>
                    <span class="text-xs font-medium px-1">A</span>
                    <button onclick="changeFontSize(1)" class="p-1 hover:text-blue-500 transition-colors" title="放大字體">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
                    </button>
                </div>

                <!-- Dark Mode Toggle -->
                <button id="theme-toggle" onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" title="切換深淺模式">
                    <svg id="theme-icon-sun" class="hidden w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2"></path><path d="M12 20v2"></path>
                        <path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path>
                        <path d="M2 12h2"></path><path d="M20 12h2"></path>
                        <path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path>
                    </svg>
                    <svg id="theme-icon-moon" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 max-w-3xl w-full mx-auto px-4 py-6 flex flex-col relative">

        <!-- Install PWA Banner -->
        <div id="install-banner" class="hidden mb-6 bg-blue-50 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-800 rounded-lg p-4 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="text-sm">
                <p class="font-bold mb-1 text-blue-700 dark:text-blue-300">取得更好的體驗</p>
                <p class="text-gray-600 dark:text-gray-300">將「淨讀器」安裝到桌面，即可在瀏覽器分享選單中直接將網頁傳送至此閱讀！</p>
            </div>
            <button onclick="installPWA()" class="whitespace-nowrap px-4 py-2 bg-blue-500 text-white text-sm font-medium rounded-md hover:bg-blue-600 shadow-sm transition-colors">
                安裝應用程式
            </button>
        </div>

        <!-- Input Section -->
        <div id="input-section" class="flex flex-col items-center justify-center py-10 flex-1">
            <div class="w-full max-w-lg bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6 sm:p-8 border border-gray-100 dark:border-gray-700 text-center">
                <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/50 rounded-2xl flex items-center justify-center mx-auto mb-6 text-blue-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold mb-2">貼上網址開始閱讀</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm mb-6">或將網頁分享至此應用程式，自動為您提取乾淨的正文與圖片。</p>

                <form id="url-form" class="flex flex-col gap-3" onsubmit="handleUrlSubmit(event)">
                    <input type="url" id="url-input" placeholder="https://example.com/article" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                    <button type="submit" id="submit-btn" class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-lg shadow-md transition-all flex justify-center items-center gap-2">
                        <span>解析並淨化網頁</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
                    </button>
                </form>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading-section" class="hidden flex-1 flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
            <p class="text-gray-500 dark:text-gray-400 animate-pulse">正在提取正文，過濾廣告中…</p>
        </div>

        <!-- Error State -->
        <div id="error-section" class="hidden mb-6 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-lg p-4 text-center">
            <p id="error-message" class="text-red-600 dark:text-red-400 font-medium"></p>
            <button onclick="resetView()" class="mt-3 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">返回重試</button>
        </div>

        <!-- Article Display Area -->
        <article id="article-section" class="hidden w-full pb-20">
            <div class="mb-8 border-b border-gray-200 dark:border-gray-800 pb-6">
                <h1 id="article-title" class="text-3xl sm:text-4xl font-extrabold leading-tight mb-4"></h1>
                <div class="flex flex-wrap items-center gap-4 text-sm text-gray-500 dark:text-gray-400">
                    <div id="article-author" class="hidden flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <span></span>
                    </div>
                    <div id="article-domain" class="flex items-center gap-1 bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded-md">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                        <a id="article-source-link" href="#" target="_blank" rel="noopener noreferrer" class="hover:text-blue-500 transition-colors"></a>
                    </div>

                    <!-- 複製全文按鈕 -->
                    <button onclick="copyArticleText()" id="copy-btn" class="flex items-center gap-1 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-1 rounded-md transition-colors cursor-pointer ml-auto sm:ml-0">
                        <svg id="copy-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
                            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
                        </svg>
                        <span id="copy-text">複製全文</span>
                    </button>

                    <!-- 分享 / 在瀏覽器開啟按鈕 -->
                    <button onclick="shareArticle()" id="share-btn" title="分享原始網址 / 在其他瀏覽器開啟"
                        class="flex items-center gap-1 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-1 rounded-md transition-colors cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                            <polyline points="16 6 12 2 8 6"></polyline>
                            <line x1="12" y1="2" x2="12" y2="15"></line>
                        </svg>
                        <span id="share-text">分享網址</span>
                    </button>
                </div>
            </div>

            <!-- Dynamic content injected here by renderArticle() -->
            <div id="article-content" class="prose dark:prose-invert max-w-none prose-lg md:prose-xl prose-img:rounded-xl"></div>
        </article>

    </main>

    <script>
        // ─── PWA Install Prompt ────────────────────────────────────────────────
        let deferredPrompt = null;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').classList.remove('hidden');
        });

        async function installPWA() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('install-banner').classList.add('hidden');
            }
            deferredPrompt = null;
        }

        // ─── Theme ────────────────────────────────────────────────────────────
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                document.getElementById('theme-icon-sun').classList.add('hidden');
                document.getElementById('theme-icon-moon').classList.remove('hidden');
                localStorage.setItem('pureReader-theme', 'light');
            } else {
                html.classList.add('dark');
                document.getElementById('theme-icon-sun').classList.remove('hidden');
                document.getElementById('theme-icon-moon').classList.add('hidden');
                localStorage.setItem('pureReader-theme', 'dark');
            }
        }

        function initTheme() {
            const saved = localStorage.getItem('pureReader-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon-sun').classList.remove('hidden');
                document.getElementById('theme-icon-moon').classList.add('hidden');
            }
        }

        // ─── Font Size ────────────────────────────────────────────────────────
        function changeFontSize(step) {
            const content = document.getElementById('article-content');
            const title   = document.getElementById('article-title');

            const proseClasses = ['prose-sm', 'prose-base', 'prose-lg', 'prose-xl', 'prose-2xl'];
            const titleClasses = ['text-xl', 'text-2xl', 'text-3xl', 'text-4xl', 'text-5xl'];
            const titleSmClasses = ['sm:text-2xl', 'sm:text-3xl', 'sm:text-4xl', 'sm:text-5xl', 'sm:text-6xl'];

            // Remove responsive override so manual sizing takes full effect
            content.classList.remove('md:prose-xl');

            let idx = proseClasses.findIndex(c => content.classList.contains(c));
            if (idx === -1) idx = 2; // default: prose-lg

            const newIdx = idx + step;
            if (newIdx >= 0 && newIdx < proseClasses.length) {
                proseClasses.forEach(c => content.classList.remove(c));
                content.classList.add(proseClasses[newIdx]);

                titleClasses.forEach(c => title.classList.remove(c));
                titleSmClasses.forEach(c => title.classList.remove(c));
                title.classList.add(titleClasses[newIdx], titleSmClasses[newIdx]);
            }
        }

        // ─── UI State Helpers ─────────────────────────────────────────────────
        function showSection(id) {
            ['input-section', 'loading-section', 'error-section', 'article-section'].forEach(s => {
                const el = document.getElementById(s);
                el.classList.add('hidden');
                el.classList.remove('flex');
            });
            const target = document.getElementById(id);
            target.classList.remove('hidden');
            if (id === 'input-section' || id === 'loading-section') {
                target.classList.add('flex');
            }
        }

        function showLoading() {
            document.getElementById('font-controls').classList.add('hidden');
            showSection('loading-section');
        }

        function resetView() {
            document.getElementById('font-controls').classList.add('hidden');
            showSection('input-section');
            window.history.replaceState({}, document.title, window.location.pathname);
            document.getElementById('url-input').value = '';
        }

        function showError(msg) {
            showSection('error-section');
            document.getElementById('error-message').innerText = msg;
        }

        // ─── Core: Extract + Render ───────────────────────────────────────────
        async function extractArticle(url) {
            showLoading();
            try {
                new URL(url); // Validate URL

                let htmlContent = null;

                const proxies = [
                    {
                        url: `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
                        parse: async (res) => (await res.json()).contents
                    },
                    {
                        url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
                        parse: async (res) => await res.text()
                    }
                ];

                for (const proxy of proxies) {
                    try {
                        const response = await fetch(proxy.url);
                        if (response.ok) {
                            htmlContent = await proxy.parse(response);
                            if (htmlContent) break;
                        }
                    } catch (e) {
                        console.warn('[pureReader] Proxy failed:', proxy.url, e);
                    }
                }

                if (!htmlContent) {
                    throw new Error('無法獲取網頁內容，該網站可能啟用了高強度的防爬蟲機制（例如 Cloudflare），或代理伺服器目前無法連線。');
                }

                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');

                // Pre-clean
                doc.querySelectorAll([
                    'script', 'noscript', 'style', 'iframe', 'nav', 'footer', 'aside',
                    '[class*="ad"]', '[id*="ad"]', '[class*="popup"]', '[class*="modal"]'
                ].join(',')).forEach(el => el.remove());

                const reader = new Readability(doc);
                const article = reader.parse();

                if (!article || !article.content) {
                    throw new Error('自動提取正文失敗。該網頁可能不是標準文章格式，或內容被隱藏。');
                }

                renderArticle(article, url);

            } catch (error) {
                console.error('[pureReader] Extraction error:', error);
                showError(error.message || '發生未知錯誤，請確認網址是否正確且公開可存取。');
            }
        }

        function renderArticle(article, originalUrl) {
            const titleEl      = document.getElementById('article-title');
            const authorEl     = document.getElementById('article-author');
            const sourceLinkEl = document.getElementById('article-source-link');
            const contentEl    = document.getElementById('article-content');

            titleEl.textContent = article.title || '無標題';

            if (article.byline) {
                authorEl.classList.remove('hidden');
                authorEl.querySelector('span').textContent = article.byline.trim();
            } else {
                authorEl.classList.add('hidden');
            }

            try {
                const domain = new URL(originalUrl).hostname;
                sourceLinkEl.textContent = domain;
                sourceLinkEl.href = originalUrl;
            } catch (e) {
                sourceLinkEl.textContent = '來源網址';
                sourceLinkEl.href = originalUrl;
            }

            const cleanHTML = DOMPurify.sanitize(article.content, {
                USE_PROFILES: { html: true },
                ADD_TAGS: ['img', 'figure', 'figcaption'],
                FORBID_TAGS: ['script', 'style', 'iframe', 'form', 'input']
            });

            contentEl.innerHTML = cleanHTML;

            // Fix relative image URLs & add lazy loading
            const baseUri = new URL(originalUrl).origin;
            contentEl.querySelectorAll('img').forEach(img => {
                const src = img.getAttribute('src');
                if (src && !src.startsWith('http') && !src.startsWith('data:')) {
                    try { img.src = new URL(src, baseUri).href; } catch (e) {}
                }
                img.setAttribute('loading', 'lazy');
                img.removeAttribute('width');
                img.removeAttribute('height');
            });

            showSection('article-section');
            document.getElementById('font-controls').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        // ─── Copy Full Text ───────────────────────────────────────────────────
        function copyArticleText() {
            const title     = document.getElementById('article-title').innerText;
            const content   = document.getElementById('article-content').innerText;
            const sourceUrl = document.getElementById('article-source-link').href;
            const fullText  = `【${title}】\n來源：${sourceUrl}\n\n${content}`;

            const copyBtn  = document.getElementById('copy-btn');
            const copyText = document.getElementById('copy-text');

            navigator.clipboard.writeText(fullText).then(() => {
                copyText.innerText = '已複製！';
                copyBtn.classList.add('text-green-600', 'dark:text-green-400');
                setTimeout(() => {
                    copyText.innerText = '複製全文';
                    copyBtn.classList.remove('text-green-600', 'dark:text-green-400');
                }, 2000);
            }).catch(() => {
                // Fallback for PWA/iframe environments
                const ta = document.createElement('textarea');
                ta.value = fullText;
                ta.style.position = 'fixed';
                ta.style.opacity  = '0';
                document.body.appendChild(ta);
                ta.select();
                try {
                    document.execCommand('copy');
                    copyText.innerText = '已複製！';
                    setTimeout(() => { copyText.innerText = '複製全文'; }, 2000);
                } catch (err) {
                    copyText.innerText = '複製失敗';
                    setTimeout(() => { copyText.innerText = '複製全文'; }, 2000);
                }
                document.body.removeChild(ta);
            });
        }

        // ─── Share Original URL ───────────────────────────────────────────────
        // Uses Web Share API (system share sheet) so the user can pick any
        // browser or app. Falls back to window.open when unsupported.
        async function shareArticle() {
            const title     = document.getElementById('article-title').innerText;
            const sourceUrl = document.getElementById('article-source-link').href;
            const shareText = document.getElementById('share-text');

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: title,
                        text:  '在淨讀器中看到這篇文章，分享給你：',
                        url:   sourceUrl
                    });
                    // Brief visual feedback after share sheet closes
                    shareText.innerText = '已分享！';
                    setTimeout(() => { shareText.innerText = '分享網址'; }, 2000);
                } catch (err) {
                    // User cancelled — no feedback needed
                    if (err.name !== 'AbortError') console.warn('[pureReader] share failed:', err);
                }
            } else {
                // Fallback: open original URL in a new (full) browser tab
                window.open(sourceUrl, '_blank', 'noopener,noreferrer');
                shareText.innerText = '已開啟！';
                setTimeout(() => { shareText.innerText = '分享網址'; }, 2000);
            }
        }

        // ─── URL Form ─────────────────────────────────────────────────────────
        function handleUrlSubmit(e) {
            e.preventDefault();
            const url = document.getElementById('url-input').value.trim();
            if (url) extractArticle(url);
        }

        // ─── Init ─────────────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', () => {
            initTheme();

            // Handle Web Share Target (GET params)
            const params = new URLSearchParams(window.location.search);
            let sharedUrl = params.get('url') || params.get('text') || '';

            // Some apps send a full URL inside the text param
            if (sharedUrl && !sharedUrl.startsWith('http')) {
                const match = sharedUrl.match(/(https?:\/\/[^\s]+)/);
                if (match) sharedUrl = match[1];
            }

            if (sharedUrl && sharedUrl.startsWith('http')) {
                document.getElementById('url-input').value = sharedUrl;
                extractArticle(sharedUrl);
            }
        });
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () =>
                navigator.serviceWorker.register('./sw.js')
                    .catch(err => console.warn('[pureReader SW] Registration failed:', err))
            );
        }
    </script>
</body>
