<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="pureReaderBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pureReaderPage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#eff6ff;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background (blue) -->
  <rect width="192" height="192" rx="38" ry="38" fill="url(#pureReaderBg)"/>

  <!-- Left page of open book -->
  <path d="M96 60 C96 60 60 58 38 66 L38 140 C60 132 96 134 96 134 Z"
        fill="url(#pureReaderPage)" opacity="0.95"/>

  <!-- Right page of open book -->
  <path d="M96 60 C96 60 132 58 154 66 L154 140 C132 132 96 134 96 134 Z"
        fill="url(#pureReaderPage)" opacity="0.85"/>

  <!-- Spine line -->
  <line x1="96" y1="60" x2="96" y2="134" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>

  <!-- Text lines on left page -->
  <line x1="52" y1="84" x2="88" y2="82" stroke="#93c5fd" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="52" y1="96" x2="88" y2="94" stroke="#93c5fd" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="52" y1="108" x2="80" y2="106" stroke="#93c5fd" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <!-- Text lines on right page -->
  <line x1="104" y1="82" x2="140" y2="84" stroke="#bfdbfe" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="104" y1="94" x2="140" y2="96" stroke="#bfdbfe" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="104" y1="106" x2="132" y2="108" stroke="#bfdbfe" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
</svg>
