<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="102" ry="102" fill="url(#bg)"/>

  <!-- Trophy cup body -->
  <path d="M192 118 h128 v138 c0 58 -32 90 -64 100 c-32 -10 -64 -42 -64 -100 Z"
        fill="url(#trophy)" opacity="0.95"/>

  <!-- Trophy handles -->
  <path d="M192 148 Q118 148 118 202 Q118 256 170 256"
        fill="none" stroke="url(#trophy)" stroke-width="26" stroke-linecap="round" opacity="0.95"/>
  <path d="M320 148 Q394 148 394 202 Q394 256 342 256"
        fill="none" stroke="url(#trophy)" stroke-width="26" stroke-linecap="round" opacity="0.95"/>

  <!-- Trophy stem -->
  <rect x="234" y="356" width="44" height="50" rx="8" fill="url(#trophy)" opacity="0.95"/>

  <!-- Trophy base -->
  <rect x="182" y="400" width="148" height="28" rx="14" fill="url(#trophy)" opacity="0.95"/>

  <!-- Score lines on cup -->
  <line x1="218" y1="186" x2="294" y2="186" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.55"/>
  <line x1="218" y1="218" x2="294" y2="218" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.55"/>
  <line x1="218" y1="250" x2="278" y2="250" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.55"/>
</svg>
