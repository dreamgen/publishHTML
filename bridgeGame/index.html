<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>橋牌單機遊戲</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="./icons/bridgeGame-192.svg">
    <link rel="apple-touch-icon" href="./icons/bridgeGame-192.svg">
    <meta name="theme-color" content="#15803d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="橋牌">
    <meta name="description" content="橋牌單人練習版，含競叫、打牌、橡皮橋計分，支援離線遊玩">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            transition: font-size 0.3s ease; /* 讓切換字體大小時有平滑動畫 */
        }
        #root {
            height: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #065f46 0%, #022c22 100%);
        }
        .min-h-screen { min-height: 100dvh; }

        /* Glass morphism */
        .glass-panel {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .glass-light {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Card animations */
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        @media (hover: hover) {
            .card-hover:hover { transform: translateY(-12px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 50; }
        }
        .card-selected { transform: translateY(-20px) scale(1.05) !important; box-shadow: 0 15px 35px rgba(250,204,21,0.6) !important; z-index: 100 !important; }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

        @keyframes pulseRing {
            0%, 100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.6); }
            70%       { box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); }
        }
        .pulse-ring { animation: pulseRing 1.2s ease-in-out infinite; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in { animation: fadeIn 0.25s ease-out; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
    </style>
</head>

<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ══════════════════════════════════════════════════════════════
        // 常數
        // ══════════════════════════════════════════════════════════════
        const SUITS = ['S', 'H', 'D', 'C'];
        const RANKS = [14, 13, 12, 11, 10, 9, 8, 7, 6, 5, 4, 3, 2];
        const SUIT_SYMBOL = { S: '♠', H: '♥', D: '♦', C: '♣' };
        const SUIT_COLOR_CSS  = { S: '#020617', H: '#dc2626', D: '#ea580c', C: '#15803d' };
        const SUIT_COLOR_DARK_BG = { S: '#f8fafc', H: '#ef4444', D: '#f97316', C: '#4ade80' };
        const RANK_LABEL  = { 14:'A', 13:'K', 12:'Q', 11:'J', 10:'10', 9:'9', 8:'8', 7:'7', 6:'6', 5:'5', 4:'4', 3:'3', 2:'2' };
        const STRAINS = ['C', 'D', 'H', 'S', 'N'];
        const STRAIN_SYMBOL = { C:'♣', D:'♦', H:'♥', S:'♠', N:'NT' };
        const SEAT_NAME = ['北', '東', '南', '西'];
        const SUIT_ORDER = { S: 0, H: 1, D: 2, C: 3 };

        function buildDeck() {
            const deck = [];
            let id = 0;
            for (const suit of SUITS) {
                for (const rank of RANKS) {
                    deck.push({ id: id++, suit, rank });
                }
            }
            return deck;
        }

        function shuffle(deck) {
            const d = [...deck];
            for (let i = d.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [d[i], d[j]] = [d[j], d[i]];
            }
            return d;
        }

        function sortHand(cards) {
            return [...cards].sort((a, b) =>
                SUIT_ORDER[a.suit] !== SUIT_ORDER[b.suit]
                    ? SUIT_ORDER[a.suit] - SUIT_ORDER[b.suit]
                    : b.rank - a.rank
            );
        }

        function calcHCP(cards) {
            return cards.reduce((sum, c) => {
                if (c.rank === 14) return sum + 4;
                if (c.rank === 13) return sum + 3;
                if (c.rank === 12) return sum + 2;
                if (c.rank === 11) return sum + 1;
                return sum;
            }, 0);
        }

        function suitLengths(cards) {
            return cards.reduce((acc, c) => {
                acc[c.suit] = (acc[c.suit] || 0) + 1;
                return acc;
            }, { S: 0, H: 0, D: 0, C: 0 });
        }

        function isBalanced(lengths) {
            const vals = Object.values(lengths).sort((a, b) => b - a);
            if (vals[0] > 5) return false;
            if (vals[0] === 5 && vals[1] > 3) return false;
            const hasSingleton = vals.some(v => v <= 1);
            if (hasSingleton) return false;
            return true;
        }

        function bidValue(bidStr) {
            if (['pass', 'dbl', 'rdbl'].includes(bidStr)) return 0;
            const level = parseInt(bidStr[0]);
            const strain = bidStr.slice(1);
            return (level - 1) * 5 + STRAINS.indexOf(strain) + 1;
        }

        function isAuctionOver(sequence) {
            if (sequence.length < 4) return false;
            const calls = sequence.map(b => b.call);
            if (sequence.length === 4 && calls.every(c => c === 'pass')) return 'passedOut';
            if (sequence.length >= 4) {
                const last3 = calls.slice(-3);
                const hasRealBid = calls.some(c => !['pass', 'dbl', 'rdbl'].includes(c));
                if (hasRealBid && last3.every(c => c === 'pass')) return 'contract';
            }
            return false;
        }

        function extractContract(sequence) {
            let lastBid = null;
            let doubled = 0;
            for (const entry of sequence) {
                if (!['pass', 'dbl', 'rdbl'].includes(entry.call)) {
                    lastBid = entry;
                    doubled = 0;
                } else if (entry.call === 'dbl') {
                    doubled = 1;
                } else if (entry.call === 'rdbl') {
                    doubled = 2;
                }
            }
            if (!lastBid) return null;
            const strain = lastBid.call.slice(1);
            const level  = parseInt(lastBid.call[0]);
            const side   = lastBid.seat % 2;
            let declarerSeat = lastBid.seat;
            for (const entry of sequence) {
                if (entry.seat % 2 === side && !['pass', 'dbl', 'rdbl'].includes(entry.call) && entry.call.slice(1) === strain) {
                    declarerSeat = entry.seat;
                    break;
                }
            }
            return { level, strain, declarer: declarerSeat, doubled };
        }

        function canDoubleNow(sequence, humanSeat) {
            const nonPasses = sequence.filter(b => b.call !== 'pass');
            if (!nonPasses.length) return false;
            const last = nonPasses[nonPasses.length - 1];
            if (['dbl', 'rdbl'].includes(last.call)) return false;
            return last.seat % 2 !== humanSeat % 2;
        }

        function canRedoubleNow(sequence, humanSeat) {
            const nonPasses = sequence.filter(b => b.call !== 'pass');
            if (!nonPasses.length) return false;
            const last = nonPasses[nonPasses.length - 1];
            if (last.call !== 'dbl') return false;
            return last.seat % 2 !== humanSeat % 2;
        }

        function getCurrentHighestBid(sequence) {
            const realBids = sequence.filter(b => !['pass', 'dbl', 'rdbl'].includes(b.call));
            return realBids.length ? realBids[realBids.length - 1].call : null;
        }

        function getLongestSuit(lengths) {
            return SUITS.reduce((best, s) => lengths[s] > lengths[best] ? s : best, 'S');
        }

        function computeOpeningBid(hcp, lengths) {
            const bal = isBalanced(lengths);
            if (hcp >= 22) return '2C';
            if (hcp >= 20 && bal) return '2N';
            if (hcp >= 15 && hcp <= 17 && bal) return '1N';
            if (hcp >= 13) {
                const longest = getLongestSuit(lengths);
                if (lengths[longest] >= 5) return `1${longest}`;
                if (lengths['S'] >= 4 && lengths['H'] >= 4) return '1S';
                if (lengths['H'] >= 4) return '1H';
                if (lengths['S'] >= 4) return '1S';
                if (lengths['D'] >= 4) return '1D';
                return '1C';
            }
            if (hcp >= 5 && hcp <= 11) {
                if (lengths['S'] >= 6) return '2S';
                if (lengths['H'] >= 6) return '2H';
            }
            return 'pass';
        }

        function computeResponse(hcp, lengths, partnerCall, highestBid) {
            if (hcp <= 5) return 'pass';
            const partnerStrain = partnerCall.slice(1);
            const partnerLevel  = parseInt(partnerCall[0]);
            const support = lengths[partnerStrain] || 0;

            if (partnerCall === '1N') {
                if (hcp >= 10) return '3N';
                if (hcp >= 8)  return '2N';
                return 'pass';
            }
            if (partnerCall === '2N') {
                if (hcp >= 4)  return '3N';
                return 'pass';
            }
            if (partnerCall === '2C') {
                if (hcp >= 8 && (lengths['S'] >= 5 || lengths['H'] >= 5)) {
                    const maj = lengths['S'] >= 5 ? 'S' : 'H';
                    const bid = `2${maj}`;
                    return !highestBid || bidValue(bid) > bidValue(highestBid) ? bid : '2D';
                }
                return '2D'; // waiting
            }

            if (['S','H'].includes(partnerStrain) && support >= 3) {
                if (hcp >= 13) return `4${partnerStrain}`;
                if (hcp >= 10) return `3${partnerStrain}`;
                return `2${partnerStrain}`;
            }
            if (['C','D'].includes(partnerStrain) && support >= 4) {
                if (hcp >= 13) return '3N';
                if (hcp >= 10) return `3${partnerStrain}`;
                return `2${partnerStrain}`;
            }

            if (hcp >= 13) return '2N';
            if (hcp >= 10) return '2N';
            if (partnerLevel === 1) {
                if (lengths['S'] >= 4 && (!highestBid || bidValue('1S') > bidValue(highestBid))) return '1S';
                if (lengths['H'] >= 4 && (!highestBid || bidValue('1H') > bidValue(highestBid))) return '1H';
                if (lengths['D'] >= 4 && (!highestBid || bidValue('1D') > bidValue(highestBid)) && partnerStrain !== 'D') return '1D';
            }
            return '1N';
        }

        function computeOvercall(hcp, lengths, highestBid) {
            if (hcp < 8 || hcp > 17) return 'pass';
            for (const s of ['S', 'H', 'D', 'C']) {
                if (lengths[s] >= 5) {
                    for (let lv = 1; lv <= 4; lv++) {
                        const bid = `${lv}${s}`;
                        if (!highestBid || bidValue(bid) > bidValue(highestBid)) return bid;
                    }
                }
            }
            if (hcp >= 15) return '1N';
            return 'pass';
        }

        function aiBid(seat, hand, sequence) {
            const hcp = calcHCP(hand);
            const lengths = suitLengths(hand);
            const partner = (seat + 2) % 4;
            const partnerBids = sequence.filter(b => b.seat === partner && !['pass','dbl','rdbl'].includes(b.call));
            const myBids      = sequence.filter(b => b.seat === seat   && !['pass','dbl','rdbl'].includes(b.call));
            const oppBids     = sequence.filter(b => b.seat % 2 !== seat % 2 && !['pass','dbl','rdbl'].includes(b.call));
            const realBids    = sequence.filter(b => !['pass','dbl','rdbl'].includes(b.call));
            const highestBid  = realBids.length ? realBids[realBids.length - 1].call : null;
            const legalBid    = (str) => !['pass','dbl','rdbl'].includes(str) && (!highestBid || bidValue(str) > bidValue(highestBid));

            const anyRealCall = sequence.some(b => !['pass','dbl','rdbl'].includes(b.call));

            if (!anyRealCall) return computeOpeningBid(hcp, lengths);
            if (partnerBids.length > 0 && myBids.length === 0) {
                const bid = computeResponse(hcp, lengths, partnerBids[0].call, highestBid);
                if (legalBid(bid)) return bid;
                if (bid === '1N' && legalBid('2N')) return '2N';
                return 'pass';
            }
            if (oppBids.length > 0 && myBids.length === 0 && partnerBids.length === 0) {
                const bid = computeOvercall(hcp, lengths, highestBid);
                if (legalBid(bid)) return bid;
                return 'pass';
            }
            return 'pass';
        }

        function legalCards(hand, trick, trumpSuit) {
            if (trick.length === 0) return hand;
            const ledSuit = trick[0].card.suit;
            const followers = hand.filter(c => c.suit === ledSuit);
            return followers.length > 0 ? followers : hand;
        }

        function trickWinner(trick, trumpSuit) {
            const led = trick[0].card.suit;
            let winner = trick[0];
            for (let i = 1; i < trick.length; i++) {
                const { card } = trick[i];
                const wCard = winner.card;
                const wIsTrump = trumpSuit && wCard.suit === trumpSuit;
                const cIsTrump = trumpSuit && card.suit === trumpSuit;
                if (cIsTrump && !wIsTrump) {
                    winner = trick[i];
                } else if (cIsTrump && wIsTrump && card.rank > wCard.rank) {
                    winner = trick[i];
                } else if (!cIsTrump && card.suit === led && !wIsTrump && card.rank > wCard.rank) {
                    winner = trick[i];
                }
            }
            return winner.seat;
        }

        function currentTrickWinner(trick, trumpSuit) {
            if (trick.length === 0) return -1;
            return trickWinner(trick, trumpSuit);
        }

        function aiSelectCard(seat, hand, trick, trumpSuit, contract) {
            const legal = legalCards(hand, trick, trumpSuit);
            if (legal.length === 1) return legal[0];
            if (trick.length === 0) return aiLead(legal, trumpSuit);

            const winnerSeat = currentTrickWinner(trick, trumpSuit);
            const partnerSeat = (seat + 2) % 4;
            const partnerIsWinning = winnerSeat === partnerSeat;

            if (partnerIsWinning) {
                return legal.sort((a, b) => a.rank - b.rank)[0];
            }

            const winningCard = trick.find(t => t.seat === winnerSeat).card;
            const canBeat = legal.filter(c => {
                if (trumpSuit && c.suit === trumpSuit && winningCard.suit !== trumpSuit) return true;
                if (c.suit === winningCard.suit && c.rank > winningCard.rank) return true;
                return false;
            });

            if (canBeat.length > 0) return canBeat.sort((a, b) => a.rank - b.rank)[0];
            return legal.sort((a, b) => a.rank - b.rank)[0];
        }

        function aiLead(hand, trumpSuit) {
            const nonTrump = trumpSuit ? hand.filter(c => c.suit !== trumpSuit) : hand;
            const pool = nonTrump.length > 0 ? nonTrump : hand;

            const bySuit = {};
            for (const c of pool) {
                if (!bySuit[c.suit]) bySuit[c.suit] = [];
                bySuit[c.suit].push(c);
            }
            for (const s of Object.keys(bySuit)) bySuit[s].sort((a, b) => b.rank - a.rank);

            for (const s of SUITS) {
                const cards = bySuit[s];
                if (!cards || cards.length < 2) continue;
                if (cards[0].rank - cards[1].rank === 1) return cards[0];
            }

            const longest = Object.values(bySuit).sort((a, b) => b.length - a.length)[0];
            if (longest) {
                if (longest.length >= 4) return longest[3];
                return longest[longest.length - 1];
            }
            return hand[0];
        }

        function contractPoints(level, strain, doubled) {
            let base;
            if (strain === 'N') base = 40 + 30 * (level - 1);
            else { const tv = { C: 20, D: 20, H: 30, S: 30 }[strain]; base = tv * level; }
            return base * (doubled === 0 ? 1 : doubled === 1 ? 2 : 4);
        }

        function isGameContract(level, strain, doubled) {
            return contractPoints(level, strain, doubled) >= 100;
        }

        function calculateHandScore(contract, tricksWon, vulnerable) {
            const { level, strain, declarer, doubled } = contract;
            const contractTricks = level + 6;
            const side = declarer % 2 === 0 ? 'NS' : 'EW';
            const oppSide = side === 'NS' ? 'EW' : 'NS';
            const isVul = vulnerable[side];
            const made = tricksWon >= contractTricks;

            if (made) {
                const overtricks = tricksWon - contractTricks;
                const below = contractPoints(level, strain, doubled);
                let overtrickVal;
                if (doubled === 0) {
                    const tv = { C:20, D:20, H:30, S:30, N:30 }[strain];
                    overtrickVal = tv * overtricks;
                } else {
                    const perOT = isVul ? 200 : 100;
                    overtrickVal = perOT * doubled * overtricks;
                }
                const doubleBonus = doubled >= 1 ? 50 : 0;
                let bonus = 0;
                const isGame = isGameContract(level, strain, doubled);
                if (level === 7)       bonus = isVul ? 1500 : 1000;
                else if (level === 6)  bonus = isVul ? 750 : 500;
                else if (isGame)       bonus = isVul ? 500 : 300;
                else                   bonus = 50;
                return { made: true, side, tricksWon, contractTricks, below, above: overtrickVal + doubleBonus + bonus, bonus, isGame };
            } else {
                const down = contractTricks - tricksWon;
                let penalty = 0;
                if (doubled === 0) {
                    penalty = isVul ? down * 100 : down * 50;
                } else {
                    const mult = doubled === 2 ? 2 : 1;
                    if (!isVul) penalty = mult * (100 + Math.max(0, down - 1) * 200 + Math.max(0, down - 3) * 100);
                    else penalty = mult * (200 + Math.max(0, down - 1) * 300);
                }
                return { made: false, side: oppSide, penalty, down };
            }
        }

        function updateRubberScore(rubberScore, gamesWon, vulnerable, handResult) {
            const newScore = {
                NS: { below: [...rubberScore.NS.below], above: [...rubberScore.NS.above] },
                EW: { below: [...rubberScore.EW.below], above: [...rubberScore.EW.above] },
            };
            const newGames = { ...gamesWon };
            const newVul   = { ...vulnerable };
            let gameWon = false;

            if (handResult.made) {
                newScore[handResult.side].below.push(handResult.below);
                if (handResult.above > 0) newScore[handResult.side].above.push(handResult.above);
                const totalBelow = newScore[handResult.side].below.reduce((s, v) => s + v, 0);
                if (totalBelow >= 100) {
                    newGames[handResult.side]++;
                    newVul[handResult.side] = true;
                    newScore.NS.below = [];
                    newScore.EW.below = [];
                    gameWon = true;
                }
            } else {
                newScore[handResult.side].above.push(handResult.penalty);
            }
            return { rubberScore: newScore, gamesWon: newGames, vulnerable: newVul, gameWon };
        }

        function rubberBonus(gamesWon, winner) {
            const loser = winner === 'NS' ? 'EW' : 'NS';
            return gamesWon[loser] === 0 ? 700 : 500;
        }

        function totalScore(rubberScore, side) {
            const below = rubberScore[side].below.reduce((s, v) => s + v, 0);
            const above = rubberScore[side].above.reduce((s, v) => s + v, 0);
            return below + above;
        }

        const INITIAL_STATE = {
            phase: 'menu',
            dealer: 0,
            vulnerable: { NS: false, EW: false },
            rubberScore: { NS: { below: [], above: [] }, EW: { below: [], above: [] } },
            gamesWon: { NS: 0, EW: 0 },
            rubberCount: 1,
            hands: [[], [], [], []],
            biddingSequence: [],
            currentBidder: 1,
            contract: null,
            auctionOver: false,
            dummySeat: -1,
            currentLeader: -1,
            currentTrick: [],
            tricksTaken: { NS: 0, EW: 0 },
            completedTricks: [],
            openingLeadMade: false,
            dummyRevealed: false,
            lastHandResult: null,
            lastCompletedTrick: null,
            rubberOver: false,
            rubberWinner: null,
            autoPlayDummy: false,
        };

        function startHand(state) {
            const deck = shuffle(buildDeck());
            const hands = [[], [], [], []];
            for (let i = 0; i < 52; i++) {
                hands[(state.dealer + 1 + i) % 4].push(deck[i]);
            }
            const sortedHands = hands.map(h => sortHand(h));
            return {
                ...state,
                phase: 'bidding',
                hands: sortedHands,
                biddingSequence: [],
                currentBidder: (state.dealer + 1) % 4,
                contract: null,
                auctionOver: false,
                dummySeat: -1,
                currentLeader: -1,
                currentTrick: [],
                tricksTaken: { NS: 0, EW: 0 },
                completedTricks: [],
                openingLeadMade: false,
                dummyRevealed: false,
                lastHandResult: null,
                lastCompletedTrick: null,
                rubberOver: false,
                rubberWinner: null,
            };
        }

        function addBid(state, call) {
            const newSeq = [...state.biddingSequence, { seat: state.currentBidder, call }];
            const auctionStatus = isAuctionOver(newSeq);
            if (auctionStatus === 'passedOut') {
                return { ...state, biddingSequence: newSeq, auctionOver: true, phase: 'passedOut' };
            }
            if (auctionStatus === 'contract') {
                const contract = extractContract(newSeq);
                const dummySeat = (contract.declarer + 2) % 4;
                const openingLeader = (contract.declarer + 1) % 4;
                return {
                    ...state, biddingSequence: newSeq, auctionOver: true, contract, dummySeat,
                    phase: 'playing', currentLeader: openingLeader, currentTrick: [], lastCompletedTrick: null,
                    openingLeadMade: false, dummyRevealed: false,
                };
            }
            return { ...state, biddingSequence: newSeq, currentBidder: (state.currentBidder + 1) % 4 };
        }

        function playCard(state, seat, card) {
            const newHand = state.hands[seat].filter(c => c.id !== card.id);
            const newHands = state.hands.map((h, i) => i === seat ? newHand : h);
            const newTrick = [...state.currentTrick, { seat, card }];
            const openingLeadMade = true;
            const dummyRevealed = true;

            if (newTrick.length < 4) {
                return { ...state, hands: newHands, currentTrick: newTrick, openingLeadMade, dummyRevealed };
            }

            const trumpSuit = state.contract.strain === 'N' ? null : state.contract.strain;
            const winnerSeat = trickWinner(newTrick, trumpSuit);
            const winnerSide = winnerSeat % 2 === 0 ? 'NS' : 'EW';
            const newTricksTaken = { ...state.tricksTaken, [winnerSide]: state.tricksTaken[winnerSide] + 1 };
            const completedTricks = [...state.completedTricks, newTrick];
            const totalTricks = newTricksTaken.NS + newTricksTaken.EW;

            if (totalTricks === 13) {
                const declarerSide = state.contract.declarer % 2 === 0 ? 'NS' : 'EW';
                const declarerTricks = newTricksTaken[declarerSide];
                const handResult = calculateHandScore(state.contract, declarerTricks, state.vulnerable);
                const { rubberScore, gamesWon, vulnerable, gameWon } = updateRubberScore(
                    state.rubberScore, state.gamesWon, state.vulnerable, handResult
                );

                let rubberOver = gamesWon.NS >= 2 || gamesWon.EW >= 2;
                let rubberWinner = null;
                let finalRubberScore = { ...rubberScore };
                if (rubberOver) {
                    rubberWinner = gamesWon.NS >= 2 ? 'NS' : 'EW';
                    const bonus = rubberBonus(gamesWon, rubberWinner);
                    finalRubberScore = {
                        ...rubberScore,
                        [rubberWinner]: {
                            ...rubberScore[rubberWinner],
                            above: [...rubberScore[rubberWinner].above, bonus],
                        },
                    };
                }

                return {
                    ...state, hands: newHands, currentTrick: [], lastCompletedTrick: newTrick,
                    completedTricks, tricksTaken: newTricksTaken, currentLeader: winnerSeat,
                    openingLeadMade, dummyRevealed, phase: 'handFinished',
                    lastHandResult: handResult, rubberScore: finalRubberScore, gamesWon,
                    vulnerable, rubberOver, rubberWinner,
                };
            }

            return {
                ...state, hands: newHands, currentTrick: [], lastCompletedTrick: newTrick,
                completedTricks, tricksTaken: newTricksTaken, currentLeader: winnerSeat,
                openingLeadMade, dummyRevealed,
            };
        }

        function contractDisplay(contract) {
            if (!contract) return '';
            const dbl = contract.doubled === 1 ? ' ✕' : contract.doubled === 2 ? ' ✕✕' : '';
            return `${contract.level}${STRAIN_SYMBOL[contract.strain]}${dbl}`;
        }

        function isHumanTurn(turnSeat, state) {
            const HUMAN_SEAT = 2;
            if (turnSeat === HUMAN_SEAT) return true;
            if (!state.autoPlayDummy && turnSeat === 0) {
                if (state.dummySeat === 0) return state.openingLeadMade;
                return true;
            }
            return false;
        }

        // ══════════════════════════════════════════════════════════════
        // 元件
        // ══════════════════════════════════════════════════════════════

        const Card = ({ card, onClick, isHidden, size = 'preview', selected, disabled, noHoverAnim }) => {
            const sizeMap = {
                preview: "w-12 h-16 sm:w-16 sm:h-24 md:w-20 md:h-28",
                play: "w-16 h-24 sm:w-20 sm:h-32 md:w-24 md:h-36 lg:w-28 lg:h-40",
                trick: "w-12 h-16 sm:w-16 sm:h-24 md:w-20 md:h-28 lg:w-24 lg:h-36",
                hidden: "w-10 h-14 sm:w-12 sm:h-16 md:w-16 md:h-24"
            };
            const textMap = {
                preview: "text-2xl sm:text-3xl md:text-4xl",
                play: "text-3xl sm:text-5xl md:text-6xl lg:text-7xl",
                trick: "text-2xl sm:text-4xl md:text-5xl lg:text-6xl",
                hidden: "text-xl sm:text-2xl"

            const cornerTextMap = {
                preview: "text-xs sm:text-sm md:text-base",
                play: "text-sm sm:text-xl md:text-2xl lg:text-3xl",
                trick: "text-xs sm:text-base md:text-lg lg:text-xl",
                hidden: "text-[10px] sm:text-xs"
            };

            const szCls = sizeMap[size] || sizeMap['preview'];
            const txtCls = textMap[size] || textMap['preview'];
            const cornCls = cornerTextMap[size] || cornerTextMap['preview'];

            if (isHidden) {
                return (
                    <div className={`${szCls} flex-shrink-0 bg-blue-900 rounded-lg sm:rounded-xl border border-blue-600 shadow-md relative overflow-hidden`}>
                        <div className="absolute inset-1 sm:inset-1.5 rounded bg-gradient-to-br from-blue-700 to-blue-950 flex items-center justify-center">
                            <span className="text-blue-500/30 text-xs sm:text-sm md:text-xl select-none">🂠</span>
                        </div>
                    </div>
                );
            }

            const color = SUIT_COLOR_CSS[card.suit];
            const rank = RANK_LABEL[card.rank];
            const sym  = SUIT_SYMBOL[card.suit];

            return (
                <div
                    onClick={disabled ? undefined : onClick}
                    className={`${szCls} flex-shrink-0 bg-white rounded-lg sm:rounded-xl border border-gray-300 shadow-md
                        select-none relative
                        ${!disabled && !noHoverAnim ? 'cursor-pointer card-hover' : ''}
                        ${!disabled && noHoverAnim ? 'cursor-pointer' : ''}
                        ${selected ? 'card-selected ring-2 sm:ring-4 ring-yellow-400' : ''}
                        transition-all duration-200
                    `}
                >
                    {/* 使用 Tailwind REM 尺度的 0.5 (即 0.125rem) 代替硬刻的 px，確保縮放比例正確 */}
                    <div className={`absolute top-0.5 left-0.5 sm:top-1 sm:left-1 font-bold flex flex-col items-center leading-none ${cornCls}`} style={{ color }}>
                        <span className={rank === '10' ? 'tracking-tighter' : ''}>{rank}</span>
                        <span className="-mt-0.5 sm:-mt-1 text-[0.85em]">{sym}</span>
                    </div>
                    <div className={`absolute inset-0 flex flex-col items-center justify-center pointer-events-none`}>
                        <span className={`font-black ${txtCls} opacity-80`} style={{ color }}>{sym}</span>
                    </div>
                    <div className={`absolute bottom-0.5 right-0.5 sm:bottom-1 sm:right-1 font-bold flex flex-col items-center leading-none ${cornCls}`} style={{ color, transform: 'rotate(180deg)' }}>
                        <span className={rank === '10' ? 'tracking-tighter' : ''}>{rank}</span>
                        <span className="-mt-0.5 sm:-mt-1 text-[0.85em]">{sym}</span>
                    </div>
                </div>
            );
        };

        const HandDisplay = ({ cards, isExpanded, onCardClick, legalIds = [], selectedId, clickable, disabledOverall, size = "preview" }) => {
            const [hoverIdx, setHoverIdx] = useState(null);
            const [isMobile, setIsMobile] = useState(window.innerWidth < 640);
            
            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 640);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const useTwoRows = isMobile && cards.length > 5 && size === 'play';

            const rows = useTwoRows
                ? [cards.slice(0, Math.ceil(cards.length / 2)), cards.slice(Math.ceil(cards.length / 2))]
                : [cards];

            let containerHeight = "";
            if (size === 'preview') {
                containerHeight = isExpanded ? (useTwoRows ? "h-24 sm:h-32" : "h-16 sm:h-24") : "h-8 sm:h-10";
            } else { 
                containerHeight = isExpanded ? (useTwoRows ? "h-40 sm:h-52" : "h-24 sm:h-36") : "h-12 sm:h-16";
            }

            const clipStyle = isExpanded ? 'none' : 'inset(-150px -150px 0 -150px)';
            let globalCardIndex = 0;

            return (
                <div
                    className={`w-full max-w-full relative transition-all duration-300 ${containerHeight}`}
                    style={{ clipPath: clipStyle }}
                    onMouseLeave={() => setHoverIdx(null)}
                >
                    {rows.map((rowCards, rowIdx) => {
                        let topOffset = '0';
                        if (rowIdx > 0) {
                            if (isExpanded) {
                                topOffset = size === 'preview' ? '2rem' : '3.5rem';
                            } else {
                                topOffset = size === 'preview' ? '1rem' : '1.5rem';
                            }
                        }

                        return (
                            <div key={rowIdx} className="absolute inset-x-0 w-full transition-all duration-300" style={{ top: topOffset, zIndex: (rowIdx + 1) * 10 }}>
                                {rowCards.map((c, idxInRow) => {
                                    const i = globalCardIndex++;
                                    const isLegal = legalIds.length === 0 || legalIds.includes(c.id);
                                    const isSel = selectedId && selectedId === c.id;
                                    
                                    const ratio = rowCards.length > 1 ? (idxInRow / (rowCards.length - 1)) : 0.5;
                                    const leftPercent = ratio * 100;

                                    let translateY = 0;
                                    let translateX = 0;
                                    let scale = 1;
                                    
                                    if (hoverIdx !== null) {
                                        if (i < hoverIdx) translateX = -10;
                                        if (i > hoverIdx) translateX = 10;
                                        if (i === hoverIdx) {
                                            translateY = -12;
                                            scale = 1.05;
                                        }
                                    }
                                    
                                    if (isSel) {
                                        translateY = -20;
                                        scale = 1.05;
                                    }

                                    return (
                                        <div
                                            key={c.id}
                                            onMouseEnter={() => setHoverIdx(i)}
                                            onClick={() => {
                                                if (clickable && isLegal && onCardClick) onCardClick(c);
                                                if (hoverIdx !== i) setHoverIdx(i);
                                            }}
                                            className="absolute transition-transform duration-200 ease-out cursor-pointer"
                                            style={{
                                                left: `${leftPercent}%`,
                                                zIndex: isSel ? 100 : (hoverIdx === i ? 50 : idxInRow),
                                                transform: `translate(calc(-${leftPercent}% + ${translateX}px), ${translateY}px) scale(${scale})`
                                            }}
                                        >
                                            <Card
                                                card={c}
                                                size={size}
                                                selected={isSel}
                                                disabled={disabledOverall || (!clickable && legalIds.length === 0) || (clickable && !isLegal)}
                                                noHoverAnim={true}
                                            />
                                        </div>
                                    );
                                })}
                            </div>
                        );
                    })}
                </div>

            <div className={`glass-panel rounded-full px-3 sm:px-4 md:px-5 py-1 sm:py-1.5 md:py-2 text-[10px] sm:text-xs md:text-sm font-bold flex items-center gap-1.5 transition-all

                <span>{isHuman ? '👤' : '🤖'}</span>
                <span>{name}</span>
                {isActive && <span className="animate-pulse text-yellow-400">●</span>}

        );

        const AuctionBox = ({ sequence, dealer }) => {
            const firstBidder = (dealer + 1) % 4;
            const padded = [...Array(firstBidder).fill(null), ...sequence];
            const rows = [];
            for (let i = 0; i < padded.length; i += 4) {
                rows.push(padded.slice(i, i + 4));

            const headers = ['北', '東', '南', '西'];

            const callDisplay = (call) => {
                if (!call) return '-';
                if (call === 'pass') return '過';
                if (call === 'dbl') return '加';
                if (call === 'rdbl') return '再';
                return `${call[0]}${STRAIN_SYMBOL[call.slice(1)]}`;
            };

            const callColor = (call) => {
                if (!call) return 'text-gray-600';
                if (call === 'pass') return 'text-gray-400';
                if (call === 'dbl') return 'text-orange-400 font-bold';
                if (call === 'rdbl') return 'text-purple-400 font-bold';
                if (call.endsWith('H') || call.endsWith('D')) return 'text-red-400 font-bold';
                if (call.endsWith('C')) return 'text-green-400 font-bold';
                return 'text-white font-bold';

            return (
                <div className="glass-panel rounded-2xl sm:rounded-3xl p-3 sm:p-5 md:p-6 w-full max-w-[17.5rem] sm:max-w-[23.75rem] md:max-w-[30rem] lg:max-w-[37.5rem] shadow-lg">
                    <div className="grid grid-cols-4 gap-1 text-center mb-2 sm:mb-4">
                        {headers.map((h, i) => (
                            <span key={i} className="text-yellow-400 font-bold text-sm sm:text-base md:text-xl lg:text-2xl">{h}</span>
                        ))}
                    </div>
                    <div className="border-b border-white/20 mb-2 sm:mb-4" />
                    <div className="overflow-y-auto hide-scrollbar" style={{ maxHeight: '40vh' }}>
                        {rows.map((row, ri) => (
                            <div key={ri} className="grid grid-cols-4 gap-1 text-center py-1 sm:py-2">
                                {row.map((entry, ci) => (
                                    <span key={ci} className={`text-base sm:text-lg md:text-xl lg:text-2xl ${callColor(entry ? entry.call : null)}`}>
                                        {callDisplay(entry ? entry.call : null)}
                                    </span>
                                ))}
                            </div>
                        ))}
                        {rows.length === 0 && (
                            <div className="text-gray-500 text-sm sm:text-base md:text-xl text-center py-4">等待叫牌...</div>
                        )}
                    </div>
                </div>
            );
        };

        const BiddingSheet = ({ onBid, sequence, visible }) => {
            const [isExpanded, setIsExpanded] = useState(true);

            useEffect(() => { if (visible) setIsExpanded(true); }, [visible]);
            if (!visible) return null;

            const highest = getCurrentHighestBid(sequence);
            const canDbl  = canDoubleNow(sequence, 2);
            const canRdbl = canRedoubleNow(sequence, 2);

            if (!isExpanded) {
                return (
                    <div className="fixed bottom-0 left-0 right-0 z-50 animate-slide-up">
                        <div className="glass-panel rounded-t-2xl px-4 py-3 flex items-center justify-center gap-2 cursor-pointer border-t border-white/20"
                             onClick={() => setIsExpanded(true)}>
                            <div className="w-10 h-1.5 bg-gray-400 rounded-full" />
                            <span className="text-yellow-300 text-base font-bold">展開叫牌面板</span>
                        </div>
                    </div>
                );
            }

            return (
                <div className="fixed bottom-0 left-0 right-0 z-50 animate-slide-up max-w-2xl mx-auto">
                    <div className="glass-panel rounded-t-3xl p-3 sm:p-5 pb-safe shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-white/20 bg-[#022c22]/95 flex flex-col max-h-[85vh]">
                        <div className="flex items-center justify-center gap-2 cursor-pointer mb-2 shrink-0" onClick={() => setIsExpanded(false)}>
                            <div className="w-12 h-1.5 bg-gray-500 rounded-full" />
                        </div>
                        <p className="text-yellow-300 text-center text-lg sm:text-xl font-bold mb-3 shrink-0 tracking-widest">請選擇叫牌</p>
                        
                        <div className="flex gap-2 sm:gap-3 mb-3 shrink-0">
                            <button onClick={() => onBid('pass')}
                                className="flex-[2] bg-slate-600 hover:bg-slate-500 text-white py-3.5 sm:py-4 rounded-xl font-bold text-xl active:scale-95 transition-all shadow-md">
                                過 叫
                            </button>
                            <button onClick={() => canDbl && onBid('dbl')} disabled={!canDbl}
                                className={`flex-1 py-3.5 sm:py-4 rounded-xl font-bold text-lg active:scale-95 transition-all shadow-md
                                    ${canDbl ? 'bg-orange-700 text-white' : 'bg-gray-800/40 text-gray-600 opacity-40'}`}>
                                加倍
                            </button>
                            <button onClick={() => canRdbl && onBid('rdbl')} disabled={!canRdbl}
                                className={`flex-1 py-3.5 sm:py-4 rounded-xl font-bold text-lg active:scale-95 transition-all shadow-md
                                    ${canRdbl ? 'bg-purple-700 text-white' : 'bg-gray-800/40 text-gray-600 opacity-40'}`}>
                                再加
                            </button>
                        </div>

                        <div className="overflow-y-auto hide-scrollbar shrink-0 max-h-[14rem] sm:max-h-[18rem] rounded-xl relative border-t border-white/10 pt-2">

                                {[1,2,3,4,5,6,7].flatMap(level =>
                                    ['C','D','H','S','N'].map(strain => {
                                        const bid = `${level}${strain}`;
                                        const legal = !highest || bidValue(bid) > bidValue(highest);
                                        const isRed = strain === 'H' || strain === 'D';
                                        const isGrn = strain === 'C';
                                        
                                        const madeBid = sequence.find(b => b.call === bid);
                                        const bidderName = madeBid ? SEAT_NAME[madeBid.seat] : null;

                                        return (
                                            <button key={bid}
                                                onClick={() => legal && onBid(bid)}
                                                disabled={!legal}
                                                className={`relative py-3.5 sm:py-5 rounded-xl text-sm sm:text-lg md:text-xl lg:text-2xl font-black transition-all shadow-md active:scale-95 overflow-hidden
                                                    ${legal
                                                        ? isRed ? 'bg-red-700/90 hover:bg-red-600 text-white'
                                                        : isGrn ? 'bg-green-600/90 hover:bg-green-500 text-white'
                                                        : 'bg-slate-700/90 hover:bg-slate-600 text-white'
                                                        : 'bg-gray-800/40 text-gray-600 cursor-not-allowed opacity-30 shadow-none'

                                            >
                                                {bidderName && (
