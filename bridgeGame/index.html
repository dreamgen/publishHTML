                                            </div>
                                            {/* West / East */}
                                            <div className="flex justify-between items-center w-full px-2 sm:px-6 md:px-10 lg:px-16 relative z-20 transition-all">
                                                {displayTrick.find(t => t.seat === 3)
                                                    ? <Card card={displayTrick.find(t => t.seat === 3).card} size="trick" disabled />
                                                    : <div className="w-12 h-16 sm:w-16 sm:h-24 md:w-20 md:h-28 lg:w-28 lg:h-40 opacity-0" />}
                                                {displayTrick.find(t => t.seat === 1)
                                                    ? <Card card={displayTrick.find(t => t.seat === 1).card} size="trick" disabled />
                                                    : <div className="w-12 h-16 sm:w-16 sm:h-24 md:w-20 md:h-28 lg:w-28 lg:h-40 opacity-0" />}
                                            </div>
                                            {/* South */}
                                            <div className="flex justify-center -mt-6 sm:-mt-10 md:-mt-14 lg:-mt-16 relative z-30 transition-all">
                                                {displayTrick.find(t => t.seat === 2)
                                                    ? <Card card={displayTrick.find(t => t.seat === 2).card} size="trick" disabled />
                                                    : <div className="w-12 h-16 sm:w-16 sm:h-24 md:w-20 md:h-28 lg:w-28 lg:h-40 opacity-0" />}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                {/* Message text */}
                                <div className="text-center text-xs sm:text-sm md:text-base lg:text-xl mt-4 min-h-[1.5rem] relative z-40">
                                    {phase === 'handFinished' ? (
                                        <button
                                            onClick={() => setGameState(prev => ({ ...prev, phase: 'scoring' }))}
                                            className="bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-600 text-gray-900 font-bold px-6 sm:px-8 py-2 sm:py-3 rounded-xl sm:rounded-2xl text-sm sm:text-lg md:text-2xl active:scale-95 transition-all shadow-[0_0_20px_rgba(250,204,21,0.5)] animate-bounce"
                                        >
                                            進入結算畫面 →
                                        </button>
                                    ) : isMyTurn ? (
                                        <span className="text-yellow-300 font-bold animate-pulse drop-shadow-md tracking-wider bg-black/40 px-4 py-1.5 rounded-full border border-yellow-500/30">
                                            {isSouthTurn ? '請出牌（南家）' : '請出牌（北明手）'}
                                            {selectedCard ? ' → 再點擊出牌確認' : ''}
                                        </span>
                                    ) : turnSeat >= 0 ? (
                                        <span className="text-gray-400 font-medium tracking-widest">{SEAT_NAME[turnSeat]}家出牌中...</span>
                                    ) : null}
                                </div>
                            </div>

                            {/* East */}
                            <div className="flex flex-col items-center gap-1 sm:gap-2 shrink-0">
                                <PlayerBadge name="東家" isActive={turnSeat === 1} isHuman={false} />
                                <div className="flex flex-col -space-y-6 sm:-space-y-10 md:-space-y-14 lg:-space-y-20 pt-4">
                                    {Array.from({ length: Math.min(hands[1].length, 13) }).map((_, i) => (
                                        <div key={i} style={{ zIndex: i }} className="relative">
                                            <Card isHidden size="sm" />
                                        </div>
                                    ))}
                                </div>
                                <span className="text-gray-500 text-[10px] sm:text-xs md:text-sm font-bold mt-2">{hands[1].length}張</span>
                            </div>
                        </div>

                        {/* South hand */}
                        <div className="glass-light mx-2 sm:mx-6 md:mx-10 mb-2 sm:mb-4 rounded-2xl sm:rounded-3xl p-2 sm:p-4 shrink-0 shadow-lg z-10 relative">
                            <button
                                onClick={() => setSouthExpanded(!southExpanded)}
                                className="absolute top-2 right-2 text-[10px] sm:text-xs text-yellow-300 bg-black/40 hover:bg-black/60 px-2 py-1 rounded-lg font-bold border border-yellow-600/50 z-20"
                            >
                                {southExpanded ? '收合 ▲' : '展開 ▼'}
                            </button>
                            <div className="flex flex-col items-center gap-2 sm:gap-3 relative">
                                <div className="flex items-center gap-2 mb-1 sm:mb-2">
                                     <PlayerBadge name="南家（您）" isActive={isSouthTurn} isHuman={true} />
                                </div>
                                <HandDisplay
                                    cards={hands[HUMAN_SEAT]}
                                    isExpanded={southExpanded}
                                    onCardClick={(c) => handleCardClick(HUMAN_SEAT, c)}
                                    legalIds={southLegal}
                                    selectedId={selectedCard && isSouthTurn ? selectedCard.id : null}
                                    clickable={southClickable}
                                    size="hand"
                                />
                                
                                <div className="absolute -top-12 sm:-top-16 z-50">
                                    {selectedCard && isSouthTurn && (
                                        <button
                                            onClick={() => handleConfirmPlay(HUMAN_SEAT)}
                                            className="bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-600 text-gray-900 font-bold px-6 sm:px-10 py-2 sm:py-3 md:py-4 rounded-xl sm:rounded-2xl text-sm sm:text-lg md:text-xl lg:text-2xl active:scale-95 transition-all shadow-xl border-2 border-yellow-300 animate-slide-up">
                                            確認出牌：{RANK_LABEL[selectedCard.rank]}{SUIT_SYMBOL[selectedCard.suit]}
                                        </button>
                                    )}
                                    {selectedCard && northClickable && turnSeat === 0 && (
                                        <button
                                            onClick={() => handleConfirmPlay(0)}
                                            className="bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-600 text-gray-900 font-bold px-6 sm:px-10 py-2 sm:py-3 md:py-4 rounded-xl sm:rounded-2xl text-sm sm:text-lg md:text-xl lg:text-2xl active:scale-95 transition-all shadow-xl border-2 border-yellow-300 animate-slide-up">
                                            明手出牌：{RANK_LABEL[selectedCard.rank]}{SUIT_SYMBOL[selectedCard.suit]}
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (phase === 'scoring') {
                const result = lastHandResult;
                const contractStr = contractDisplay(contract);
                const isNSResult = result && result.side === 'NS';

                return (
                    <div className="flex-1 flex flex-col items-center overflow-y-auto hide-scrollbar p-4 sm:p-8 gap-4 sm:gap-6 animate-slide-up">
                        <h2 className="text-white text-2xl sm:text-3xl md:text-4xl font-bold text-center mt-4 sm:mt-8">本局結果</h2>

                        <div className={`glass-panel rounded-2xl sm:rounded-3xl p-6 sm:p-10 w-full max-w-sm sm:max-w-lg md:max-w-xl text-center border-l-4 sm:border-l-8 shadow-2xl
                            ${result.made
                                ? isNSResult ? 'border-l-green-400' : 'border-l-blue-400'
                                : 'border-l-red-400'}`}>
                            <div className="text-4xl sm:text-5xl md:text-6xl font-bold text-white mb-2 sm:mb-4">{contractStr}</div>
                            <div className="text-gray-300 text-sm sm:text-base md:text-xl mb-4 sm:mb-6">
                                {contract ? SEAT_NAME[contract.declarer] : ''}家叫牌
                                {contract && vulnerable[contract.declarer % 2 === 0 ? 'NS' : 'EW'] ? ' · 有局' : ' · 無局'}
                            </div>
                            {result.made ? (
                                <>
                                    <div className="text-green-300 text-2xl sm:text-3xl md:text-4xl font-bold mb-2">
                                        ✓ 完成合約{result.tricksWon > result.contractTricks ? ` +${result.tricksWon - result.contractTricks}` : ''}
                                    </div>
                                    <div className="text-gray-400 text-sm sm:text-lg md:text-xl">贏得 {result.tricksWon} 墩</div>
                                </>
                            ) : (
                                <>
                                    <div className="text-red-300 text-2xl sm:text-3xl md:text-4xl font-bold mb-2">✗ 差 {result.down} 墩</div>
                                    <div className="text-gray-400 text-sm sm:text-lg md:text-xl">僅贏 {result.tricksWon || (contract.level + 6 - result.down)} 墩</div>
                                </>
                            )}
                        </div>

                        <div className="glass-panel rounded-2xl sm:rounded-3xl p-5 sm:p-8 w-full max-w-sm sm:max-w-lg md:max-w-xl shadow-lg">
                            <h3 className="text-yellow-300 font-bold text-base sm:text-xl md:text-2xl mb-4 sm:mb-6 text-center">計分明細</h3>
                            {result.made ? (
                                <div className="space-y-3 sm:space-y-4 text-sm sm:text-lg md:text-xl">
                                    <div className="flex justify-between items-center">
                                        <span className="text-gray-300">低線（合約分）</span>
                                        <span className="text-white font-bold">{result.below}</span>
                                    </div>
                                    {result.above > 0 && (
                                        <div className="flex justify-between items-center">
                                            <span className="text-gray-300">高線（獎勵分）</span>
                                            <span className="text-green-300 font-bold">{result.above}</span>
                                        </div>
                                    )}
                                    <div className="flex justify-between items-center pt-3 sm:pt-4 border-t border-white/20">
                                        <span className="text-yellow-300">得分方</span>
                                        <span className="text-yellow-300 font-bold">{result.side}</span>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-3 sm:space-y-4 text-sm sm:text-lg md:text-xl">
                                    <div className="flex justify-between items-center">
                                        <span className="text-gray-300">罰分</span>
                                        <span className="text-red-300 font-bold">{result.penalty}</span>
                                    </div>
                                    <div className="flex justify-between items-center pt-3 sm:pt-4 border-t border-white/20">
                                        <span className="text-yellow-300">得分方（防守）</span>
                                        <span className="text-yellow-300 font-bold">{result.side}</span>
                                    </div>
                                </div>
                            )}
                        </div>

                        <ScoreCard rubberScore={rubberScore} gamesWon={gamesWon} vulnerable={vulnerable} />

                        {rubberOver ? (
                            <div className="glass-panel border-2 border-yellow-500/80 rounded-2xl sm:rounded-3xl p-6 sm:p-10 w-full max-w-sm sm:max-w-lg md:max-w-xl text-center shadow-2xl bg-yellow-900/20">
                                <div className="text-5xl sm:text-7xl mb-4 sm:mb-6">🏆</div>
                                <div className="text-yellow-300 text-2xl sm:text-4xl md:text-5xl font-bold mb-2 sm:mb-4">橡皮牌結束！</div>
                                <div className="text-white font-bold text-xl sm:text-3xl md:text-4xl mb-2 sm:mb-4">{rubberWinner} 獲勝</div>
                                <div className="text-gray-300 text-sm sm:text-xl md:text-2xl mb-6 sm:mb-8 font-mono">
                                    NS: {totalScore(rubberScore, 'NS')} | EW: {totalScore(rubberScore, 'EW')}
                                </div>
                                <button
                                    onClick={() => setGameState({
                                        ...INITIAL_STATE,
                                        rubberCount: gameState.rubberCount + 1,
                                    })}
                                    className="w-full bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-600 text-gray-900 font-bold py-4 sm:py-5 md:py-6 rounded-2xl sm:rounded-3xl text-lg sm:text-2xl active:scale-95 transition-all shadow-xl">
                                    開始新橡皮牌 →
                                </button>
                            </div>
                        ) : (
                            <button
                                onClick={() => setGameState(prev => startHand({ ...prev, dealer: (prev.dealer + 1) % 4 }))}
                                className="w-full max-w-sm sm:max-w-lg md:max-w-xl bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-600 text-gray-900 font-bold py-4 sm:py-5 md:py-6 rounded-2xl sm:rounded-3xl text-lg sm:text-2xl shadow-xl active:scale-95 transition-all mb-8">
                                下一局 →
                            </button>
                        )}
                    </div>
                );
            }

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[PWA] SW registered:', reg.scope))
                    .catch(err => console.warn('[PWA] SW failed:', err));
            });
        }
    </script>
</body>
</html>
