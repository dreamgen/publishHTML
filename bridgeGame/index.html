<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>橋牌單機遊戲</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="./icons/bridgeGame-192.svg">
    <link rel="apple-touch-icon" href="./icons/bridgeGame-192.svg">
    <meta name="theme-color" content="#15803d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="橋牌">
    <meta name="description" content="橋牌單人練習版，含競叫、打牌、橡皮橋計分，支援離線遊玩">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
        }
        #root {
            height: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #065f46 0%, #022c22 100%);
        }
        .min-h-screen { min-height: 100dvh; }

        /* Glass morphism */
        .glass-panel {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .glass-light {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Card animations */
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        @media (hover: hover) {
            .card-hover:hover { transform: translateY(-16px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 50; }
        }
        .card-selected { transform: translateY(-24px) scale(1.05) !important; box-shadow: 0 15px 35px rgba(250,204,21,0.6) !important; z-index: 100 !important; }

        /* Slide-up animation */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Pulse ring for active turn */
        @keyframes pulseRing {
            0%, 100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.6); }
            70%       { box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); }
        }
        .pulse-ring { animation: pulseRing 1.2s ease-in-out infinite; }

        /* Fade-in */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in { animation: fadeIn 0.25s ease-out; }

        /* Scrollbar hide */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Safe area padding for notched phones */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
    </style>
</head>

<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ══════════════════════════════════════════════════════════════
        // 常數
        // ══════════════════════════════════════════════════════════════
        const SUITS = ['S', 'H', 'D', 'C'];
        const RANKS = [14, 13, 12, 11, 10, 9, 8, 7, 6, 5, 4, 3, 2];
        const SUIT_SYMBOL = { S: '♠', H: '♥', D: '♦', C: '♣' };
        
        // 牌面上的花色顏色 (優化梅花為較亮的翠綠色，提升在白色牌面上的辨識度)
        const SUIT_COLOR_CSS  = { S: '#020617', H: '#dc2626', D: '#ea580c', C: '#15803d' };
        
        // 暗色背景上的花色顏色 (用於叫牌與 HCP 面板，確保梅花與黑桃清晰可見)
        const SUIT_COLOR_DARK_BG = { S: '#f8fafc', H: '#ef4444', D: '#f97316', C: '#4ade80' };

        const RANK_LABEL  = { 14:'A', 13:'K', 12:'Q', 11:'J', 10:'10', 9:'9', 8:'8', 7:'7', 6:'6', 5:'5', 4:'4', 3:'3', 2:'2' };
        const STRAINS = ['C', 'D', 'H', 'S', 'N'];
        const STRAIN_SYMBOL = { C:'♣', D:'♦', H:'♥', S:'♠', N:'NT' };
        const SEAT_NAME = ['北', '東', '南', '西'];
        const SUIT_ORDER = { S: 0, H: 1, D: 2, C: 3 };

        // ══════════════════════════════════════════════════════════════
        // 牌組工具
        // ══════════════════════════════════════════════════════════════
        function buildDeck() {
            const deck = [];
            let id = 0;
            for (const suit of SUITS) {
                for (const rank of RANKS) {
                    deck.push({ id: id++, suit, rank });
                }
            }
            return deck;
        }

        function shuffle(deck) {
            const d = [...deck];
            for (let i = d.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [d[i], d[j]] = [d[j], d[i]];
            }
            return d;
        }

        function sortHand(cards) {
            return [...cards].sort((a, b) =>
                SUIT_ORDER[a.suit] !== SUIT_ORDER[b.suit]
                    ? SUIT_ORDER[a.suit] - SUIT_ORDER[b.suit]
                    : b.rank - a.rank
            );
        }

        function calcHCP(cards) {
            return cards.reduce((sum, c) => {
                if (c.rank === 14) return sum + 4;
                if (c.rank === 13) return sum + 3;
                if (c.rank === 12) return sum + 2;
                if (c.rank === 11) return sum + 1;
                return sum;
            }, 0);
        }

        function suitLengths(cards) {
            return cards.reduce((acc, c) => {
                acc[c.suit] = (acc[c.suit] || 0) + 1;
                return acc;
            }, { S: 0, H: 0, D: 0, C: 0 });
        }

        function isBalanced(lengths) {
            const vals = Object.values(lengths).sort((a, b) => b - a);
            // 4333, 4432, 5332
            if (vals[0] > 5) return false;
            if (vals[0] === 5 && vals[1] > 3) return false;
            const hasDoubleton = vals.some(v => v === 2);
            const hasSingleton = vals.some(v => v <= 1);
            if (hasSingleton) return false;
            return true;
        }

        // ══════════════════════════════════════════════════════════════
        // 叫牌系統
        // ══════════════════════════════════════════════════════════════
        function bidValue(bidStr) {
            if (['pass', 'dbl', 'rdbl'].includes(bidStr)) return 0;
            const level = parseInt(bidStr[0]);
            const strain = bidStr.slice(1);
            return (level - 1) * 5 + STRAINS.indexOf(strain) + 1;
        }

        function isAuctionOver(sequence) {
            if (sequence.length < 4) return false;
            const calls = sequence.map(b => b.call);
            if (sequence.length === 4 && calls.every(c => c === 'pass')) return 'passedOut';
            if (sequence.length >= 4) {
                const last3 = calls.slice(-3);
                const hasRealBid = calls.some(c => !['pass', 'dbl', 'rdbl'].includes(c));
                if (hasRealBid && last3.every(c => c === 'pass')) return 'contract';
            }
            return false;
        }

        function extractContract(sequence) {
            let lastBid = null;
            let doubled = 0;
            for (const entry of sequence) {
                if (!['pass', 'dbl', 'rdbl'].includes(entry.call)) {
                    lastBid = entry;
                    doubled = 0;
                } else if (entry.call === 'dbl') {
                    doubled = 1;
                } else if (entry.call === 'rdbl') {
                    doubled = 2;
                }
            }
            if (!lastBid) return null;
            const strain = lastBid.call.slice(1);
            const level  = parseInt(lastBid.call[0]);
            const side   = lastBid.seat % 2;
            let declarerSeat = lastBid.seat;
            for (const entry of sequence) {
                if (entry.seat % 2 === side && !['pass', 'dbl', 'rdbl'].includes(entry.call) && entry.call.slice(1) === strain) {
                    declarerSeat = entry.seat;
                    break;
                }
            }
            return { level, strain, declarer: declarerSeat, doubled };
        }

        function canDoubleNow(sequence, humanSeat) {
            const nonPasses = sequence.filter(b => b.call !== 'pass');
            if (!nonPasses.length) return false;
            const last = nonPasses[nonPasses.length - 1];
            if (['dbl', 'rdbl'].includes(last.call)) return false;
            return last.seat % 2 !== humanSeat % 2;
        }

        function canRedoubleNow(sequence, humanSeat) {
            const nonPasses = sequence.filter(b => b.call !== 'pass');
            if (!nonPasses.length) return false;
            const last = nonPasses[nonPasses.length - 1];
            if (last.call !== 'dbl') return false;
            return last.seat % 2 !== humanSeat % 2;
        }

        function getCurrentHighestBid(sequence) {
            const realBids = sequence.filter(b => !['pass', 'dbl', 'rdbl'].includes(b.call));
            return realBids.length ? realBids[realBids.length - 1].call : null;
        }

        // ── AI 叫牌邏輯 ────────────────────────────────────────────────
        function getLongestSuit(lengths) {
            return SUITS.reduce((best, s) => lengths[s] > lengths[best] ? s : best, 'S');
        }

        function computeOpeningBid(hcp, lengths) {
            const bal = isBalanced(lengths);
            if (hcp >= 22) return '2C';
            if (hcp >= 20 && bal) return '2N';
            if (hcp >= 15 && hcp <= 17 && bal) return '1N';
            if (hcp >= 13) {
                const longest = getLongestSuit(lengths);
                if (lengths[longest] >= 5) return `1${longest}`;
                if (lengths['S'] >= 4 && lengths['H'] >= 4) return '1S';
                if (lengths['H'] >= 4) return '1H';
                if (lengths['S'] >= 4) return '1S';
                if (lengths['D'] >= 4) return '1D';
                return '1C';
            }
            if (hcp >= 5 && hcp <= 11) {
                if (lengths['S'] >= 6) return '2S';
                if (lengths['H'] >= 6) return '2H';
            }
            return 'pass';
        }

        function computeResponse(hcp, lengths, partnerCall, highestBid) {
            if (hcp <= 5) return 'pass';
            const partnerStrain = partnerCall.slice(1);
            const partnerLevel  = parseInt(partnerCall[0]);
            const support = lengths[partnerStrain] || 0;

            if (partnerCall === '1N') {
                if (hcp >= 10) return '3N';
                if (hcp >= 8)  return '2N';
                return 'pass';
            }
            if (partnerCall === '2N') {
                if (hcp >= 4)  return '3N';
                return 'pass';
            }
            if (partnerCall === '2C') {
                if (hcp >= 8 && (lengths['S'] >= 5 || lengths['H'] >= 5)) {
                    const maj = lengths['S'] >= 5 ? 'S' : 'H';
                    const bid = `2${maj}`;
                    return !highestBid || bidValue(bid) > bidValue(highestBid) ? bid : '2D';
                }
                return '2D'; // waiting
            }

            if (['S','H'].includes(partnerStrain) && support >= 3) {
                if (hcp >= 13) return `4${partnerStrain}`;
                if (hcp >= 10) return `3${partnerStrain}`;
                return `2${partnerStrain}`;
            }
            if (['C','D'].includes(partnerStrain) && support >= 4) {
                if (hcp >= 13) return '3N';
                if (hcp >= 10) return `3${partnerStrain}`;
                return `2${partnerStrain}`;
            }

            if (hcp >= 13) return '2N';
            if (hcp >= 10) return '2N';
            if (partnerLevel === 1) {
                if (lengths['S'] >= 4 && (!highestBid || bidValue('1S') > bidValue(highestBid))) return '1S';
                if (lengths['H'] >= 4 && (!highestBid || bidValue('1H') > bidValue(highestBid))) return '1H';
                if (lengths['D'] >= 4 && (!highestBid || bidValue('1D') > bidValue(highestBid)) && partnerStrain !== 'D') return '1D';
            }
            return '1N';
        }

        function computeOvercall(hcp, lengths, highestBid) {
            if (hcp < 8 || hcp > 17) return 'pass';
            for (const s of ['S', 'H', 'D', 'C']) {
                if (lengths[s] >= 5) {
                    for (let lv = 1; lv <= 4; lv++) {
                        const bid = `${lv}${s}`;
                        if (!highestBid || bidValue(bid) > bidValue(highestBid)) return bid;
                    }
                }
            }
            if (hcp >= 15) return '1N';
            return 'pass';
        }

        function aiBid(seat, hand, sequence) {
            const hcp = calcHCP(hand);
            const lengths = suitLengths(hand);
            const partner = (seat + 2) % 4;
            const partnerBids = sequence.filter(b => b.seat === partner && !['pass','dbl','rdbl'].includes(b.call));
            const myBids      = sequence.filter(b => b.seat === seat   && !['pass','dbl','rdbl'].includes(b.call));
            const oppBids     = sequence.filter(b => b.seat % 2 !== seat % 2 && !['pass','dbl','rdbl'].includes(b.call));
            const realBids    = sequence.filter(b => !['pass','dbl','rdbl'].includes(b.call));
            const highestBid  = realBids.length ? realBids[realBids.length - 1].call : null;
            const legalBid    = (str) => !['pass','dbl','rdbl'].includes(str) && (!highestBid || bidValue(str) > bidValue(highestBid));

            const anyRealCall = sequence.some(b => !['pass','dbl','rdbl'].includes(b.call));

            if (!anyRealCall) return computeOpeningBid(hcp, lengths);
            if (partnerBids.length > 0 && myBids.length === 0) {
                const bid = computeResponse(hcp, lengths, partnerBids[0].call, highestBid);
                if (legalBid(bid)) return bid;
                if (bid === '1N' && legalBid('2N')) return '2N';
                return 'pass';
            }
            if (oppBids.length > 0 && myBids.length === 0 && partnerBids.length === 0) {
                const bid = computeOvercall(hcp, lengths, highestBid);
                if (legalBid(bid)) return bid;
                return 'pass';
            }
            return 'pass';
        }

        // ══════════════════════════════════════════════════════════════
        // 出牌演算法
        // ══════════════════════════════════════════════════════════════
        function legalCards(hand, trick, trumpSuit) {
            if (trick.length === 0) return hand;
            const ledSuit = trick[0].card.suit;
            const followers = hand.filter(c => c.suit === ledSuit);
            return followers.length > 0 ? followers : hand;
        }

        function trickWinner(trick, trumpSuit) {
            const led = trick[0].card.suit;
            let winner = trick[0];
            for (let i = 1; i < trick.length; i++) {
                const { card } = trick[i];
                const wCard = winner.card;
                const wIsTrump = trumpSuit && wCard.suit === trumpSuit;
                const cIsTrump = trumpSuit && card.suit === trumpSuit;
                if (cIsTrump && !wIsTrump) {
                    winner = trick[i];
                } else if (cIsTrump && wIsTrump && card.rank > wCard.rank) {
                    winner = trick[i];
                } else if (!cIsTrump && card.suit === led && !wIsTrump && card.rank > wCard.rank) {
                    winner = trick[i];
                }
            }
            return winner.seat;
        }

        function currentTrickWinner(trick, trumpSuit) {
            if (trick.length === 0) return -1;
            return trickWinner(trick, trumpSuit);
        }

        function aiSelectCard(seat, hand, trick, trumpSuit, contract) {
            const legal = legalCards(hand, trick, trumpSuit);
            if (legal.length === 1) return legal[0];

            if (trick.length === 0) {
                return aiLead(legal, trumpSuit);
            }

            const winnerSeat = currentTrickWinner(trick, trumpSuit);
            const partnerSeat = (seat + 2) % 4;
            const partnerIsWinning = winnerSeat === partnerSeat;

            if (partnerIsWinning) {
                return legal.sort((a, b) => a.rank - b.rank)[0];
            }

            const winningCard = trick.find(t => t.seat === winnerSeat).card;
            const canBeat = legal.filter(c => {
                if (trumpSuit && c.suit === trumpSuit && winningCard.suit !== trumpSuit) return true;
                if (c.suit === winningCard.suit && c.rank > winningCard.rank) return true;
                return false;
            });

            if (canBeat.length > 0) {
                return canBeat.sort((a, b) => a.rank - b.rank)[0];
            }
            return legal.sort((a, b) => a.rank - b.rank)[0];
        }

        function aiLead(hand, trumpSuit) {
            const nonTrump = trumpSuit ? hand.filter(c => c.suit !== trumpSuit) : hand;
            const pool = nonTrump.length > 0 ? nonTrump : hand;

            const bySuit = {};
            for (const c of pool) {
                if (!bySuit[c.suit]) bySuit[c.suit] = [];
                bySuit[c.suit].push(c);
            }
            for (const s of Object.keys(bySuit)) {
                bySuit[s].sort((a, b) => b.rank - a.rank);
            }

            for (const s of SUITS) {
                const cards = bySuit[s];
                if (!cards || cards.length < 2) continue;
                if (cards[0].rank - cards[1].rank === 1) return cards[0];
            }

            const longest = Object.values(bySuit).sort((a, b) => b.length - a.length)[0];
            if (longest) {
                if (longest.length >= 4) return longest[3];
                return longest[longest.length - 1];
            }
            return hand[0];
        }

        // ══════════════════════════════════════════════════════════════
        // 計分引擎
        // ══════════════════════════════════════════════════════════════
        function contractPoints(level, strain, doubled) {
            let base;
            if (strain === 'N') {
                base = 40 + 30 * (level - 1);
            } else {
                const tv = { C: 20, D: 20, H: 30, S: 30 }[strain];
                base = tv * level;
            }
            const mult = doubled === 0 ? 1 : doubled === 1 ? 2 : 4;
            return base * mult;
        }

        function isGameContract(level, strain, doubled) {
            return contractPoints(level, strain, doubled) >= 100;
        }

        function calculateHandScore(contract, tricksWon, vulnerable) {
            const { level, strain, declarer, doubled } = contract;
            const contractTricks = level + 6;
            const side = declarer % 2 === 0 ? 'NS' : 'EW';
            const oppSide = side === 'NS' ? 'EW' : 'NS';
            const isVul = vulnerable[side];
            const made = tricksWon >= contractTricks;

            if (made) {
                const overtricks = tricksWon - contractTricks;
                const below = contractPoints(level, strain, doubled);
                let overtrickVal;
                if (doubled === 0) {
                    const tv = { C:20, D:20, H:30, S:30, N:30 }[strain];
                    overtrickVal = tv * overtricks;
                } else {
                    const perOT = isVul ? 200 : 100;
                    overtrickVal = perOT * doubled * overtricks;
                }
                const doubleBonus = doubled >= 1 ? 50 : 0;
                let bonus = 0;
                const isGame = isGameContract(level, strain, doubled);
                if (level === 7)       bonus = isVul ? 1500 : 1000;
                else if (level === 6)  bonus = isVul ? 750 : 500;
                else if (isGame)       bonus = isVul ? 500 : 300;
                else                   bonus = 50;
                return { made: true, side, tricksWon, contractTricks, below, above: overtrickVal + doubleBonus + bonus, bonus, isGame };
            } else {
                const down = contractTricks - tricksWon;
                let penalty = 0;
                if (doubled === 0) {
                    penalty = isVul ? down * 100 : down * 50;
                } else {
                    const mult = doubled === 2 ? 2 : 1;
                    if (!isVul) {
                        penalty = mult * (100 + Math.max(0, down - 1) * 200 + Math.max(0, down - 3) * 100);
                    } else {
                        penalty = mult * (200 + Math.max(0, down - 1) * 300);
                    }
                }
                return { made: false, side: oppSide, penalty, down };
            }
        }

        function updateRubberScore(rubberScore, gamesWon, vulnerable, handResult) {
            const newScore = {
                NS: { below: [...rubberScore.NS.below], above: [...rubberScore.NS.above] },
                EW: { below: [...rubberScore.EW.below], above: [...rubberScore.EW.above] },
            };
            const newGames = { ...gamesWon };
            const newVul   = { ...vulnerable };
            let gameWon = false;

            if (handResult.made) {
                newScore[handResult.side].below.push(handResult.below);
                if (handResult.above > 0) newScore[handResult.side].above.push(handResult.above);
                const totalBelow = newScore[handResult.side].below.reduce((s, v) => s + v, 0);
                if (totalBelow >= 100) {
                    newGames[handResult.side]++;
                    newVul[handResult.side] = true;
                    newScore.NS.below = [];
                    newScore.EW.below = [];
                    gameWon = true;
                }
            } else {
                newScore[handResult.side].above.push(handResult.penalty);
            }
            return { rubberScore: newScore, gamesWon: newGames, vulnerable: newVul, gameWon };
        }

        function rubberBonus(gamesWon, winner) {
            const loser = winner === 'NS' ? 'EW' : 'NS';
            return gamesWon[loser] === 0 ? 700 : 500;
        }

        function totalScore(rubberScore, side) {
            const below = rubberScore[side].below.reduce((s, v) => s + v, 0);
            const above = rubberScore[side].above.reduce((s, v) => s + v, 0);
            return below + above;
        }

        // ══════════════════════════════════════════════════════════════
        // 初始狀態
        // ══════════════════════════════════════════════════════════════
        const INITIAL_STATE = {
            phase: 'menu',
            dealer: 0,
            vulnerable: { NS: false, EW: false },
            rubberScore: { NS: { below: [], above: [] }, EW: { below: [], above: [] } },
            gamesWon: { NS: 0, EW: 0 },
            rubberCount: 1,
            hands: [[], [], [], []],
            biddingSequence: [],
            currentBidder: 1,
            contract: null,
            auctionOver: false,
            dummySeat: -1,
            currentLeader: -1,
            currentTrick: [],
            tricksTaken: { NS: 0, EW: 0 },
            completedTricks: [],
            openingLeadMade: false,
            dummyRevealed: false,
            lastHandResult: null,
            lastCompletedTrick: null,
            rubberOver: false,
            rubberWinner: null,
            autoPlayDummy: false,
        };

        // ══════════════════════════════════════════════════════════════
        // 遊戲操作
        // ══════════════════════════════════════════════════════════════
        function startHand(state) {
            const deck = shuffle(buildDeck());
            const hands = [[], [], [], []];
            for (let i = 0; i < 52; i++) {
                hands[(state.dealer + 1 + i) % 4].push(deck[i]);
            }
            const sortedHands = hands.map(h => sortHand(h));
            return {
                ...state,
                phase: 'bidding',
                hands: sortedHands,
                biddingSequence: [],
                currentBidder: (state.dealer + 1) % 4,
                contract: null,
                auctionOver: false,
                dummySeat: -1,
                currentLeader: -1,
                currentTrick: [],
                tricksTaken: { NS: 0, EW: 0 },
                completedTricks: [],
                openingLeadMade: false,
                dummyRevealed: false,
                lastHandResult: null,
                lastCompletedTrick: null,
                rubberOver: false,
                rubberWinner: null,
            };
        }

        function addBid(state, call) {
            const newSeq = [...state.biddingSequence, { seat: state.currentBidder, call }];
            const auctionStatus = isAuctionOver(newSeq);
            if (auctionStatus === 'passedOut') {
                return {
                    ...state,
                    biddingSequence: newSeq,
                    auctionOver: true,
                    phase: 'passedOut',
                };
            }
            if (auctionStatus === 'contract') {
                const contract = extractContract(newSeq);
                const dummySeat = (contract.declarer + 2) % 4;
                const openingLeader = (contract.declarer + 1) % 4;
                return {
                    ...state,
                    biddingSequence: newSeq,
                    auctionOver: true,
                    contract,
                    dummySeat,
                    phase: 'playing',
                    currentLeader: openingLeader,
                    currentTrick: [],
                    lastCompletedTrick: null,
                    openingLeadMade: false,
                    dummyRevealed: false,
                };
            }
            return {
                ...state,
                biddingSequence: newSeq,
                currentBidder: (state.currentBidder + 1) % 4,
            };
        }

        function playCard(state, seat, card) {
            const newHand = state.hands[seat].filter(c => c.id !== card.id);
            const newHands = state.hands.map((h, i) => i === seat ? newHand : h);
            const newTrick = [...state.currentTrick, { seat, card }];
            const openingLeadMade = true;
            const dummyRevealed = true;

            if (newTrick.length < 4) {
                return { ...state, hands: newHands, currentTrick: newTrick, openingLeadMade, dummyRevealed };
            }

            const trumpSuit = state.contract.strain === 'N' ? null : state.contract.strain;
            const winnerSeat = trickWinner(newTrick, trumpSuit);
            const winnerSide = winnerSeat % 2 === 0 ? 'NS' : 'EW';
            const newTricksTaken = {
                ...state.tricksTaken,
                [winnerSide]: state.tricksTaken[winnerSide] + 1,
            };
            const completedTricks = [...state.completedTricks, newTrick];
            const totalTricks = newTricksTaken.NS + newTricksTaken.EW;

            if (totalTricks === 13) {
                const declarerSide = state.contract.declarer % 2 === 0 ? 'NS' : 'EW';
                const declarerTricks = newTricksTaken[declarerSide];
                const handResult = calculateHandScore(state.contract, declarerTricks, state.vulnerable);
                const { rubberScore, gamesWon, vulnerable, gameWon } = updateRubberScore(
                    state.rubberScore, state.gamesWon, state.vulnerable, handResult
                );

                let rubberOver = gamesWon.NS >= 2 || gamesWon.EW >= 2;
                let rubberWinner = null;
                let finalRubberScore = { ...rubberScore };
                if (rubberOver) {
                    rubberWinner = gamesWon.NS >= 2 ? 'NS' : 'EW';
                    const bonus = rubberBonus(gamesWon, rubberWinner);
                    finalRubberScore = {
                        ...rubberScore,
                        [rubberWinner]: {
                            ...rubberScore[rubberWinner],
                            above: [...rubberScore[rubberWinner].above, bonus],
                        },
                    };
                }

                return {
                    ...state,
                    hands: newHands,
                    currentTrick: [],
                    lastCompletedTrick: newTrick,
                    completedTricks,
                    tricksTaken: newTricksTaken,
                    currentLeader: winnerSeat,
                    openingLeadMade, dummyRevealed,
                    phase: 'handFinished', // 【修改】從 scoring 改為 handFinished，先暫留牌桌畫面
                    lastHandResult: handResult,
                    rubberScore: finalRubberScore,
                    gamesWon,
                    vulnerable,
                    rubberOver,
                    rubberWinner,
                };
            }

            return {
                ...state,
                hands: newHands,
                currentTrick: [],
                lastCompletedTrick: newTrick,
                completedTricks,
                tricksTaken: newTricksTaken,
                currentLeader: winnerSeat,
                openingLeadMade, dummyRevealed,
            };
        }

        // ══════════════════════════════════════════════════════════════
        // 介面輔助
        // ══════════════════════════════════════════════════════════════
        function contractDisplay(contract) {
            if (!contract) return '';
            const dbl = contract.doubled === 1 ? ' ✕' : contract.doubled === 2 ? ' ✕✕' : '';
            return `${contract.level}${STRAIN_SYMBOL[contract.strain]}${dbl}`;
        }

        function isHumanTurn(turnSeat, state) {
            const HUMAN_SEAT = 2; // South
            if (turnSeat === HUMAN_SEAT) return true;
            if (!state.autoPlayDummy && turnSeat === 0) {
                if (state.dummySeat === 0) return state.openingLeadMade;
                return true;
            }
            return false;
        }

        // ══════════════════════════════════════════════════════════════
        // 元件
        // ══════════════════════════════════════════════════════════════

        // 單張牌 (Responsive Scaling, 手機版大幅度加大版面)
        const Card = ({ card, onClick, isHidden, size = 'hand', selected, disabled, noHoverAnim }) => {
            const sizeMap = {
                // 手機版 (sm以下) 大幅增加基礎寬高，讓點擊面積與字體極大化
                hand: "w-20 h-32 sm:w-24 sm:h-36 md:w-28 md:h-40 lg:w-32 lg:h-48",
                trick: "w-14 h-20 sm:w-16 sm:h-24 md:w-20 md:h-28 lg:w-28 lg:h-40",
                sm: "w-16 h-24 sm:w-20 sm:h-28 md:w-24 md:h-32 lg:w-28 lg:h-40"
            };
            const textMap = {
                hand: "text-3xl sm:text-4xl md:text-5xl lg:text-6xl",
                trick: "text-xl sm:text-2xl md:text-3xl lg:text-4xl",
                sm: "text-2xl sm:text-3xl md:text-4xl lg:text-5xl"
            };
            const cornerTextMap = {
                // 手機版加大角標字體，確保收合時能清晰辨識
                hand: "text-base sm:text-lg md:text-xl lg:text-2xl",
                trick: "text-xs sm:text-sm md:text-base lg:text-xl",
                sm: "text-sm sm:text-base md:text-lg lg:text-xl"
            };

            const szCls = sizeMap[size] || sizeMap['hand'];
            const txtCls = textMap[size] || textMap['hand'];
            const cornCls = cornerTextMap[size] || cornerTextMap['hand'];

            if (isHidden) {
                return (
                    <div className={`${szCls} flex-shrink-0 bg-blue-900 rounded-lg sm:rounded-xl border-2 border-blue-600 shadow-md sm:shadow-lg relative overflow-hidden`}>
                        <div className="absolute inset-1 sm:inset-1.5 md:inset-2 rounded bg-gradient-to-br from-blue-700 to-blue-950 flex items-center justify-center">
                            <span className="text-blue-500/30 text-xs sm:text-sm md:text-xl lg:text-3xl select-none">🂠</span>
                        </div>
                    </div>
                );
            }

            const color = SUIT_COLOR_CSS[card.suit];
            const rank = RANK_LABEL[card.rank];
            const sym  = SUIT_SYMBOL[card.suit];

            return (
                <div
                    onClick={disabled ? undefined : onClick}
                    className={`${szCls} flex-shrink-0 bg-white rounded-lg sm:rounded-xl border border-gray-300 shadow-md sm:shadow-lg
                        flex flex-col justify-between p-1 sm:p-1.5 md:p-2 select-none relative
                        ${!disabled && !noHoverAnim ? 'cursor-pointer card-hover' : ''}
                        ${!disabled && noHoverAnim ? 'cursor-pointer' : ''}
                        ${selected ? 'card-selected ring-2 sm:ring-4 ring-yellow-400' : ''}
                        transition-all duration-200
                    `}
                >
                    <div className={`font-bold leading-none ${cornCls}`} style={{ color }}>{rank}{sym}</div>
                    <div className={`absolute inset-0 flex flex-col items-center justify-center pointer-events-none`}>
                        <span className={`font-black ${txtCls} opacity-80`} style={{ color }}>{sym}</span>
                    </div>
                    <div className={`font-bold leading-none self-end ${cornCls}`} style={{ color, transform: 'rotate(180deg)' }}>{rank}{sym}</div>
                </div>
            );
        };

        // 手牌展示（手機版雙排重疊放大配置，電腦版單排）
        const HandDisplay = ({ cards, isExpanded, onCardClick, legalIds = [], selectedId, clickable, disabledOverall, size = "sm" }) => {
            const [hoverIdx, setHoverIdx] = useState(null);
            
            // 偵測裝置螢幕寬度（用以決定是否啟用手機版特殊雙排版面）
            const [isMobile, setIsMobile] = useState(window.innerWidth < 640);
            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 640);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const isSmall = size === 'sm';
            
            // 手機版直式排版，牌數較多（>6）時自動切成兩排
            const useTwoRows = isMobile && cards.length > 6;

            // 分割陣列為上下兩排
            const rows = useTwoRows
                ? [cards.slice(0, Math.ceil(cards.length / 2)), cards.slice(Math.ceil(cards.length / 2))]
                : [cards];

            // 依據 size、expanded 狀態與是否雙排來動態設定容器高度
            let containerHeight = "";
            if (useTwoRows) {
                // 精確計算雙排高度：
                // sm 大小 (高度24/96px): 展開 144px(h-36), 收合 64px(h-16)
                // hand 大小 (高度32/128px): 展開 192px(h-48), 收合 80px(h-20)
                containerHeight = isExpanded 
                    ? (isSmall ? "h-36" : "h-48") 
                    : (isSmall ? "h-16" : "h-20");
            } else {
                const containerHeightCollapsed = isSmall ? "h-6 sm:h-8 md:h-10 lg:h-12" : "h-8 sm:h-10 md:h-12 lg:h-14";
                const containerHeightExpanded = isSmall 
                    ? "h-24 sm:h-28 md:h-32 lg:h-40"
                    : "h-32 sm:h-36 md:h-40 lg:h-48";
                containerHeight = isExpanded ? containerHeightExpanded : containerHeightCollapsed;
            }

            // 展開時不裁切（允許懸浮卡片突破容器），收合時底部裁切掉以達成「只看到半張牌」
            const clipStyle = isExpanded ? 'none' : 'inset(-150px -150px 0 -150px)';

            // 用於追蹤全域的卡片 index (Hover 動畫需要)
            let globalCardIndex = 0;

            return (
                <div
                    className={`flex flex-col items-center justify-start pt-1 w-full transition-all duration-300 ${containerHeight}`}
                    style={{ clipPath: clipStyle }}
                    onMouseLeave={() => setHoverIdx(null)}
                >
                    {rows.map((rowCards, rowIdx) => {
                        // 紀錄目前這一排的起始與結束 index
                        const rowStartIndex = globalCardIndex;
                        const rowEndIndex = globalCardIndex + rowCards.length - 1;

                        // 雙排時的垂直重疊
                        let rowMarginTop = "";
                        if (rowIdx > 0) {
                            rowMarginTop = isExpanded
                                // 展開：露出大約半張牌的資訊
                                ? (isSmall ? "-mt-12" : "-mt-16") 
                                // 收合：極度緊密壓縮，精準只顯示頂部角標 (約露出 2~2.5rem 左右)
                                : (isSmall ? "-mt-16" : "-mt-[5.5rem]"); 
                        }

                        return (
                            <div key={rowIdx} className={`flex justify-center w-full ${rowMarginTop} relative`} style={{ zIndex: (rowIdx + 1) * 10 }}>
                                {rowCards.map((c, idxInRow) => {
                                    const i = globalCardIndex++;
                                    const isLegal = legalIds.length === 0 || legalIds.includes(c.id);
                                    const isSel = selectedId && selectedId === c.id;
                                    
                                    const isHoverInThisRow = hoverIdx !== null && hoverIdx >= rowStartIndex && hoverIdx <= rowEndIndex;

                                    // 手風琴推移距離 (因卡片變大，推開距離隨之增長)
                                    let translateX = 0;
                                    let translateY = 0;
                                    if (isHoverInThisRow) {
                                        if (i < hoverIdx) translateX = isSmall ? -6 : -10;
                                        if (i > hoverIdx) translateX = isExpanded ? (isSmall ? 40 : 64) : (isSmall ? 28 : 44);
                                        if (i === hoverIdx) {
                                            translateX = isSmall ? 4 : 6;
                                            translateY = isSmall ? -10 : -16;
                                        }
                                    }
                                    if (isSel) translateY = isSmall ? -12 : -20;

                                    // 基礎橫向疊合距
                                    // 雙排時每排張數少，可用較小的重疊；單排張數多，重疊需加大
                                    const marginCollapsed = idxInRow === 0 ? 'ml-0' : (
                                        isSmall 
                                            ? (useTwoRows ? '-ml-8' : '-ml-10 sm:-ml-12 md:-ml-14 lg:-ml-16')
                                            : (useTwoRows ? '-ml-11' : '-ml-14 sm:-ml-16 md:-ml-20 lg:-ml-24')
                                    );
                                    const marginExpanded  = idxInRow === 0 ? 'ml-0' : (
                                        isSmall 
                                            ? (useTwoRows ? '-ml-6' : '-ml-7 sm:-ml-8 md:-ml-10 lg:-ml-12')
                                            : (useTwoRows ? '-ml-8' : '-ml-10 sm:-ml-12 md:-ml-14 lg:-ml-16')
                                    );
                                    const baseMargin = isExpanded ? marginExpanded : marginCollapsed;

                                    return (
                                        <div
                                            key={c.id}
                                            onMouseEnter={() => setHoverIdx(i)}
                                            onClick={() => {
                                                if (clickable && isLegal && onCardClick) onCardClick(c);
                                                // 觸控裝置單點亦可展開手風琴
                                                if (hoverIdx !== i) setHoverIdx(i);
                                            }}
                                            className={`relative transition-all duration-200 ease-out cursor-pointer ${baseMargin}`}
                                            style={{
                                                zIndex: isSel ? 100 : (hoverIdx === i ? 50 : idxInRow),
                                                transform: `translate(${translateX}px, ${translateY}px)`
                                            }}
                                        >
                                            <Card
                                                card={c}
                                                size={size}
                                                selected={isSel}
                                                disabled={disabledOverall || (!clickable && legalIds.length === 0) || (clickable && !isLegal)}
                                                noHoverAnim={true} // 避免 card 本身的 hover 衝突，由外層控制
                                            />
                                        </div>
                                    );
                                })}
                            </div>
                        );
                    })}
                </div>
            );
        };

        // 玩家徽章
        const PlayerBadge = ({ name, isActive, isHuman }) => (
            <div className={`glass-panel rounded-full px-3 sm:px-4 md:px-5 py-1 sm:py-1.5 md:py-2 text-[10px] sm:text-xs md:text-sm font-bold flex items-center gap-1.5 transition-all
                ${isActive ? 'text-yellow-300 pulse-ring' : 'text-gray-400'}`}>
                <span>{isHuman ? '👤' : '🤖'}</span>
                <span>{name}</span>
                {isActive && <span className="animate-pulse text-yellow-400">●</span>}
            </div>
        );

        // 叫牌紀錄
        const AuctionBox = ({ sequence, dealer }) => {
            const firstBidder = (dealer + 1) % 4;
            const padded = [...Array(firstBidder).fill(null), ...sequence];
            const rows = [];
            for (let i = 0; i < padded.length; i += 4) {
                rows.push(padded.slice(i, i + 4));
            }
            const headers = ['北', '東', '南', '西'];

            const callDisplay = (call) => {
                if (!call) return '-';
                if (call === 'pass') return '過';
                if (call === 'dbl') return '加';
                if (call === 'rdbl') return '再';
                return `${call[0]}${STRAIN_SYMBOL[call.slice(1)]}`;
            };

            const callColor = (call) => {
                if (!call) return 'text-gray-600';
                if (call === 'pass') return 'text-gray-400';
                if (call === 'dbl') return 'text-orange-400 font-bold';
                if (call === 'rdbl') return 'text-purple-400 font-bold';
                if (call.endsWith('H') || call.endsWith('D')) return 'text-red-400 font-bold';
                if (call.endsWith('C')) return 'text-green-400 font-bold'; // 增加梅花的紀錄辨識度
                return 'text-white font-bold';
            };

            return (
                <div className="glass-panel rounded-2xl sm:rounded-3xl p-3 sm:p-5 md:p-6 w-[260px] sm:w-[380px] md:w-[480px] lg:w-[600px] shadow-lg">
                    <div className="grid grid-cols-4 gap-1 text-center mb-2 sm:mb-4">
                        {headers.map((h, i) => (
                            <span key={i} className="text-yellow-400 font-bold text-xs sm:text-base md:text-xl lg:text-2xl">{h}</span>
                        ))}
                    </div>
                    <div className="border-b border-white/20 mb-2 sm:mb-4" />
                    <div className="overflow-y-auto hide-scrollbar" style={{ maxHeight: '40vh' }}>
                        {rows.map((row, ri) => (
                            <div key={ri} className="grid grid-cols-4 gap-1 text-center py-1 sm:py-2">
                                {row.map((entry, ci) => (
                                    <span key={ci} className={`text-xs sm:text-lg md:text-xl lg:text-2xl ${callColor(entry ? entry.call : null)}`}>
                                        {callDisplay(entry ? entry.call : null)}
                                    </span>
                                ))}
                            </div>
                        ))}
                        {rows.length === 0 && (
                            <div className="text-gray-500 text-xs sm:text-base md:text-xl text-center py-4">等待叫牌...</div>
                        )}
                    </div>
                </div>
            );
        };

        // 底抽屜叫牌面板
        const BiddingSheet = ({ onBid, sequence, visible }) => {
            const [isExpanded, setIsExpanded] = useState(true);

            useEffect(() => {
                if (visible) setIsExpanded(true);
            }, [visible]);

            if (!visible) return null;

            const highest = getCurrentHighestBid(sequence);
            const canDbl  = canDoubleNow(sequence, 2);
            const canRdbl = canRedoubleNow(sequence, 2);

            if (!isExpanded) {
                return (
                    <div className="fixed bottom-0 left-0 right-0 z-50 animate-slide-up">
                        <div
                            className="glass-panel rounded-t-2xl px-4 py-3 md:py-4 flex items-center justify-center gap-2 cursor-pointer"
                            onClick={() => setIsExpanded(true)}
                        >
                            <div className="w-12 h-1.5 md:h-2 bg-gray-400 rounded-full" />
                            <span className="text-yellow-300 text-sm md:text-lg font-bold">展開叫牌</span>
                            <span className="text-yellow-400 text-sm md:text-lg">▲</span>
                        </div>
                    </div>
                );
            }

            return (
                <div className="fixed bottom-0 left-0 right-0 z-50 animate-slide-up max-w-4xl mx-auto">
                    <div className="glass-panel rounded-t-3xl sm:rounded-t-[3rem] p-4 sm:p-6 md:p-8 pb-safe max-h-[75vh] overflow-y-auto hide-scrollbar shadow-2xl border-t border-white/20">
                        <div
                            className="flex items-center justify-center gap-2 cursor-pointer mb-4 sm:mb-6"
                            onClick={() => setIsExpanded(false)}
                        >
                            <div className="w-12 h-1.5 md:h-2 bg-gray-500 rounded-full" />
                            <span className="text-gray-400 text-[10px] sm:text-xs md:text-sm">收合 ▼</span>
                        </div>
                        <p className="text-yellow-300 text-center text-sm sm:text-lg md:text-xl font-bold mb-4 sm:mb-6">您的叫牌</p>
                        <div className="grid grid-cols-5 gap-1.5 sm:gap-3 lg:gap-4 mb-4 sm:mb-6">
                            {[1,2,3,4,5,6,7].flatMap(level =>
                                ['C','D','H','S','N'].map(strain => {
                                    const bid = `${level}${strain}`;
                                    const legal = !highest || bidValue(bid) > bidValue(highest);
                                    const isRed = strain === 'H' || strain === 'D';
                                    const isGrn = strain === 'C';
                                    return (
                                        <button key={bid}
                                            onClick={() => legal && onBid(bid)}
                                            disabled={!legal}
                                            className={`py-3 sm:py-4 md:py-5 rounded-xl sm:rounded-2xl text-sm sm:text-lg md:text-xl lg:text-2xl font-bold transition-all shadow-sm
                                                ${legal
                                                    ? isRed ? 'bg-red-800/80 hover:bg-red-700 text-white active:scale-95'
                                                    : isGrn ? 'bg-green-600/90 hover:bg-green-500 text-white shadow-inner active:scale-95' // 梅花改為較亮綠色與純白字
                                                    : 'bg-gray-700/80 hover:bg-gray-600 text-white active:scale-95'
                                                    : 'bg-gray-800/40 text-gray-600 cursor-not-allowed opacity-40'
                                                }`}
                                        >
                                            {level}{STRAIN_SYMBOL[strain]}
                                        </button>
                                    );
                                })
                            )}
                        </div>
                        <div className="flex gap-2 sm:gap-4">
                            <button onClick={() => onBid('pass')}
                                className="flex-1 bg-gray-700/80 hover:bg-gray-600 text-white py-3 sm:py-5 md:py-6 rounded-xl sm:rounded-2xl font-bold text-base sm:text-xl md:text-2xl active:scale-95 transition-all shadow-md">
                                過叫
                            </button>
                            <button onClick={() => canDbl && onBid('dbl')}
                                disabled={!canDbl}
                                className={`flex-1 py-3 sm:py-5 md:py-6 rounded-xl sm:rounded-2xl font-bold text-base sm:text-xl md:text-2xl transition-all shadow-md
                                    ${canDbl ? 'bg-orange-800/80 hover:bg-orange-700 text-white active:scale-95' : 'bg-gray-800/40 text-gray-600 opacity-40 cursor-not-allowed'}`}>
                                加倍
                            </button>
                            <button onClick={() => canRdbl && onBid('rdbl')}
                                disabled={!canRdbl}
                                className={`flex-1 py-3 sm:py-5 md:py-6 rounded-xl sm:rounded-2xl font-bold text-base sm:text-xl md:text-2xl transition-all shadow-md
                                    ${canRdbl ? 'bg-purple-800/80 hover:bg-purple-700 text-white active:scale-95' : 'bg-gray-800/40 text-gray-600 opacity-40 cursor-not-allowed'}`}>
                                再加倍
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // HCP 顯示
        const HandHCP = ({ hand }) => {
            const hcp = calcHCP(hand);
            const lens = suitLengths(hand);
            return (
                <div className="text-[10px] sm:text-xs md:text-sm lg:text-base text-gray-300 text-center flex flex-wrap justify-center items-center gap-1.5 sm:gap-2.5 mt-1 sm:mt-2">
                    <span className="text-yellow-300 font-bold bg-black/50 px-2 sm:px-2.5 py-0.5 rounded border border-white/20 shadow-md">
                        {hcp} HCP
                    </span>
                    {SUITS.map(s => (
                        <span key={s} 
                            style={{ color: SUIT_COLOR_DARK_BG[s] }} 
                            className="bg-black/50 px-1.5 sm:px-2 py-0.5 rounded border border-white/20 shadow-md font-bold flex items-center gap-0.5"
                        >
                            <span className="opacity-90">{SUIT_SYMBOL[s]}</span>
                            <span>{lens[s]}</span>
                        </span>
                    ))}
                </div>
            );
        };

        // 計分卡
        const ScoreCard = ({ rubberScore, gamesWon, vulnerable }) => {
            const nsBelow = rubberScore.NS.below;
            const ewBelow = rubberScore.EW.below;
            const nsAbove = rubberScore.NS.above;
            const ewAbove = rubberScore.EW.above;

            return (
                <div className="glass-panel rounded-2xl sm:rounded-3xl p-4 sm:p-6 md:p-8 w-full max-w-xs sm:max-w-md md:max-w-lg shadow-lg">
                    <div className="grid grid-cols-3 gap-1 sm:gap-2 text-xs sm:text-sm md:text-base text-center mb-3 sm:mb-5">
                        <div></div>
                        <div className="text-yellow-300 font-bold">NS{vulnerable.NS ? ' ●' : ''}</div>
                        <div className="text-yellow-300 font-bold">EW{vulnerable.EW ? ' ●' : ''}</div>
                    </div>
                    {/* 高線 */}
                    <div className="text-[10px] sm:text-xs md:text-sm text-gray-400 text-center mb-1 sm:mb-2 tracking-widest">── 高線 ──</div>
                    {[...Array(Math.max(nsAbove.length, ewAbove.length, 1))].map((_, i) => (
                        <div key={i} className="grid grid-cols-3 gap-1 sm:gap-2 text-xs sm:text-sm md:text-base text-center py-0.5">
                            <div></div>
                            <div className="text-green-300 font-semibold">{nsAbove[i] != null ? nsAbove[i] : ''}</div>
                            <div className="text-green-300 font-semibold">{ewAbove[i] != null ? ewAbove[i] : ''}</div>
                        </div>
                    ))}
                    <div className="border-b border-yellow-500/60 my-2 sm:my-4" />
                    {/* 低線 */}
                    <div className="text-[10px] sm:text-xs md:text-sm text-gray-400 text-center mb-1 sm:mb-2 tracking-widest">── 低線 ──</div>
                    {[...Array(Math.max(nsBelow.length, ewBelow.length, 1))].map((_, i) => (
                        <div key={i} className="grid grid-cols-3 gap-1 sm:gap-2 text-xs sm:text-sm md:text-base text-center py-0.5">
                            <div></div>
                            <div className="text-white font-semibold">{nsBelow[i] != null ? nsBelow[i] : ''}</div>
                            <div className="text-white font-semibold">{ewBelow[i] != null ? ewBelow[i] : ''}</div>
                        </div>
                    ))}
                    <div className="border-b border-yellow-500/60 my-2 sm:my-4" />
                    <div className="grid grid-cols-3 gap-1 sm:gap-2 text-xs sm:text-sm md:text-base text-center font-bold">
                        <div className="text-gray-400">局數</div>
                        <div className="text-yellow-300">{gamesWon.NS}</div>
                        <div className="text-yellow-300">{gamesWon.EW}</div>
                    </div>
                    {vulnerable.NS && <div className="text-[9px] sm:text-[10px] md:text-xs text-center text-orange-300 mt-2 sm:mt-3">● = 有局方，罰分加倍</div>}
                </div>
            );
        };

        // ══════════════════════════════════════════════════════════════
        // 主畫面
        // ══════════════════════════════════════════════════════════════
        function App() {
            const [gameState, setGameState] = useState(INITIAL_STATE);
            const [selectedCard, setSelectedCard] = useState(null);
            
            // 手牌展開/收合狀態
            const [southExpanded, setSouthExpanded] = useState(true);
            const [northExpanded, setNorthExpanded] = useState(false);

            const { phase, hands, biddingSequence, currentBidder, contract,
                    dealer, vulnerable, rubberScore, gamesWon, dummySeat,
                    currentLeader, currentTrick, tricksTaken, openingLeadMade,
                    dummyRevealed, lastHandResult, lastCompletedTrick,
                    rubberOver, rubberWinner, autoPlayDummy } = gameState;

            const HUMAN_SEAT = 2;
            const trumpSuit = contract && contract.strain !== 'N' ? contract.strain : null;

            // ── AI 叫牌 ──────────────────────────────────
            useEffect(() => {
                if (phase !== 'bidding') return;
                if (currentBidder === HUMAN_SEAT) return;
                const t = setTimeout(() => {
                    setGameState(prev => {
                        if (prev.phase !== 'bidding' || prev.currentBidder === HUMAN_SEAT) return prev;
                        const call = aiBid(prev.currentBidder, prev.hands[prev.currentBidder], prev.biddingSequence);
                        return addBid(prev, call);
                    });
                }, 500);
                return () => clearTimeout(t);
            }, [phase, biddingSequence.length, currentBidder]);

            // ── 流局後自動重發 ──────────────────────────
            useEffect(() => {
                if (phase !== 'passedOut') return;
                const t = setTimeout(() => {
                    setGameState(prev => {
                        if (prev.phase !== 'passedOut') return prev;
                        return startHand({ ...prev, dealer: (prev.dealer + 1) % 4 });
                    });
                }, 1500);
                return () => clearTimeout(t);
            }, [phase]);

            // ── AI 出牌 ──────────────────────────────────
            useEffect(() => {
                if (phase !== 'playing') return;
                const turnSeat = (currentLeader + currentTrick.length) % 4;
                if (isHumanTurn(turnSeat, gameState)) return;
                const t = setTimeout(() => {
                    setGameState(prev => {
                        if (prev.phase !== 'playing') return prev;
                        const ts = (prev.currentLeader + prev.currentTrick.length) % 4;
                        if (isHumanTurn(ts, prev)) return prev;
                        const tr = prev.contract.strain === 'N' ? null : prev.contract.strain;
                        const card = aiSelectCard(ts, prev.hands[ts], prev.currentTrick, tr, prev.contract);
                        return playCard(prev, ts, card);
                    });
                }, 700);
                return () => clearTimeout(t);
            }, [phase, currentTrick.length, currentLeader, openingLeadMade]);

            // ── 清除上一墩殘留 ───────────────────────
            useEffect(() => {
                if (!lastCompletedTrick) return;
                if (phase === 'handFinished') return; // 【新增】如果是結束等待畫面，不要把最後一墩清掉
                const t = setTimeout(() => {
                    setGameState(prev => ({ ...prev, lastCompletedTrick: null }));
                }, 2500);
                return () => clearTimeout(t);
            }, [lastCompletedTrick, phase]);

            // ── 自動控制手牌展開狀態 ────────────────────────
            useEffect(() => {
                if (phase === 'bidding') {
                    setSouthExpanded(currentBidder === 2);
                    setNorthExpanded(currentBidder === 0);
                } else if (phase === 'playing') {
                    const turnSeat = (currentLeader + currentTrick.length) % 4;
                    setSouthExpanded(turnSeat === 2);
                    // 北家若為人類操控，則輪到時自動展開
                    if (turnSeat === 0 && (!autoPlayDummy && (dummySeat === 0 ? openingLeadMade : true))) {
                        setNorthExpanded(true);
                    } else {
                        setNorthExpanded(false);
                    }
                } else if (phase === 'handFinished' || phase === 'scoring') {
                    // 【新增】結束時自動收合所有手牌，聚焦於中間的最後一墩
                    setSouthExpanded(false);
                    setNorthExpanded(false);
                }
            }, [phase, currentBidder, currentLeader, currentTrick.length, autoPlayDummy, dummySeat, openingLeadMade]);

            // ── 人類出牌 ──────────────────────────────────────────
            const handleCardClick = (seat, card) => {
                if (phase !== 'playing') return;
                const turnSeat = (currentLeader + currentTrick.length) % 4;
                if (turnSeat !== seat) return;
                if (!isHumanTurn(seat, gameState)) return;
                const legal = legalCards(hands[seat], currentTrick, trumpSuit);
                if (!legal.find(c => c.id === card.id)) return;
                if (selectedCard && selectedCard.id === card.id) {
                    setSelectedCard(null);
                    setGameState(prev => playCard(prev, seat, card));
                } else {
                    setSelectedCard(card);
                }
            };

            const handleConfirmPlay = (seat) => {
                if (!selectedCard) return;
                const legal = legalCards(hands[seat], currentTrick, trumpSuit);
                if (!legal.find(c => c.id === selectedCard.id)) return;
                const card = selectedCard;
                setSelectedCard(null);
                setGameState(prev => playCard(prev, seat, card));
            };

            const handleBid = (call) => {
                if (phase !== 'bidding' || currentBidder !== HUMAN_SEAT) return;
                setGameState(prev => addBid(prev, call));
            };

            const turnSeat = phase === 'playing' ? (currentLeader + currentTrick.length) % 4 : -1;
            const isMyTurn = phase === 'playing' && isHumanTurn(turnSeat, gameState);

            const displayTrick = currentTrick.length > 0 ? currentTrick : lastCompletedTrick;
            const isLastTrick  = currentTrick.length === 0 && lastCompletedTrick !== null;
            const lastTrickWinner = isLastTrick
                ? trickWinner(lastCompletedTrick, contract && contract.strain !== 'N' ? contract.strain : null)
                : -1;

            const humanControlsDummy = !autoPlayDummy;
            const southLegal = phase === 'playing' && turnSeat === HUMAN_SEAT
                ? legalCards(hands[HUMAN_SEAT], currentTrick, trumpSuit).map(c => c.id)
                : [];
            const northIsHumanControlled = humanControlsDummy && (dummySeat !== 0 || openingLeadMade);
            const northLegal = phase === 'playing' && turnSeat === 0 && northIsHumanControlled
                ? legalCards(hands[0], currentTrick, trumpSuit).map(c => c.id)
                : [];
            const isNorthTurn = turnSeat === 0;
            const isSouthTurn = turnSeat === HUMAN_SEAT;
            const northClickable = isNorthTurn && northIsHumanControlled;
            const southClickable = isSouthTurn;

            // ── 渲染 ──────────────────────────────────────────────

            if (phase === 'menu') {
                const hasGame = gamesWon.NS > 0 || gamesWon.EW > 0 ||
                                rubberScore.NS.below.length > 0 || rubberScore.EW.below.length > 0 ||
                                rubberScore.NS.above.length > 0 || rubberScore.EW.above.length > 0;
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 sm:p-8 gap-5 sm:gap-8 overflow-y-auto hide-scrollbar relative">
                        <div className="glass-panel rounded-3xl sm:rounded-[2.5rem] p-6 sm:p-10 text-center w-full max-w-md animate-fade-in shadow-2xl">
                            <div className="text-4xl sm:text-6xl mb-4 tracking-wider flex justify-center gap-2">
                                <span style={{color:'#0f172a'}}>♠</span>
                                <span style={{color:'#dc2626'}}>♥</span>
                                <span style={{color:'#ea580c'}}>♦</span>
                                <span style={{color:'#166534'}}>♣</span>
                            </div>
                            <h1 className="text-white text-3xl sm:text-4xl font-bold mb-2">橋牌單機遊戲</h1>
                            <p className="text-green-300 text-sm sm:text-lg">橡皮橋制 · 南家視角</p>
                            <p className="text-gray-400 text-xs sm:text-sm mt-2">第 {gameState.rubberCount} 橡皮牌</p>
                        </div>

                        {hasGame && <ScoreCard rubberScore={rubberScore} gamesWon={gamesWon} vulnerable={vulnerable} />}

                        <div className="flex flex-col gap-3 sm:gap-5 w-full max-w-md z-10">
                            <button
                                onClick={() => setGameState(prev => startHand(prev))}
                                className="w-full bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-600 text-gray-900 font-bold py-4 sm:py-5 md:py-6 rounded-2xl sm:rounded-3xl text-lg sm:text-2xl shadow-xl transition-all active:scale-95">
                                {hasGame ? '繼續下一局 →' : '開始遊戲 →'}
                            </button>
                            <button
                                onClick={() => setGameState(prev => ({ ...prev, autoPlayDummy: !prev.autoPlayDummy }))}
                                className={`w-full font-bold py-3 sm:py-4 md:py-5 rounded-2xl sm:rounded-3xl text-sm sm:text-lg shadow transition-all active:scale-95 border
                                    ${autoPlayDummy
                                        ? 'glass-panel border-gray-500/50 text-gray-300'
                                        : 'glass-panel border-blue-400/50 text-blue-200'
                                    }`}>
                                北家全權由我出牌：{autoPlayDummy ? '❌ 關閉（AI代出）' : '✅ 開啟（我自己出）'}
                            </button>
                            <button
                                onClick={() => setGameState({
                                    ...INITIAL_STATE,
                                    rubberCount: gameState.rubberCount + (hasGame ? 1 : 0)
                                })}
                                className="w-full glass-panel border border-white/10 text-gray-300 font-bold py-3 sm:py-4 md:py-5 rounded-2xl sm:rounded-3xl text-sm sm:text-lg shadow transition-all active:scale-95">
                                新橡皮牌
                            </button>
                        </div>
                        <p className="text-gray-500 text-xs sm:text-sm text-center z-10">南家與北家(明手)對抗東西家 AI</p>
                    </div>
                );
            }

            if (phase === 'passedOut') {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 gap-4">
                        <div className="glass-panel rounded-3xl sm:rounded-[3rem] p-10 sm:p-16 md:p-20 text-center animate-fade-in shadow-2xl">
                            <div className="text-6xl sm:text-8xl mb-4 sm:mb-6">🃏</div>
                            <h2 className="text-white text-3xl sm:text-5xl font-bold mb-3 sm:mb-5">四家皆過叫</h2>
                            <p className="text-green-300 text-lg sm:text-2xl">流局，換莊重新發牌...</p>
                        </div>
                    </div>
                );
            }

            if (phase === 'bidding') {
                const isHumanBidTurn = currentBidder === HUMAN_SEAT;
                const vulStr = vulnerable.NS && vulnerable.EW ? '雙方有局' : vulnerable.NS ? 'NS有局' : vulnerable.EW ? 'EW有局' : '無局';
                return (
                    <div className="flex-1 flex flex-col overflow-hidden relative">
                        {/* Top bar */}
                        <div className="glass-panel flex items-center justify-between px-4 sm:px-8 py-2 sm:py-3 shrink-0 shadow-sm z-10">
                            <div className="flex items-center gap-2">
                                <PlayerBadge name="北家" isActive={currentBidder === 0} isHuman={false} />
                            </div>
                            <span className="text-gray-300 text-xs sm:text-sm md:text-base font-bold">{vulStr} · 第{gamesWon.NS + gamesWon.EW + 1}局</span>
                            <div className="flex items-center gap-2">
                                <PlayerBadge name="東家" isActive={currentBidder === 1} isHuman={false} />
                            </div>
                        </div>

                        {/* North preview */}
                        <div className="glass-light mx-3 sm:mx-8 md:mx-12 lg:mx-20 mt-2 sm:mt-4 rounded-2xl sm:rounded-3xl p-2 sm:p-4 shrink-0 shadow-lg z-10 relative">
                            <button
                                onClick={() => setNorthExpanded(!northExpanded)}
                                className="absolute top-2 right-2 text-[10px] sm:text-xs text-yellow-300 bg-black/40 hover:bg-black/60 px-2 py-1 rounded-lg font-bold border border-yellow-600/50 z-20"
                            >
                                {northExpanded ? '收合 ▲' : '展開 ▼'}
                            </button>
                            <div className="flex flex-col items-center gap-1 sm:gap-2">
                                <HandHCP hand={hands[0]} />
                                <HandDisplay
                                    cards={hands[0]}
                                    isExpanded={northExpanded}
                                    disabledOverall={true}
                                    size="sm"
                                />
                            </div>
                        </div>

                        {/* Center auction */}
                        <div className="flex-1 flex items-center justify-center gap-2 sm:gap-4 md:gap-8 py-2 sm:py-4 px-2 sm:px-4 overflow-hidden relative">
                            {/* West */}
                            <div className="flex flex-col items-center gap-1 sm:gap-2">
                                <PlayerBadge name="西家" isActive={currentBidder === 3} isHuman={false} />
                                <HandHCP hand={hands[3]} />
                            </div>

                            {/* Auction */}
                            <AuctionBox sequence={biddingSequence} dealer={dealer} />

                            {/* East (HCP only, badge is top right) */}
                            <div className="flex flex-col items-center gap-1 sm:gap-2">
                                <PlayerBadge name="東家" isActive={currentBidder === 1} isHuman={false} />
                                <HandHCP hand={hands[1]} />
                            </div>
                        </div>

                        {/* South preview */}
                        <div className="glass-light mx-3 sm:mx-8 md:mx-12 lg:mx-20 mb-2 sm:mb-4 rounded-2xl sm:rounded-3xl p-2 sm:p-4 shrink-0 shadow-lg z-10 relative">
                            <button
                                onClick={() => setSouthExpanded(!southExpanded)}
                                className="absolute top-2 right-2 text-[10px] sm:text-xs text-yellow-300 bg-black/40 hover:bg-black/60 px-2 py-1 rounded-lg font-bold border border-yellow-600/50 z-20"
                            >
                                {southExpanded ? '收合 ▲' : '展開 ▼'}
                            </button>
                            <div className="flex flex-col items-center gap-1.5 sm:gap-3">
                                <div className="flex items-center gap-2">
                                    <PlayerBadge name="南家（您）" isActive={isHumanBidTurn} isHuman={true} />
                                </div>
                                <HandHCP hand={hands[HUMAN_SEAT]} />
                                <HandDisplay
                                    cards={hands[HUMAN_SEAT]}
                                    isExpanded={southExpanded}
                                    disabledOverall={true}
                                    size="sm"
                                />
                            </div>
                        </div>

                        {/* Waiting prompt */}
                        {!isHumanBidTurn && (
                            <div className="text-center text-gray-300 text-sm sm:text-base md:text-xl lg:text-2xl animate-pulse pb-4 sm:pb-8">
                                {SEAT_NAME[currentBidder]}家思考中...
                            </div>
                        )}

                        <BiddingSheet onBid={handleBid} sequence={biddingSequence} visible={isHumanBidTurn} />
                    </div>
                );
            }

            // 【修改】將 handFinished 狀態與 playing 合併顯示在同一個打牌介面中
            if (phase === 'playing' || phase === 'handFinished') {
                const contractStr = contractDisplay(contract);
                const declarerName = contract ? SEAT_NAME[contract.declarer] : '';

                return (
                    <div className="flex-1 flex flex-col overflow-hidden w-full h-full">
                        {/* Top bar */}
                        <div className="glass-panel flex items-center justify-between px-4 sm:px-8 py-2 sm:py-4 shrink-0 z-10 shadow-sm">
                            <div className="flex items-center gap-2 sm:gap-4">
                                <span className="text-white font-bold text-sm sm:text-lg md:text-2xl tracking-wider">{contractStr}</span>
                                {contract && (
                                    <span className="text-gray-300 text-xs sm:text-sm md:text-lg lg:text-xl">
                                        {declarerName}家{autoPlayDummy ? ' · 北家AI' : ' · 北家自控'}
                                    </span>
                                )}
                            </div>
                            <div className="text-xs sm:text-sm md:text-lg lg:text-xl text-gray-300 flex items-center gap-2 sm:gap-4 bg-black/40 px-3 sm:px-5 py-1 sm:py-2 rounded-full border border-white/10">
                                <span>NS <span className="text-yellow-300 font-bold ml-1">{tricksTaken.NS}</span></span>
                                <span className="text-gray-500">|</span>
                                <span>EW <span className="text-yellow-300 font-bold ml-1">{tricksTaken.EW}</span></span>
                            </div>
                        </div>

                        {/* North hand */}
                        {(() => {
                            const northFaceUp = dummyRevealed || (humanControlsDummy && dummySeat !== 0);
                            const northLabel = dummyRevealed ? '（明手）' : (humanControlsDummy && dummySeat !== 0 ? '（防守）' : '');
                            return (
                                <div className="glass-light mx-2 sm:mx-6 md:mx-10 mt-2 sm:mt-4 rounded-2xl sm:rounded-3xl p-2 sm:p-4 shrink-0 shadow-lg z-10 relative">
                                    {northFaceUp && (
                                        <button
                                            onClick={() => setNorthExpanded(!northExpanded)}
                                            className="absolute top-2 right-2 text-[10px] sm:text-xs text-yellow-300 bg-black/40 hover:bg-black/60 px-2 py-1 rounded-lg font-bold border border-yellow-600/50 z-20"
                                        >
                                            {northExpanded ? '收合 ▲' : '展開 ▼'}
                                        </button>
                                    )}
                                    <div className="flex flex-col items-center gap-2 sm:gap-3">
                                        <PlayerBadge name={`北家${northLabel}`} isActive={isNorthTurn} isHuman={false} />
                                        {northFaceUp ? (
                                            <HandDisplay
                                                cards={hands[0]}
                                                isExpanded={northExpanded}
                                                onCardClick={(c) => handleCardClick(0, c)}
                                                legalIds={northLegal}
                                                selectedId={selectedCard && northClickable ? selectedCard.id : null}
                                                clickable={northClickable}
                                                size="hand"
                                            />
                                        ) : (
                                            <div className="flex justify-center -space-x-4 sm:-space-x-8 md:-space-x-12 lg:-space-x-16 px-4 py-2">
                                                {Array.from({ length: Math.min(hands[0].length, 13) }).map((_, i) => (
                                                    <div key={i} style={{ zIndex: i }} className="relative hover:z-50 transition-all duration-200">
                                                        <Card isHidden size="hand" />
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })()}

                        {/* Center Table */}
                        <div className="flex-1 flex items-center justify-between px-1 sm:px-4 md:px-8 lg:px-12 min-h-0 w-full max-w-7xl mx-auto">
                            {/* West */}
                            <div className="flex flex-col items-center gap-1 sm:gap-2 shrink-0">
                                <PlayerBadge name="西家" isActive={turnSeat === 3} isHuman={false} />
                                <div className="flex flex-col -space-y-6 sm:-space-y-10 md:-space-y-14 lg:-space-y-20 pt-4">
                                    {Array.from({ length: Math.min(hands[3].length, 13) }).map((_, i) => (
                                        <div key={i} style={{ zIndex: i }} className="relative">
                                            <Card isHidden size="sm" />
                                        </div>
                                    ))}
                                </div>
                                <span className="text-gray-500 text-[10px] sm:text-xs md:text-sm font-bold mt-2">{hands[3].length}張</span>
                            </div>

                            {/* Center Trick Cross */}
                            <div className="flex-1 flex flex-col items-center justify-center gap-2 sm:gap-4 px-2">
                                <div className="glass-panel rounded-2xl sm:rounded-3xl p-4 sm:p-6 md:p-8 lg:p-10 w-full max-w-[220px] sm:max-w-[340px] md:max-w-[480px] lg:max-w-[600px] flex flex-col items-center justify-center min-h-[220px] sm:min-h-[340px] md:min-h-[480px] lg:min-h-[600px] shadow-2xl relative">
                                    {!displayTrick ? (
                                        <div className="text-gray-400 text-sm sm:text-base md:text-xl lg:text-2xl font-bold text-center py-4">
                                            {openingLeadMade ? '新的一墩' : '等待首攻...'}
                                        </div>
                                    ) : (
                                        <div className="flex flex-col items-center justify-center w-full relative">
                                            {isLastTrick && (
                                                <div className="absolute top-4 left-1/2 -translate-x-1/2 text-yellow-400 text-xs sm:text-sm md:text-base lg:text-lg font-bold text-center bg-black/60 px-3 sm:px-5 py-1 sm:py-2 rounded-full whitespace-nowrap shadow-md z-40 border border-yellow-600/50 backdrop-blur-md">
                                                    {SEAT_NAME[lastTrickWinner]}家贏墩
                                                </div>
                                            )}
                                            {/* North */}
                                            <div className="flex justify-center -mb-6 sm:-mb-10 md:-mb-14 lg:-mb-16 relative z-10 transition-all">
                                                {displayTrick.find(t => t.seat === 0)
                                                    ? <Card card={displayTrick.find(t => t.seat === 0).card} size="trick" disabled />
                                                    : <div className="w-12 h-16 sm:w-16 sm:h-24 md:w-20 md:h-28 lg:w-28 lg:h-40 opacity-0" />}
