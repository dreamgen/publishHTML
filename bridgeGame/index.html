<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- PWA -->
    <link rel="manifest" href="./manifest.webmanifest">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;

            height: 100%;
            height: 100dvh;

        }
        #root {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .min-h-screen { min-height: 100dvh; }

        .card-hover:hover { transform: translateY(-8px); }
        .card-selected { transform: translateY(-12px) !important; }

<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ══════════════════════════════════════════════════════════════
        // 常數
        // ══════════════════════════════════════════════════════════════
        const SUITS = ['S', 'H', 'D', 'C'];
        const RANKS = [14, 13, 12, 11, 10, 9, 8, 7, 6, 5, 4, 3, 2];
        const SUIT_SYMBOL = { S: '♠', H: '♥', D: '♦', C: '♣' };
        const SUIT_COLOR  = { S: '#111827', H: '#dc2626', D: '#dc2626', C: '#111827' };
        const RANK_LABEL  = { 14:'A', 13:'K', 12:'Q', 11:'J', 10:'10', 9:'9', 8:'8', 7:'7', 6:'6', 5:'5', 4:'4', 3:'3', 2:'2' };
        const STRAINS = ['C', 'D', 'H', 'S', 'N'];
        const STRAIN_SYMBOL = { C:'♣', D:'♦', H:'♥', S:'♠', N:'NT' };
        const STRAIN_COLOR  = { C:'text-gray-200', D:'text-red-400', H:'text-red-400', S:'text-gray-200', N:'text-yellow-300' };
        const SEAT_NAME = ['北', '東', '南', '西'];
        const SUIT_ORDER = { S: 0, H: 1, D: 2, C: 3 };

        // ══════════════════════════════════════════════════════════════
        // 牌組工具
        // ══════════════════════════════════════════════════════════════
        function buildDeck() {
            const deck = [];
            let id = 0;
            for (const suit of SUITS) {
                for (const rank of RANKS) {
                    deck.push({ id: id++, suit, rank });
                }
            }
            return deck;
        }

        function shuffle(deck) {
            const d = [...deck];
            for (let i = d.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [d[i], d[j]] = [d[j], d[i]];
            }
            return d;
        }

        function sortHand(cards) {
            return [...cards].sort((a, b) =>
                SUIT_ORDER[a.suit] !== SUIT_ORDER[b.suit]
                    ? SUIT_ORDER[a.suit] - SUIT_ORDER[b.suit]
                    : b.rank - a.rank
            );
        }

        function calcHCP(cards) {
            return cards.reduce((sum, c) => {
                if (c.rank === 14) return sum + 4;
                if (c.rank === 13) return sum + 3;
                if (c.rank === 12) return sum + 2;
                if (c.rank === 11) return sum + 1;
                return sum;
            }, 0);
        }

        function suitLengths(cards) {
            return cards.reduce((acc, c) => {
                acc[c.suit] = (acc[c.suit] || 0) + 1;
                return acc;
            }, { S: 0, H: 0, D: 0, C: 0 });
        }

        function isBalanced(lengths) {
            const vals = Object.values(lengths).sort((a, b) => b - a);
            // 4333, 4432, 5332
            if (vals[0] > 5) return false;
            if (vals[0] === 5 && vals[1] > 3) return false;
            const hasDoubleton = vals.some(v => v === 2);
            const hasSingleton = vals.some(v => v <= 1);
            if (hasSingleton) return false;
            return true;
        }

        // ══════════════════════════════════════════════════════════════
        // 叫牌系統
        // ══════════════════════════════════════════════════════════════
        function bidValue(bidStr) {
            if (['pass', 'dbl', 'rdbl'].includes(bidStr)) return 0;
            const level = parseInt(bidStr[0]);
            const strain = bidStr.slice(1);
            return (level - 1) * 5 + STRAINS.indexOf(strain) + 1;
        }

        function isAuctionOver(sequence) {
            if (sequence.length < 4) return false;
            const calls = sequence.map(b => b.call);
            if (sequence.length === 4 && calls.every(c => c === 'pass')) return 'passedOut';
            if (sequence.length >= 4) {
                const last3 = calls.slice(-3);
                const hasRealBid = calls.some(c => !['pass', 'dbl', 'rdbl'].includes(c));
                if (hasRealBid && last3.every(c => c === 'pass')) return 'contract';
            }
            return false;
        }

        function extractContract(sequence) {
            let lastBid = null;
            let doubled = 0;
            for (const entry of sequence) {
                if (!['pass', 'dbl', 'rdbl'].includes(entry.call)) {
                    lastBid = entry;
                    doubled = 0;
                } else if (entry.call === 'dbl') {
                    doubled = 1;
                } else if (entry.call === 'rdbl') {
                    doubled = 2;
                }
            }
            if (!lastBid) return null;
            const strain = lastBid.call.slice(1);
            const level  = parseInt(lastBid.call[0]);
            const side   = lastBid.seat % 2;
            let declarerSeat = lastBid.seat;
            for (const entry of sequence) {
                if (entry.seat % 2 === side && !['pass', 'dbl', 'rdbl'].includes(entry.call) && entry.call.slice(1) === strain) {
                    declarerSeat = entry.seat;
                    break;
                }
            }
            return { level, strain, declarer: declarerSeat, doubled };
        }

        function canDoubleNow(sequence, humanSeat) {
            const nonPasses = sequence.filter(b => b.call !== 'pass');
            if (!nonPasses.length) return false;
            const last = nonPasses[nonPasses.length - 1];
            if (['dbl', 'rdbl'].includes(last.call)) return false;
            return last.seat % 2 !== humanSeat % 2;
        }

        function canRedoubleNow(sequence, humanSeat) {
            const nonPasses = sequence.filter(b => b.call !== 'pass');
            if (!nonPasses.length) return false;
            const last = nonPasses[nonPasses.length - 1];
            if (last.call !== 'dbl') return false;
            return last.seat % 2 !== humanSeat % 2;
        }

        function getCurrentHighestBid(sequence) {
            const realBids = sequence.filter(b => !['pass', 'dbl', 'rdbl'].includes(b.call));
            return realBids.length ? realBids[realBids.length - 1].call : null;
        }

        // ── AI 叫牌邏輯 ────────────────────────────────────────────────
        function getLongestSuit(lengths) {
            return SUITS.reduce((best, s) => lengths[s] > lengths[best] ? s : best, 'S');
        }

        function computeOpeningBid(hcp, lengths) {
            const bal = isBalanced(lengths);
            if (hcp >= 22) return '2C';
            if (hcp >= 20 && bal) return '2N';
            if (hcp >= 15 && hcp <= 17 && bal) return '1N';
            if (hcp >= 13) {
                // Find best suit to open
                const longest = getLongestSuit(lengths);
                if (lengths[longest] >= 5) return `1${longest}`;
                // 4-card suits: prefer majors
                if (lengths['S'] >= 4 && lengths['H'] >= 4) return '1S';
                if (lengths['H'] >= 4) return '1H';
                if (lengths['S'] >= 4) return '1S';
                if (lengths['D'] >= 4) return '1D';
                return '1C';
            }
            // Weak two
            if (hcp >= 5 && hcp <= 11) {
                if (lengths['S'] >= 6) return '2S';
                if (lengths['H'] >= 6) return '2H';
            }
            return 'pass';
        }

        function computeResponse(hcp, lengths, partnerCall, highestBid) {
            if (hcp <= 5) return 'pass';
            const partnerStrain = partnerCall.slice(1);
            const partnerLevel  = parseInt(partnerCall[0]);
            const support = lengths[partnerStrain] || 0;

            if (partnerCall === '1N') {
                if (hcp >= 10) return '3N';
                if (hcp >= 8)  return '2N';
                return 'pass';
            }
            if (partnerCall === '2N') {
                if (hcp >= 4)  return '3N';
                return 'pass';
            }
            if (partnerCall === '2C') {
                if (hcp >= 8 && (lengths['S'] >= 5 || lengths['H'] >= 5)) {
                    const maj = lengths['S'] >= 5 ? 'S' : 'H';
                    const bid = `2${maj}`;
                    return !highestBid || bidValue(bid) > bidValue(highestBid) ? bid : '2D';
                }
                return '2D'; // waiting
            }

            // Response to suit opening
            if (['S','H'].includes(partnerStrain) && support >= 3) {
                if (hcp >= 13) return `4${partnerStrain}`;
                if (hcp >= 10) return `3${partnerStrain}`;
                return `2${partnerStrain}`;
            }
            if (['C','D'].includes(partnerStrain) && support >= 4) {
                if (hcp >= 13) return '3N';
                if (hcp >= 10) return `3${partnerStrain}`;
                return `2${partnerStrain}`;
            }

            // No fit: bid new suit or NT
            if (hcp >= 13) {
                // Force with 2N or new suit
                return '2N';
            }
            if (hcp >= 10) {
                return '2N';
            }
            // 6-9 HCP: bid at 1-level or 1N
            if (partnerLevel === 1) {
                if (lengths['S'] >= 4 && (!highestBid || bidValue('1S') > bidValue(highestBid))) return '1S';
                if (lengths['H'] >= 4 && (!highestBid || bidValue('1H') > bidValue(highestBid))) return '1H';
                if (lengths['D'] >= 4 && (!highestBid || bidValue('1D') > bidValue(highestBid)) && partnerStrain !== 'D') return '1D';
            }
            return '1N';
        }

        function computeOvercall(hcp, lengths, highestBid) {
            if (hcp < 8 || hcp > 17) return 'pass';
            // Try to overcall with a 5-card suit
            for (const s of ['S', 'H', 'D', 'C']) {
                if (lengths[s] >= 5) {
                    // Find cheapest level
                    for (let lv = 1; lv <= 4; lv++) {
                        const bid = `${lv}${s}`;
                        if (!highestBid || bidValue(bid) > bidValue(highestBid)) return bid;
                    }
                }
            }
            if (hcp >= 15) return '1N';
            return 'pass';
        }

        function aiBid(seat, hand, sequence) {
            const hcp = calcHCP(hand);
            const lengths = suitLengths(hand);
            const partner = (seat + 2) % 4;
            const partnerBids = sequence.filter(b => b.seat === partner && !['pass','dbl','rdbl'].includes(b.call));
            const myBids      = sequence.filter(b => b.seat === seat   && !['pass','dbl','rdbl'].includes(b.call));
            const oppBids     = sequence.filter(b => b.seat % 2 !== seat % 2 && !['pass','dbl','rdbl'].includes(b.call));
            const realBids    = sequence.filter(b => !['pass','dbl','rdbl'].includes(b.call));
            const highestBid  = realBids.length ? realBids[realBids.length - 1].call : null;
            const legalBid    = (str) => !['pass','dbl','rdbl'].includes(str) && (!highestBid || bidValue(str) > bidValue(highestBid));

            // No calls yet or only passes so far
            const anyRealCall = sequence.some(b => !['pass','dbl','rdbl'].includes(b.call));

            if (!anyRealCall) {
                // Opening position
                return computeOpeningBid(hcp, lengths);
            }

            if (partnerBids.length > 0 && myBids.length === 0) {
                // Respond to partner's opening
                const bid = computeResponse(hcp, lengths, partnerBids[0].call, highestBid);
                if (legalBid(bid)) return bid;
                if (bid === '1N' && legalBid('2N')) return '2N';
                return 'pass';
            }

            if (oppBids.length > 0 && myBids.length === 0 && partnerBids.length === 0) {
                // Overcall
                const bid = computeOvercall(hcp, lengths, highestBid);
                if (legalBid(bid)) return bid;
                return 'pass';
            }

            // Rebid / continuation — simplified: pass
            return 'pass';
        }

        // ══════════════════════════════════════════════════════════════
        // 出牌演算法
        // ══════════════════════════════════════════════════════════════
        function legalCards(hand, trick, trumpSuit) {
            if (trick.length === 0) return hand;
            const ledSuit = trick[0].card.suit;
            const followers = hand.filter(c => c.suit === ledSuit);
            return followers.length > 0 ? followers : hand;
        }

        function trickWinner(trick, trumpSuit) {
            const led = trick[0].card.suit;
            let winner = trick[0];
            for (let i = 1; i < trick.length; i++) {
                const { card } = trick[i];
                const wCard = winner.card;
                const wIsTrump = trumpSuit && wCard.suit === trumpSuit;
                const cIsTrump = trumpSuit && card.suit === trumpSuit;
                if (cIsTrump && !wIsTrump) {
                    winner = trick[i];
                } else if (cIsTrump && wIsTrump && card.rank > wCard.rank) {
                    winner = trick[i];
                } else if (!cIsTrump && card.suit === led && !wIsTrump && card.rank > wCard.rank) {
                    winner = trick[i];
                }
            }
            return winner.seat;
        }

        function currentTrickWinner(trick, trumpSuit) {
            if (trick.length === 0) return -1;
            return trickWinner(trick, trumpSuit);
        }

        function aiSelectCard(seat, hand, trick, trumpSuit, contract) {
            const legal = legalCards(hand, trick, trumpSuit);
            if (legal.length === 1) return legal[0];

            if (trick.length === 0) {
                // Leading: top of sequence or 4th best
                return aiLead(legal, trumpSuit);
            }

            const winnerSeat = currentTrickWinner(trick, trumpSuit);
            const partnerSeat = (seat + 2) % 4;
            const partnerIsWinning = winnerSeat === partnerSeat;

            if (partnerIsWinning) {
                return legal.sort((a, b) => a.rank - b.rank)[0];
            }

            const winningCard = trick.find(t => t.seat === winnerSeat).card;
            const canBeat = legal.filter(c => {
                if (trumpSuit && c.suit === trumpSuit && winningCard.suit !== trumpSuit) return true;
                if (c.suit === winningCard.suit && c.rank > winningCard.rank) return true;
                return false;
            });

            if (canBeat.length > 0) {
                return canBeat.sort((a, b) => a.rank - b.rank)[0];
            }
            return legal.sort((a, b) => a.rank - b.rank)[0];
        }

        function aiLead(hand, trumpSuit) {
            const nonTrump = trumpSuit ? hand.filter(c => c.suit !== trumpSuit) : hand;
            const pool = nonTrump.length > 0 ? nonTrump : hand;

            // Group by suit
            const bySuit = {};
            for (const c of pool) {
                if (!bySuit[c.suit]) bySuit[c.suit] = [];
                bySuit[c.suit].push(c);
            }
            for (const s of Object.keys(bySuit)) {
                bySuit[s].sort((a, b) => b.rank - a.rank);
            }

            // Look for top of sequence
            for (const s of SUITS) {
                const cards = bySuit[s];
                if (!cards || cards.length < 2) continue;
                if (cards[0].rank - cards[1].rank === 1) return cards[0]; // sequence top
            }

            // 4th best of longest
            const longest = Object.values(bySuit).sort((a, b) => b.length - a.length)[0];
            if (longest) {
                if (longest.length >= 4) return longest[3];
                return longest[longest.length - 1];
            }
            return hand[0];
        }

        // ══════════════════════════════════════════════════════════════
        // 計分引擎
        // ══════════════════════════════════════════════════════════════
        function contractPoints(level, strain, doubled) {
            let base;
            if (strain === 'N') {
                base = 40 + 30 * (level - 1);
            } else {
                const tv = { C: 20, D: 20, H: 30, S: 30 }[strain];
                base = tv * level;
            }
            const mult = doubled === 0 ? 1 : doubled === 1 ? 2 : 4;
            return base * mult;
        }

        function isGameContract(level, strain, doubled) {
            return contractPoints(level, strain, doubled) >= 100;
        }

        function calculateHandScore(contract, tricksWon, vulnerable) {
            const { level, strain, declarer, doubled } = contract;
            const contractTricks = level + 6;
            const side = declarer % 2 === 0 ? 'NS' : 'EW';
            const oppSide = side === 'NS' ? 'EW' : 'NS';
            const isVul = vulnerable[side];
            const made = tricksWon >= contractTricks;

            if (made) {
                const overtricks = tricksWon - contractTricks;
                const below = contractPoints(level, strain, doubled);
                let overtrickVal;
                if (doubled === 0) {
                    const tv = { C:20, D:20, H:30, S:30, N:30 }[strain];
                    overtrickVal = tv * overtricks;
                } else {
                    const perOT = isVul ? 200 : 100;
                    overtrickVal = perOT * doubled * overtricks;
                }
                const doubleBonus = doubled >= 1 ? 50 : 0;
                let bonus = 0;
                const isGame = isGameContract(level, strain, doubled);
                if (level === 7)       bonus = isVul ? 1500 : 1000;
                else if (level === 6)  bonus = isVul ? 750 : 500;
                else if (isGame)       bonus = isVul ? 500 : 300;
                else                   bonus = 50;
                return { made: true, side, tricksWon, contractTricks, below, above: overtrickVal + doubleBonus + bonus, bonus, isGame };
            } else {
                const down = contractTricks - tricksWon;
                let penalty = 0;
                if (doubled === 0) {
                    penalty = isVul ? down * 100 : down * 50;
                } else {
                    const mult = doubled === 2 ? 2 : 1;
                    if (!isVul) {
                        penalty = mult * (100 + Math.max(0, down - 1) * 200 + Math.max(0, down - 3) * 100);
                    } else {
                        penalty = mult * (200 + Math.max(0, down - 1) * 300);
                    }
                }
                return { made: false, side: oppSide, penalty, down };
            }
        }

        function updateRubberScore(rubberScore, gamesWon, vulnerable, handResult) {
            const newScore = {
                NS: { below: [...rubberScore.NS.below], above: [...rubberScore.NS.above] },
                EW: { below: [...rubberScore.EW.below], above: [...rubberScore.EW.above] },
            };
            const newGames = { ...gamesWon };
            const newVul   = { ...vulnerable };
            let gameWon = false;

            if (handResult.made) {
                newScore[handResult.side].below.push(handResult.below);
                if (handResult.above > 0) newScore[handResult.side].above.push(handResult.above);
                const totalBelow = newScore[handResult.side].below.reduce((s, v) => s + v, 0);
                if (totalBelow >= 100) {
                    newGames[handResult.side]++;
                    newVul[handResult.side] = true;
                    newScore.NS.below = [];
                    newScore.EW.below = [];
                    gameWon = true;
                }
            } else {
                newScore[handResult.side].above.push(handResult.penalty);
            }
            return { rubberScore: newScore, gamesWon: newGames, vulnerable: newVul, gameWon };
        }

        function rubberBonus(gamesWon, winner) {
            const loser = winner === 'NS' ? 'EW' : 'NS';
            return gamesWon[loser] === 0 ? 700 : 500;
        }

        function totalScore(rubberScore, side) {
            const below = rubberScore[side].below.reduce((s, v) => s + v, 0);
            const above = rubberScore[side].above.reduce((s, v) => s + v, 0);
            return below + above;
        }

        // ══════════════════════════════════════════════════════════════
        // 初始狀態
        // ══════════════════════════════════════════════════════════════
        const INITIAL_STATE = {
            phase: 'menu',
            dealer: 0,
            vulnerable: { NS: false, EW: false },
            rubberScore: { NS: { below: [], above: [] }, EW: { below: [], above: [] } },
            gamesWon: { NS: 0, EW: 0 },
            rubberCount: 1,
            hands: [[], [], [], []],
            biddingSequence: [],
            currentBidder: 1,
            contract: null,
            auctionOver: false,
            dummySeat: -1,
            currentLeader: -1,
            currentTrick: [],
            tricksTaken: { NS: 0, EW: 0 },
            completedTricks: [],
            openingLeadMade: false,
            dummyRevealed: false,
            lastHandResult: null,
            lastCompletedTrick: null,
            rubberOver: false,
            rubberWinner: null,
        };

        // ══════════════════════════════════════════════════════════════
        // 遊戲操作
        // ══════════════════════════════════════════════════════════════
        function startHand(state) {
            const deck = shuffle(buildDeck());
            const hands = [[], [], [], []];
            for (let i = 0; i < 52; i++) {
                hands[(state.dealer + 1 + i) % 4].push(deck[i]);
            }
            const sortedHands = hands.map(h => sortHand(h));
            return {
                ...state,
                phase: 'bidding',
                hands: sortedHands,
                biddingSequence: [],
                currentBidder: (state.dealer + 1) % 4,
                contract: null,
                auctionOver: false,
                dummySeat: -1,
                currentLeader: -1,
                currentTrick: [],
                tricksTaken: { NS: 0, EW: 0 },
                completedTricks: [],
                openingLeadMade: false,
                dummyRevealed: false,
                lastHandResult: null,
                lastCompletedTrick: null,
                rubberOver: false,
                rubberWinner: null,
            };
        }

        function addBid(state, call) {
            const newSeq = [...state.biddingSequence, { seat: state.currentBidder, call }];
            const auctionStatus = isAuctionOver(newSeq);
            if (auctionStatus === 'passedOut') {
                // Rotate dealer and redeal (no score change)
                return {
                    ...state,
                    biddingSequence: newSeq,
                    auctionOver: true,
                    phase: 'passedOut',
                };
            }
            if (auctionStatus === 'contract') {
                const contract = extractContract(newSeq);
                const dummySeat = (contract.declarer + 2) % 4;
                const openingLeader = (contract.declarer + 1) % 4;
                return {
                    ...state,
                    biddingSequence: newSeq,
                    auctionOver: true,
                    contract,
                    dummySeat,
                    phase: 'playing',
                    currentLeader: openingLeader,
                    currentTrick: [],
                    lastCompletedTrick: null,
                    openingLeadMade: false,
                    dummyRevealed: false,
                };
            }
            return {
                ...state,
                biddingSequence: newSeq,
                currentBidder: (state.currentBidder + 1) % 4,
            };
        }

        function playCard(state, seat, card) {
            const newHand = state.hands[seat].filter(c => c.id !== card.id);
            const newHands = state.hands.map((h, i) => i === seat ? newHand : h);
            const newTrick = [...state.currentTrick, { seat, card }];
            const openingLeadMade = true;
            const dummyRevealed = true;

            if (newTrick.length < 4) {
                return { ...state, hands: newHands, currentTrick: newTrick, openingLeadMade, dummyRevealed };
            }

            // Trick complete
            const trumpSuit = state.contract.strain === 'N' ? null : state.contract.strain;
            const winnerSeat = trickWinner(newTrick, trumpSuit);
            const winnerSide = winnerSeat % 2 === 0 ? 'NS' : 'EW';
            const newTricksTaken = {
                ...state.tricksTaken,
                [winnerSide]: state.tricksTaken[winnerSide] + 1,
            };
            const completedTricks = [...state.completedTricks, newTrick];
            const totalTricks = newTricksTaken.NS + newTricksTaken.EW;

            if (totalTricks === 13) {
                // Hand over → compute score
                const declarerSide = state.contract.declarer % 2 === 0 ? 'NS' : 'EW';
                const declarerTricks = newTricksTaken[declarerSide];
                const handResult = calculateHandScore(state.contract, declarerTricks, state.vulnerable);
                const { rubberScore, gamesWon, vulnerable, gameWon } = updateRubberScore(
                    state.rubberScore, state.gamesWon, state.vulnerable, handResult
                );

                // Add rubber bonus if rubber over
                let rubberOver = gamesWon.NS >= 2 || gamesWon.EW >= 2;
                let rubberWinner = null;
                let finalRubberScore = { ...rubberScore };
                if (rubberOver) {
                    rubberWinner = gamesWon.NS >= 2 ? 'NS' : 'EW';
                    const bonus = rubberBonus(gamesWon, rubberWinner);
                    finalRubberScore = {
                        ...rubberScore,
                        [rubberWinner]: {
                            ...rubberScore[rubberWinner],
                            above: [...rubberScore[rubberWinner].above, bonus],
                        },
                    };
                }

                return {
                    ...state,
                    hands: newHands,
                    currentTrick: [],
                    lastCompletedTrick: newTrick,
                    completedTricks,
                    tricksTaken: newTricksTaken,
                    currentLeader: winnerSeat,
                    openingLeadMade, dummyRevealed,
                    phase: 'scoring',
                    lastHandResult: handResult,
                    rubberScore: finalRubberScore,
                    gamesWon,
                    vulnerable,
                    rubberOver,
                    rubberWinner,
                };
            }

            return {
                ...state,
                hands: newHands,
                currentTrick: [],
                lastCompletedTrick: newTrick,
                completedTricks,
                tricksTaken: newTricksTaken,
                currentLeader: winnerSeat,
                openingLeadMade, dummyRevealed,
            };
        }

        // ══════════════════════════════════════════════════════════════
        // 介面輔助
        // ══════════════════════════════════════════════════════════════
        function contractDisplay(contract) {
            if (!contract) return '';
            const dbl = contract.doubled === 1 ? ' ✕' : contract.doubled === 2 ? ' ✕✕' : '';
            return `${contract.level}${STRAIN_SYMBOL[contract.strain]}${dbl}`;
        }

        function isHumanTurn(turnSeat, state) {
            const HUMAN_SEAT = 2; // South
            if (turnSeat === HUMAN_SEAT) return true;
            // Human also plays dummy if South is declarer and opening lead made
            if (state.openingLeadMade && state.contract && state.contract.declarer === HUMAN_SEAT && turnSeat === state.dummySeat) return true;
            return false;
        }

        // ══════════════════════════════════════════════════════════════
        // 元件
        // ══════════════════════════════════════════════════════════════

        // 單張牌
        const Card = ({ card, onClick, isHidden, size = 'md', selected, disabled }) => {
            if (isHidden) {
                const hw = size === 'sm' ? 34 : 36;
                return (
                    <div className="flex-shrink-0 bg-blue-800 rounded border-2 border-blue-500 shadow-md"
                         style={{ width: hw, height: 52, minWidth: hw }}>
                        <div className="w-full h-full rounded bg-gradient-to-br from-blue-700 to-blue-900 flex items-center justify-center">
                            <span className="text-blue-400 text-xs">🂠</span>
                        </div>
                    </div>
                );
            }

            const color = ['H', 'D'].includes(card.suit) ? '#dc2626' : '#111827';
            const rank = RANK_LABEL[card.rank];
            const sym  = SUIT_SYMBOL[card.suit];

            // sm 尺寸：居中單行顯示，手機友善
            if (size === 'sm') {
                return (
                    <div
                        onClick={disabled ? undefined : onClick}
                        className={`flex-shrink-0 bg-white rounded border border-gray-300 shadow-md flex flex-col items-center justify-center select-none
                            ${!disabled ? 'cursor-pointer' : ''}
                            ${selected ? 'card-selected ring-2 ring-yellow-400' : (!disabled ? 'card-hover' : '')}
                        `}
                        style={{ width: 34, height: 52, minWidth: 34 }}
                    >
                        <span className="text-sm font-black leading-none" style={{ color }}>{rank}</span>
                        <span className="text-base font-black leading-none" style={{ color }}>{sym}</span>
                    </div>
                );
            }

            // md / lg 尺寸：雙角落樣式
            const w = size === 'lg' ? 48 : 36;
            const textSize = 'text-xs';
            return (
                <div
                    onClick={disabled ? undefined : onClick}
                    className={`flex-shrink-0 bg-white rounded border border-gray-300 shadow-md flex flex-col justify-between p-0.5 select-none
                        ${!disabled ? 'cursor-pointer' : ''}
                        ${selected ? 'card-selected ring-2 ring-yellow-400' : (!disabled ? 'card-hover' : '')}
                    `}
                    style={{ width: w, height: 52, minWidth: w }}
                >
                    <span className={`${textSize} font-bold leading-none`} style={{ color }}>{rank}{sym}</span>
                    <span className={`${textSize} font-bold leading-none self-end`} style={{ color, transform: 'rotate(180deg)' }}>{rank}{sym}</span>
                </div>
            );
        };

        // 牌背（面朝下的手牌）
        const FaceDownHand = ({ count, label, horizontal = false }) => (
            <div className="flex flex-col items-center gap-1">
                <span className="text-yellow-300 text-xs font-bold">{label}</span>
                {horizontal ? (
                    <div className="flex -space-x-4">
                        {Array.from({ length: Math.min(count, 10) }).map((_, i) => (
                            <div key={i} className="w-7 h-10 bg-blue-800 rounded border border-blue-500 shadow flex-shrink-0"
                                 style={{ zIndex: i }} />
                        ))}
                    </div>
                ) : (
                    <div className="flex flex-col -space-y-7">
                        {Array.from({ length: Math.min(count, 10) }).map((_, i) => (
                            <div key={i} className="w-8 h-11 bg-blue-800 rounded border border-blue-500 shadow flex-shrink-0" />
                        ))}
                    </div>
                )}
                <span className="text-gray-400 text-xs">{count}張</span>
            </div>
        );

        // 叫牌紀錄
        const AuctionBox = ({ sequence, dealer }) => {
            const firstBidder = (dealer + 1) % 4;
            const padded = [...Array(firstBidder).fill(null), ...sequence];
            const rows = [];
            for (let i = 0; i < padded.length; i += 4) {
                rows.push(padded.slice(i, i + 4));
            }
            const headers = ['北', '東', '南', '西'];

            const callDisplay = (call) => {
                if (!call) return '-';
                if (call === 'pass') return '過';
                if (call === 'dbl') return '加';
                if (call === 'rdbl') return '再';
                return `${call[0]}${STRAIN_SYMBOL[call.slice(1)]}`;
            };

            const callColor = (call) => {
                if (!call) return 'text-gray-600';
                if (call === 'pass') return 'text-gray-400';
                if (call === 'dbl') return 'text-orange-400 font-bold';
                if (call === 'rdbl') return 'text-purple-400 font-bold';
                if (call.endsWith('H') || call.endsWith('D')) return 'text-red-400 font-bold';
                return 'text-white font-bold';
            };

            return (
                <div className="bg-black/40 rounded-xl p-2 text-sm font-mono w-[200px]">
                    <div className="grid grid-cols-4 gap-1 text-center mb-1">
                        {headers.map((h, i) => (
                            <span key={i} className="text-yellow-400 font-bold text-xs">{h}</span>
                        ))}
                    </div>
                    {rows.map((row, ri) => (
                        <div key={ri} className="grid grid-cols-4 gap-1 text-center">
                            {row.map((entry, ci) => (
                                <span key={ci} className={`text-xs ${callColor(entry ? entry.call : null)}`}>
                                    {callDisplay(entry ? entry.call : null)}
                                </span>
                            ))}
                        </div>
                    ))}
                    {rows.length === 0 && (
                        <div className="text-gray-500 text-xs text-center">等待叫牌...</div>
                    )}
                </div>
            );
        };

        // 叫牌面板（南家用）
        const BiddingPanel = ({ onBid, sequence, gameState }) => {
            const highest = getCurrentHighestBid(sequence);
            const canDbl  = canDoubleNow(sequence, 2);
            const canRdbl = canRedoubleNow(sequence, 2);

            return (
                <div className="bg-gray-900/95 rounded-2xl p-3 border border-yellow-600 shadow-2xl">
                    <p className="text-yellow-300 text-center text-xs font-bold mb-2">南家（您）叫牌</p>
                    <div className="grid grid-cols-5 gap-0.5 mb-2">
                        {[1,2,3,4,5,6,7].flatMap(level =>
                            ['C','D','H','S','N'].map(strain => {
                                const bid = `${level}${strain}`;
                                const legal = !highest || bidValue(bid) > bidValue(highest);
                                const isRed = ['H','D'].includes(strain);
                                return (
                                    <button key={bid}
                                        onClick={() => legal && onBid(bid)}
                                        disabled={!legal}
                                        className={`py-1 rounded text-xs font-bold transition-colors
                                            ${legal
                                                ? isRed ? 'bg-red-700 hover:bg-red-600 text-white active:bg-red-800'
                                                        : 'bg-gray-700 hover:bg-gray-600 text-white active:bg-gray-800'
                                                : 'bg-gray-800 text-gray-600 cursor-not-allowed opacity-40'
                                            }`}
                                    >
                                        {level}{STRAIN_SYMBOL[strain]}
                                    </button>
                                );
                            })
                        )}
                    </div>
                    <div className="flex gap-2 justify-center">
                        <button onClick={() => onBid('pass')}
                            className="bg-gray-600 hover:bg-gray-500 active:bg-gray-700 text-white px-3 py-1.5 rounded-lg font-bold text-xs">
                            過叫
                        </button>
                        <button onClick={() => canDbl && onBid('dbl')}
                            disabled={!canDbl}
                            className={`px-3 py-1.5 rounded-lg font-bold text-xs
                                ${canDbl ? 'bg-orange-700 hover:bg-orange-600 text-white' : 'bg-gray-800 text-gray-600 opacity-40 cursor-not-allowed'}`}>
                            加倍
                        </button>
                        <button onClick={() => canRdbl && onBid('rdbl')}
                            disabled={!canRdbl}
                            className={`px-3 py-1.5 rounded-lg font-bold text-xs
                                ${canRdbl ? 'bg-purple-700 hover:bg-purple-600 text-white' : 'bg-gray-800 text-gray-600 opacity-40 cursor-not-allowed'}`}>
                            再加倍
                        </button>
                    </div>
                </div>
            );
        };

        // HCP 顯示（手牌摘要）
        const HandHCP = ({ hand }) => {
            const hcp = calcHCP(hand);
            const lens = suitLengths(hand);
            return (
                <div className="text-xs text-gray-300 text-center">
                    <span className="text-yellow-300 font-bold">{hcp}HCP</span>
                    {' '}
                    {SUITS.map(s => (
                        <span key={s} style={{ color: SUIT_COLOR[s] }}>{SUIT_SYMBOL[s]}{lens[s]} </span>
                    ))}
                </div>
            );
        };

        // 計分卡
        const ScoreCard = ({ rubberScore, gamesWon, vulnerable }) => {
            const nsBelow = rubberScore.NS.below;
            const ewBelow = rubberScore.EW.below;
            const nsAbove = rubberScore.NS.above;
            const ewAbove = rubberScore.EW.above;
            const nsBelowTotal = nsBelow.reduce((s, v) => s + v, 0);
            const ewBelowTotal = ewBelow.reduce((s, v) => s + v, 0);

            return (
                <div className="bg-green-900/80 rounded-xl border border-green-600 p-3 w-full max-w-xs">
                    <div className="grid grid-cols-3 gap-1 text-xs text-center mb-2">
                        <div></div>
                        <div className="text-yellow-300 font-bold">NS{vulnerable.NS ? '(有局)' : ''}</div>
                        <div className="text-yellow-300 font-bold">EW{vulnerable.EW ? '(有局)' : ''}</div>
                    </div>
                    {/* 高線 */}
                    <div className="text-xs text-gray-400 text-center mb-1">── 高線 ──</div>
                    {[...Array(Math.max(nsAbove.length, ewAbove.length, 1))].map((_, i) => (
                        <div key={i} className="grid grid-cols-3 gap-1 text-xs text-center">
                            <div></div>
                            <div className="text-green-300">{nsAbove[i] != null ? nsAbove[i] : ''}</div>
                            <div className="text-green-300">{ewAbove[i] != null ? ewAbove[i] : ''}</div>
                        </div>
                    ))}
                    <div className="border-b border-yellow-600 my-2" />
                    {/* 低線 */}
                    <div className="text-xs text-gray-400 text-center mb-1">── 低線 ──</div>
                    {[...Array(Math.max(nsBelow.length, ewBelow.length, 1))].map((_, i) => (
                        <div key={i} className="grid grid-cols-3 gap-1 text-xs text-center">
                            <div></div>
                            <div className="text-white">{nsBelow[i] != null ? nsBelow[i] : ''}</div>
                            <div className="text-white">{ewBelow[i] != null ? ewBelow[i] : ''}</div>
                        </div>
                    ))}
                    <div className="border-b border-yellow-600 my-2" />
                    <div className="grid grid-cols-3 gap-1 text-xs text-center font-bold">
                        <div className="text-gray-400">局數</div>
                        <div className="text-yellow-300">{gamesWon.NS}</div>
                        <div className="text-yellow-300">{gamesWon.EW}</div>
                    </div>
                </div>
            );
        };

        // ══════════════════════════════════════════════════════════════
        // 主畫面
        // ══════════════════════════════════════════════════════════════
        function App() {
            const [gameState, setGameState] = useState(INITIAL_STATE);
            const [selectedCard, setSelectedCard] = useState(null);

            const { phase, hands, biddingSequence, currentBidder, contract,
                    dealer, vulnerable, rubberScore, gamesWon, dummySeat,
                    currentLeader, currentTrick, tricksTaken, openingLeadMade,
                    dummyRevealed, lastHandResult, lastCompletedTrick,
                    rubberOver, rubberWinner } = gameState;

            const HUMAN_SEAT = 2;
            const trumpSuit = contract && contract.strain !== 'N' ? contract.strain : null;

            // ── AI 叫牌 useEffect ──────────────────────────────────
            useEffect(() => {
                if (phase !== 'bidding') return;
                if (currentBidder === HUMAN_SEAT) return;
                const t = setTimeout(() => {
                    setGameState(prev => {
                        if (prev.phase !== 'bidding' || prev.currentBidder === HUMAN_SEAT) return prev;
                        const call = aiBid(prev.currentBidder, prev.hands[prev.currentBidder], prev.biddingSequence);
                        return addBid(prev, call);
                    });
                }, 500);
                return () => clearTimeout(t);
            }, [phase, biddingSequence.length, currentBidder]);

            // ── 流局後自動重發 useEffect ──────────────────────────
            useEffect(() => {
                if (phase !== 'passedOut') return;
                const t = setTimeout(() => {
                    setGameState(prev => {
                        if (prev.phase !== 'passedOut') return prev;
                        return startHand({ ...prev, dealer: (prev.dealer + 1) % 4 });
                    });
                }, 1200);
                return () => clearTimeout(t);
            }, [phase]);

            // ── AI 出牌 useEffect ──────────────────────────────────
            useEffect(() => {
                if (phase !== 'playing') return;
                const turnSeat = (currentLeader + currentTrick.length) % 4;
                if (isHumanTurn(turnSeat, gameState)) return;
                const t = setTimeout(() => {
                    setGameState(prev => {
                        if (prev.phase !== 'playing') return prev;
                        const ts = (prev.currentLeader + prev.currentTrick.length) % 4;
                        if (isHumanTurn(ts, prev)) return prev;
                        const tr = prev.contract.strain === 'N' ? null : prev.contract.strain;
                        const card = aiSelectCard(ts, prev.hands[ts], prev.currentTrick, tr, prev.contract);
                        return playCard(prev, ts, card);
                    });
                }, 700);
                return () => clearTimeout(t);
            }, [phase, currentTrick.length, currentLeader, openingLeadMade]);

            // ── 5 秒後清除上一墩殘留顯示 ─────────────────────────
            useEffect(() => {
                if (!lastCompletedTrick) return;
                const t = setTimeout(() => {
                    setGameState(prev => ({ ...prev, lastCompletedTrick: null }));
                }, 5000);
                return () => clearTimeout(t);
            }, [lastCompletedTrick]);

            // ── 人類出牌 ──────────────────────────────────────────
            const handleCardClick = (seat, card) => {
                if (phase !== 'playing') return;
                const turnSeat = (currentLeader + currentTrick.length) % 4;
                if (turnSeat !== seat) return;
                if (!isHumanTurn(seat, gameState)) return;
                const legal = legalCards(hands[seat], currentTrick, trumpSuit);
                if (!legal.find(c => c.id === card.id)) return;
                if (selectedCard && selectedCard.id === card.id) {
                    setSelectedCard(null);
                    setGameState(prev => playCard(prev, seat, card));
                } else {
                    setSelectedCard(card);
                }
            };

            const handleConfirmPlay = (seat) => {
                if (!selectedCard) return;
                const legal = legalCards(hands[seat], currentTrick, trumpSuit);
                if (!legal.find(c => c.id === selectedCard.id)) return;
                const card = selectedCard;
                setSelectedCard(null);
                setGameState(prev => playCard(prev, seat, card));
            };

            // ── 人類叫牌 ──────────────────────────────────────────
            const handleBid = (call) => {
                if (phase !== 'bidding' || currentBidder !== HUMAN_SEAT) return;
                setGameState(prev => addBid(prev, call));
            };

            // ── 計算當前回合 ──────────────────────────────────────
            const turnSeat = phase === 'playing' ? (currentLeader + currentTrick.length) % 4 : -1;
            const isMyTurn = phase === 'playing' && isHumanTurn(turnSeat, gameState);

            // 桌面顯示的墩（當前進行中優先，否則顯示上一墩殘留）
            const displayTrick = currentTrick.length > 0 ? currentTrick : lastCompletedTrick;
            const isLastTrick  = currentTrick.length === 0 && lastCompletedTrick !== null;
            const lastTrickWinner = isLastTrick
                ? trickWinner(lastCompletedTrick, contract && contract.strain !== 'N' ? contract.strain : null)
                : -1;

            // 玩家手牌的合法牌
            const southLegal = phase === 'playing' && turnSeat === HUMAN_SEAT
                ? legalCards(hands[HUMAN_SEAT], currentTrick, trumpSuit).map(c => c.id)
                : [];
            const northLegal = phase === 'playing' && turnSeat === dummySeat && dummySeat === 0 && openingLeadMade && contract && contract.declarer === HUMAN_SEAT
                ? legalCards(hands[0], currentTrick, trumpSuit).map(c => c.id)
                : [];

            // ── 渲染 ──────────────────────────────────────────────

            // ── 菜單畫面 ──────────────────────────────────────────
            if (phase === 'menu') {
                const nsTotal = totalScore(rubberScore, 'NS');
                const ewTotal = totalScore(rubberScore, 'EW');
                const hasGame = gamesWon.NS > 0 || gamesWon.EW > 0 ||
                                rubberScore.NS.below.length > 0 || rubberScore.EW.below.length > 0 ||
                                rubberScore.NS.above.length > 0 || rubberScore.EW.above.length > 0;
                return (
                    <div className="flex-1 bg-green-900 flex flex-col items-center justify-center p-4 gap-4">
                        <div className="text-center">
                            <div className="text-5xl mb-2">♠♥♦♣</div>
                            <h1 className="text-white text-3xl font-bold mb-1">橋牌單機遊戲</h1>
                            <p className="text-green-300 text-sm">橡皮橋制 · 南家視角</p>
                        </div>
                        {hasGame && <ScoreCard rubberScore={rubberScore} gamesWon={gamesWon} vulnerable={vulnerable} />}
                        <div className="flex flex-col gap-3 w-full max-w-xs">
                            <button
                                onClick={() => setGameState(prev => startHand(prev))}
                                className="w-full bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-600 text-gray-900 font-bold py-3 rounded-xl text-lg shadow-lg transition-colors">
                                {hasGame ? '繼續下一局' : '開始遊戲'}
                            </button>
                            <button
                                onClick={() => setGameState({
                                    ...INITIAL_STATE,
                                    rubberCount: gameState.rubberCount + (hasGame ? 1 : 0)
                                })}
                                className="w-full bg-gray-700 hover:bg-gray-600 active:bg-gray-800 text-white font-bold py-2 rounded-xl text-sm shadow transition-colors">
                                新橡皮牌
                            </button>
                        </div>
                        <div className="text-gray-400 text-xs text-center mt-2">
                            <p>南家與北家(明手)對抗東西家 AI</p>
                            <p className="mt-1">第 {gameState.rubberCount} 橡皮牌</p>
                        </div>
                    </div>
                );
            }

            // ── 流局畫面 ──────────────────────────────────────────
            if (phase === 'passedOut') {
                return (
                    <div className="flex-1 bg-green-900 flex flex-col items-center justify-center p-4 gap-4">
                        <div className="text-6xl">🃏</div>
                        <h2 className="text-white text-2xl font-bold">四家皆過叫</h2>
                        <p className="text-green-300">流局，換莊重新發牌...</p>
                    </div>
                );
            }

            // ── 叫牌畫面 ──────────────────────────────────────────
            if (phase === 'bidding') {
                const isHumanBidTurn = currentBidder === HUMAN_SEAT;
                return (
                    <div className="flex-1 bg-green-900 flex flex-col overflow-hidden">
                        {/* 頂部資訊 */}
                        <div className="flex items-center justify-between px-3 py-2 bg-green-950/60">
                            <span className="text-yellow-300 text-xs font-bold">
                                莊家：{SEAT_NAME[dealer]}家
                                {vulnerable.NS && vulnerable.EW ? ' · 雙方有局' : vulnerable.NS ? ' · NS有局' : vulnerable.EW ? ' · EW有局' : ' · 無局'}
                            </span>
                            <span className="text-gray-400 text-xs">第{gamesWon.NS + gamesWon.EW + 1}局</span>
                        </div>

                        {/* 北家 */}
                        <div className="flex justify-center py-2 border-b border-green-700/40">
                            <div className="flex flex-col items-center gap-1">
                                <span className="text-yellow-300 text-xs font-bold">
                                    北家 {currentBidder === 0 ? '⟵叫牌中' : ''}
                                </span>
                                <HandHCP hand={hands[0]} />
                                <div className="flex flex-wrap justify-center gap-0.5 max-w-xs">
                                    {hands[0].map(c => <Card key={c.id} card={c} size="sm" disabled />)}
                                </div>
                            </div>
                        </div>

                        {/* 中間：叫牌紀錄 + 南家資訊 */}
                        <div className="flex-1 flex flex-col items-center justify-around py-2 overflow-hidden">
                            <div className="flex gap-4 items-start">
                                {/* 西家 */}
                                <div className="flex flex-col items-center gap-1">
                                    <span className="text-yellow-300 text-xs font-bold">西家 {currentBidder === 3 ? '⟵' : ''}</span>
                                    <HandHCP hand={hands[3]} />
                                </div>

                                {/* 叫牌記錄 */}
                                <AuctionBox sequence={biddingSequence} dealer={dealer} />

                                {/* 東家 */}
                                <div className="flex flex-col items-center gap-1">
                                    <span className="text-yellow-300 text-xs font-bold">東家 {currentBidder === 1 ? '⟵' : ''}</span>
                                    <HandHCP hand={hands[1]} />
                                </div>
                            </div>

                            {!isHumanBidTurn && (
                                <div className="text-gray-300 text-sm animate-pulse">
                                    {SEAT_NAME[currentBidder]}家思考中...
                                </div>
                            )}
                        </div>

                        {/* 南家手牌 + 叫牌面板 */}
                        <div className="border-t border-green-700/40 p-2 flex flex-col items-center gap-2">
                            <div className="flex flex-col items-center gap-1">
                                <span className="text-yellow-300 text-xs font-bold">南家（您）</span>
                                <HandHCP hand={hands[HUMAN_SEAT]} />
                                <div className="flex flex-wrap justify-center gap-0.5">
                                    {hands[HUMAN_SEAT].map(c => <Card key={c.id} card={c} size="sm" disabled />)}
                                </div>
                            </div>
                            {isHumanBidTurn && (
                                <BiddingPanel onBid={handleBid} sequence={biddingSequence} gameState={gameState} />
                            )}
                        </div>
                    </div>
                );
            }

            // ── 出牌畫面 ──────────────────────────────────────────
            if (phase === 'playing') {
                const contractStr = contractDisplay(contract);
                const declarerName = contract ? SEAT_NAME[contract.declarer] : '';
                const isNorthTurn = turnSeat === 0;
                const isSouthTurn = turnSeat === HUMAN_SEAT;

                // 北家：明手後翻面，南家叫牌時可點擊
                const northClickable = isNorthTurn && openingLeadMade && contract && contract.declarer === HUMAN_SEAT;
                // 南家：自己輪到
                const southClickable = isSouthTurn;

                return (
                    <div className="flex-1 bg-green-800 flex flex-col overflow-hidden">
                        {/* 頂部：合約 + 墩數 */}
                        <div className="flex items-center justify-between px-3 py-1.5 bg-green-950/70">
                            <div className="flex items-center gap-2">
                                <span className="text-white font-bold text-sm">{contractStr}</span>
                                {contract && (
                                    <span className="text-gray-300 text-xs">
                                        {declarerName}家叫牌 · {contract.strain === 'N' ? '無王' : `${SUIT_SYMBOL[contract.strain]}將`}
                                    </span>
                                )}
                            </div>
                            <div className="text-xs text-gray-300">
                                NS <span className="text-yellow-300 font-bold">{tricksTaken.NS}</span>
                                {' '}EW <span className="text-yellow-300 font-bold">{tricksTaken.EW}</span>
                                {' '}<span className="text-gray-400">/ 13</span>
                            </div>
                        </div>

                        {/* 北家手牌（明手） */}
                        <div className="flex justify-center py-2 border-b border-green-700/30 bg-green-900/30">
                            <div className="flex flex-col items-center gap-1">
                                <span className={`text-xs font-bold ${isNorthTurn ? 'text-yellow-300 animate-pulse' : 'text-gray-400'}`}>
                                    北家{dummyRevealed ? '（明手）' : ''}{isNorthTurn ? ' ← 出牌' : ''}
                                </span>
                                {dummyRevealed ? (
                                    <div className="flex flex-wrap justify-center gap-0.5 max-w-[280px]">
                                        {hands[0].map(c => {
                                            const isLegal = northLegal.includes(c.id);
                                            const isSel = selectedCard && selectedCard.id === c.id;
                                            return (
                                                <Card key={c.id}
                                                    card={c}
                                                    size="sm"
                                                    selected={isSel}
                                                    disabled={!northClickable || !isLegal}
                                                    onClick={() => northClickable && isLegal && handleCardClick(0, c)}
                                                />
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="flex -space-x-3">
                                        {Array.from({ length: Math.min(hands[0].length, 13) }).map((_, i) => (
                                            <div key={i} className="w-6 h-9 bg-blue-800 rounded border border-blue-600" style={{ zIndex: i }} />
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* 中間桌面：東、牌桌中心、西 */}
                        <div className="flex-1 flex items-center justify-between px-2">
                            {/* 西家 */}
                            <div className="flex flex-col items-center">
                                <span className={`text-xs font-bold mb-1 ${turnSeat === 3 ? 'text-yellow-300 animate-pulse' : 'text-gray-400'}`}>
                                    西家{turnSeat === 3 ? ' ←' : ''}
                                </span>
                                <div className="flex flex-col -space-y-6">
                                    {Array.from({ length: Math.min(hands[3].length, 10) }).map((_, i) => (
                                        <div key={i} className="w-8 h-11 bg-blue-800 rounded border border-blue-600 shadow" />
                                    ))}
                                </div>
                                <span className="text-gray-500 text-xs mt-1">{hands[3].length}張</span>
                            </div>

                            {/* 桌面中心 */}
                            <div className="flex-1 flex flex-col items-center justify-center gap-2 px-2">
                                {/* 當前墩 / 上一墩殘留 */}
                                <div className={`rounded-xl p-2 min-h-[100px] flex flex-col items-center gap-1 w-full max-w-[190px]
                                    ${isLastTrick ? 'bg-green-900/60 border border-green-600/40' : 'bg-green-700/50'}`}>
                                    {!displayTrick ? (
                                        <div className="text-gray-400 text-xs text-center py-2">
                                            {openingLeadMade ? '新的一墩' : '等待首攻...'}
                                        </div>
                                    ) : (
                                        <>
                                            {isLastTrick && (
                                                <div className="text-yellow-400 text-[10px] font-bold text-center mb-0.5">
                                                    {SEAT_NAME[lastTrickWinner]}家贏得此墩
                                                </div>
                                            )}
                                            {/* 北 */}
                                            <div className="flex justify-center">
                                                {displayTrick.find(t => t.seat === 0) ? (
                                                    <Card card={displayTrick.find(t => t.seat === 0).card} size="sm" disabled />
                                                ) : <div style={{ width: 34, height: 52 }} className="opacity-0" />}
                                            </div>
                                            {/* 西 東 */}
                                            <div className="flex justify-between items-center w-full px-1">
                                                {displayTrick.find(t => t.seat === 3) ? (
                                                    <Card card={displayTrick.find(t => t.seat === 3).card} size="sm" disabled />
                                                ) : <div style={{ width: 34, height: 52 }} className="opacity-0" />}
                                                {displayTrick.find(t => t.seat === 1) ? (
                                                    <Card card={displayTrick.find(t => t.seat === 1).card} size="sm" disabled />
                                                ) : <div style={{ width: 34, height: 52 }} className="opacity-0" />}
                                            </div>
                                            {/* 南 */}
                                            <div className="flex justify-center">
                                                {displayTrick.find(t => t.seat === 2) ? (
                                                    <Card card={displayTrick.find(t => t.seat === 2).card} size="sm" disabled />
                                                ) : <div style={{ width: 34, height: 52 }} className="opacity-0" />}
                                            </div>
                                        </>
                                    )}
                                </div>
                                {/* 提示訊息 */}
                                <div className="text-center text-xs">
                                    {isMyTurn ? (
                                        <span className="text-yellow-300 font-bold animate-pulse">
                                            {isSouthTurn ? '請出牌（南家）' : '請出牌（北明手）'}
                                            {selectedCard ? ' → 再點一次確認' : ''}
                                        </span>
                                    ) : (
                                        <span className="text-gray-400">
                                            {turnSeat >= 0 ? `${SEAT_NAME[turnSeat]}家出牌中...` : ''}
                                        </span>
                                    )}
                                </div>
                            </div>

                            {/* 東家 */}
                            <div className="flex flex-col items-center">
                                <span className={`text-xs font-bold mb-1 ${turnSeat === 1 ? 'text-yellow-300 animate-pulse' : 'text-gray-400'}`}>
                                    東家{turnSeat === 1 ? ' ←' : ''}
                                </span>
                                <div className="flex flex-col -space-y-6">
                                    {Array.from({ length: Math.min(hands[1].length, 10) }).map((_, i) => (
                                        <div key={i} className="w-8 h-11 bg-blue-800 rounded border border-blue-600 shadow" />
                                    ))}
                                </div>
                                <span className="text-gray-500 text-xs mt-1">{hands[1].length}張</span>
                            </div>
                        </div>

                        {/* 南家手牌 */}
                        <div className="border-t border-green-700/30 p-2 bg-green-900/30">
                            <div className="flex flex-col items-center gap-1">
                                <span className={`text-xs font-bold ${isSouthTurn ? 'text-yellow-300 animate-pulse' : 'text-gray-400'}`}>
                                    南家（您）{isSouthTurn ? ' ← 出牌' : ''}
                                </span>
                                <div className="flex flex-wrap justify-center gap-0.5">
                                    {hands[HUMAN_SEAT].map(c => {
                                        const isLegal = southLegal.includes(c.id);
                                        const isSel = selectedCard && selectedCard.id === c.id;
                                        return (
                                            <Card key={c.id}
                                                card={c}
                                                size="sm"
                                                selected={isSel}
                                                disabled={!southClickable || !isLegal}
                                                onClick={() => southClickable && isLegal && handleCardClick(HUMAN_SEAT, c)}
                                            />
                                        );
                                    })}
                                </div>
                                {selectedCard && isSouthTurn && (
                                    <button
                                        onClick={() => handleConfirmPlay(HUMAN_SEAT)}
                                        className="mt-1 bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold px-4 py-1 rounded-lg text-xs">
                                        確認出牌：{RANK_LABEL[selectedCard.rank]}{SUIT_SYMBOL[selectedCard.suit]}
                                    </button>
                                )}
                                {selectedCard && northClickable && turnSeat === 0 && (
                                    <button
                                        onClick={() => handleConfirmPlay(0)}
                                        className="mt-1 bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold px-4 py-1 rounded-lg text-xs">
                                        明手出牌：{RANK_LABEL[selectedCard.rank]}{SUIT_SYMBOL[selectedCard.suit]}
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // ── 計分畫面 ──────────────────────────────────────────
            if (phase === 'scoring') {
                const result = lastHandResult;
                const contractStr = contractDisplay(contract);

                return (
                    <div className="flex-1 bg-green-900 flex flex-col items-center overflow-y-auto p-4 gap-4">
                        <h2 className="text-white text-xl font-bold text-center">本局結果</h2>

                        {/* 合約結果 */}
                        <div className={`rounded-xl p-4 w-full max-w-sm text-center ${result.made ? 'bg-green-700/60 border border-green-400' : 'bg-red-900/60 border border-red-500'}`}>
                            <div className="text-2xl font-bold text-white mb-1">{contractStr}</div>
                            <div className="text-gray-300 text-sm mb-2">
                                {contract ? SEAT_NAME[contract.declarer] : ''}家叫牌
                                {contract && vulnerable[contract.declarer % 2 === 0 ? 'NS' : 'EW'] ? ' · 有局' : ' · 無局'}
                            </div>
                            {result.made ? (
                                <>
                                    <div className="text-green-300 text-lg font-bold">
                                        完成合約 {result.tricksWon > result.contractTricks ? `+${result.tricksWon - result.contractTricks}` : ''}
                                    </div>
                                    <div className="text-gray-300 text-sm mt-1">贏得 {result.tricksWon} 墩</div>
                                </>
                            ) : (
                                <>
                                    <div className="text-red-300 text-lg font-bold">差 {result.down} 墩</div>
                                    <div className="text-gray-300 text-sm mt-1">僅贏 {result.tricksWon || (contract.level + 6 - result.down)} 墩</div>
                                </>
                            )}
                        </div>

                        {/* 計分明細 */}
                        <div className="bg-gray-900/60 rounded-xl p-3 w-full max-w-sm">
                            <h3 className="text-yellow-300 font-bold text-sm mb-2 text-center">計分明細</h3>
                            {result.made ? (
                                <div className="space-y-1 text-sm">
                                    <div className="flex justify-between">
                                        <span className="text-gray-300">低線（合約分）</span>
                                        <span className="text-white font-bold">{result.below}</span>
                                    </div>
                                    {result.above > 0 && (
                                        <div className="flex justify-between">
                                            <span className="text-gray-300">高線（獎勵分）</span>
                                            <span className="text-white font-bold">{result.above}</span>
                                        </div>
                                    )}
                                    <div className="flex justify-between pt-1 border-t border-gray-700">
                                        <span className="text-yellow-300">得分方</span>
                                        <span className="text-yellow-300 font-bold">{result.side}</span>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-1 text-sm">
                                    <div className="flex justify-between">
                                        <span className="text-gray-300">罰分</span>
                                        <span className="text-white font-bold">{result.penalty}</span>
                                    </div>
                                    <div className="flex justify-between pt-1 border-t border-gray-700">
                                        <span className="text-yellow-300">得分方（防守）</span>
                                        <span className="text-yellow-300 font-bold">{result.side}</span>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 橡皮橋計分卡 */}
                        <ScoreCard rubberScore={rubberScore} gamesWon={gamesWon} vulnerable={vulnerable} />

                        {/* 橡皮橋結束 */}
                        {rubberOver ? (
                            <div className="bg-yellow-600/30 border border-yellow-500 rounded-xl p-4 w-full max-w-sm text-center">
                                <div className="text-yellow-300 text-xl font-bold mb-2">
                                    🏆 橡皮牌結束！
                                </div>
                                <div className="text-white font-bold text-lg mb-1">
                                    {rubberWinner} 獲勝
                                </div>
                                <div className="text-gray-300 text-sm mb-3">
                                    NS: {totalScore(rubberScore, 'NS')} | EW: {totalScore(rubberScore, 'EW')}
                                </div>
                                <button
                                    onClick={() => setGameState({
                                        ...INITIAL_STATE,
                                        rubberCount: gameState.rubberCount + 1,
                                    })}
                                    className="w-full bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold py-2 rounded-xl text-sm">
                                    開始新橡皮牌
                                </button>
                            </div>
                        ) : (
                            <button
                                onClick={() => setGameState(prev => startHand({ ...prev, dealer: (prev.dealer + 1) % 4 }))}
                                className="w-full max-w-sm bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-600 text-gray-900 font-bold py-3 rounded-xl text-lg shadow-lg transition-colors">
                                下一局 →
                            </button>
                        )}
                    </div>
                );
            }

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[PWA] SW registered:', reg.scope))
                    .catch(err => console.warn('[PWA] SW failed:', err));
            });
        }
    </script>
</body>
</html>
