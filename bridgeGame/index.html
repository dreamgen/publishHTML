                                                        {bidderName}
                                                    </div>
                                                )}
                                                {level}{STRAIN_SYMBOL[strain]}
                                            </button>
                                        );
                                    })
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const HandHCP = ({ hand }) => {
            const hcp = calcHCP(hand);
            const lens = suitLengths(hand);
            return (
                <div className="text-xs sm:text-sm text-gray-300 flex justify-center items-center gap-1.5 mt-1">
                    <span className="text-yellow-300 font-bold bg-black/50 px-2 py-0.5 rounded border border-white/20">
                        {hcp} 點
                    </span>
                    {SUITS.map(s => (
                        <span key={s} style={{ color: SUIT_COLOR_DARK_BG[s] }} className="bg-black/50 px-1.5 py-0.5 rounded font-bold flex items-center gap-0.5">
                            <span className="opacity-90">{SUIT_SYMBOL[s]}</span><span>{lens[s]}</span>
                        </span>
                    ))}
                </div>
            );
        };

        const ScoreCard = ({ rubberScore, gamesWon, vulnerable }) => {
            const nsBelow = rubberScore.NS.below;
            const ewBelow = rubberScore.EW.below;
            const nsAbove = rubberScore.NS.above;
            const ewAbove = rubberScore.EW.above;

            return (
                <div className="glass-panel rounded-2xl p-4 sm:p-6 w-full max-w-sm shadow-lg border border-white/10 mx-auto">
                    <div className="grid grid-cols-3 gap-2 text-sm sm:text-base text-center mb-3">
                        <div></div>
                        <div className="text-yellow-300 font-bold text-lg">NS{vulnerable.NS ? ' ●' : ''}</div>
                        <div className="text-yellow-300 font-bold text-lg">EW{vulnerable.EW ? ' ●' : ''}</div>
                    </div>
                    <div className="text-xs text-gray-400 text-center mb-1 tracking-widest">── 高線 ──</div>
                    {[...Array(Math.max(nsAbove.length, ewAbove.length, 1))].map((_, i) => (
                        <div key={i} className="grid grid-cols-3 gap-2 text-base text-center py-0.5">
                            <div></div>
                            <div className="text-green-300 font-bold">{nsAbove[i] != null ? nsAbove[i] : ''}</div>
                            <div className="text-green-300 font-bold">{ewAbove[i] != null ? ewAbove[i] : ''}</div>
                        </div>
                    ))}
                    <div className="border-b border-white/20 my-2" />
                    <div className="text-xs text-gray-400 text-center mb-1 tracking-widest">── 低線 ──</div>
                    {[...Array(Math.max(nsBelow.length, ewBelow.length, 1))].map((_, i) => (
                        <div key={i} className="grid grid-cols-3 gap-2 text-base text-center py-0.5">
                            <div></div>
                            <div className="text-white font-bold">{nsBelow[i] != null ? nsBelow[i] : ''}</div>
                            <div className="text-white font-bold">{ewBelow[i] != null ? ewBelow[i] : ''}</div>
                        </div>
                    ))}
                    <div className="border-b border-white/20 my-3" />
                    <div className="grid grid-cols-3 gap-2 text-base text-center font-bold items-center">
                        <div className="text-gray-400">局數</div>
                        <div className="text-yellow-300 text-xl bg-black/30 rounded py-1">{gamesWon.NS}</div>
                        <div className="text-yellow-300 text-xl bg-black/30 rounded py-1">{gamesWon.EW}</div>
                    </div>
                </div>
            );
        };

        const GameInfoModal = ({ visible, onClose, gameState }) => {
            if (!visible) return null;
            const { rubberCount, dealer, vulnerable, rubberScore, gamesWon } = gameState;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                    <div className="glass-panel rounded-3xl p-6 w-full max-w-sm shadow-2xl relative border border-white/20 bg-[#022c22]/95" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-3 right-4 text-gray-400 hover:text-white text-3xl font-black active:scale-90 transition-all">&times;</button>
                        <h2 className="text-yellow-300 text-xl font-black mb-4 text-center tracking-widest">遊戲資訊</h2>
                        
                        <div className="bg-black/40 rounded-xl p-3 mb-4 text-gray-200 text-sm font-bold flex justify-between border border-white/10">
                            <span>第 {rubberCount} 橡皮牌</span>
                            <span>發牌：{SEAT_NAME[dealer]}家</span>
                        </div>

                        <ScoreCard rubberScore={rubberScore} gamesWon={gamesWon} vulnerable={vulnerable} />
                        
                        <button onClick={onClose} className="w-full mt-5 bg-slate-600 hover:bg-slate-500 text-white font-bold py-3 rounded-xl active:scale-95 transition-all shadow-md tracking-widest">
                            關 閉
                        </button>
                    </div>
                </div>
            );
        };

        const BoardStatsOverlay = ({ visible, hands }) => {
            if (!visible) return null;
            
            const StatBox = ({ seat, label }) => {
                const hand = hands[seat];
                const hcp = calcHCP(hand);
                const lens = suitLengths(hand);
                return (
                    <div className="p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-white/20 flex flex-col items-center shadow-[0_0_15px_rgba(0,0,0,0.8)] bg-black/80 backdrop-blur-md pointer-events-none">
                        <div className="text-yellow-300 font-bold mb-1.5 text-sm sm:text-base tracking-widest">
                            {label} · {hand.length}張 · {hcp}點
                        </div>
                        <div className="flex gap-2 sm:gap-3">
                            {SUITS.map(s => (
                                <span key={s} style={{ color: SUIT_COLOR_DARK_BG[s] }} className="font-bold flex items-center text-sm sm:text-base">
                                    {SUIT_SYMBOL[s]}{lens[s]}
                                </span>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="absolute inset-0 z-[60] pointer-events-none transition-opacity duration-300 animate-fade-in">
                    <div className="absolute top-12 left-1/2 -translate-x-1/2"><StatBox seat={0} label="北家" /></div>
                    <div className="absolute top-1/2 -translate-y-1/2 left-2"><StatBox seat={3} label="西家" /></div>
                    <div className="absolute top-1/2 -translate-y-1/2 right-2"><StatBox seat={1} label="東家" /></div>
                    <div className="absolute bottom-36 sm:bottom-40 left-1/2 -translate-x-1/2"><StatBox seat={2} label="南家" /></div>
                </div>
            );
        };

        // ══════════════════════════════════════════════════════════════
        // 主應用
        // ══════════════════════════════════════════════════════════════
        function App() {
            // ── UI 版面縮放 (REM 核心引擎) ──
            const [uiScale, setUiScale] = useState(() => {
                return localStorage.getItem('bridgeUiScale') || 'sm';
            });

            useEffect(() => {
                localStorage.setItem('bridgeUiScale', uiScale);
                // 調整根目錄字體大小，達成全局等比例縮放
                if (uiScale === 'sm') document.documentElement.style.fontSize = '16px';
                if (uiScale === 'md') document.documentElement.style.fontSize = '19px'; // 放大約 19%
                if (uiScale === 'lg') document.documentElement.style.fontSize = '22px'; // 放大約 38%
            }, [uiScale]);

            // ── 遊戲核心狀態 ──
            const [gameState, setGameState] = useState(INITIAL_STATE);
            const [selectedCard, setSelectedCard] = useState(null);
            const [southExpanded, setSouthExpanded] = useState(true);
            const [northExpanded, setNorthExpanded] = useState(false);
            
            const [showInfoModal, setShowInfoModal] = useState(false);
            const [showBoardStats, setShowBoardStats] = useState(false);

            const { phase, hands, biddingSequence, currentBidder, contract,
                    dealer, vulnerable, rubberScore, gamesWon, dummySeat,
                    currentLeader, currentTrick, tricksTaken, openingLeadMade,
                    dummyRevealed, lastHandResult, lastCompletedTrick,
                    rubberOver, rubberWinner, autoPlayDummy } = gameState;

            const HUMAN_SEAT = 2;
            const trumpSuit = contract && contract.strain !== 'N' ? contract.strain : null;

            useEffect(() => {
                if (phase !== 'bidding') return;
                if (currentBidder === HUMAN_SEAT) return;
                const t = setTimeout(() => {
                    setGameState(prev => {
                        if (prev.phase !== 'bidding' || prev.currentBidder === HUMAN_SEAT) return prev;
                        const call = aiBid(prev.currentBidder, prev.hands[prev.currentBidder], prev.biddingSequence);
                        return addBid(prev, call);
                    });
                }, 500);
                return () => clearTimeout(t);
            }, [phase, biddingSequence.length, currentBidder]);

            useEffect(() => {
                if (phase !== 'passedOut') return;
                const t = setTimeout(() => setGameState(prev => prev.phase === 'passedOut' ? startHand({ ...prev, dealer: (prev.dealer + 1) % 4 }) : prev), 1500);
                return () => clearTimeout(t);
            }, [phase]);

            useEffect(() => {
                if (phase !== 'playing') return;
                const turnSeat = (currentLeader + currentTrick.length) % 4;
                if (isHumanTurn(turnSeat, gameState)) return;
                const t = setTimeout(() => {
                    setGameState(prev => {
                        if (prev.phase !== 'playing') return prev;
                        const ts = (prev.currentLeader + prev.currentTrick.length) % 4;
                        if (isHumanTurn(ts, prev)) return prev;
                        const tr = prev.contract.strain === 'N' ? null : prev.contract.strain;
                        const card = aiSelectCard(ts, prev.hands[ts], prev.currentTrick, tr, prev.contract);
                        return playCard(prev, ts, card);
                    });
                }, 700);
                return () => clearTimeout(t);
            }, [phase, currentTrick.length, currentLeader, openingLeadMade]);

            useEffect(() => {
                if (!lastCompletedTrick) return;
                if (phase === 'handFinished') return; 
                const t = setTimeout(() => setGameState(prev => ({ ...prev, lastCompletedTrick: null })), 2000);
                return () => clearTimeout(t);
            }, [lastCompletedTrick, phase]);

            useEffect(() => {
                if (phase === 'bidding') {
                    setSouthExpanded(currentBidder === 2);
                    setNorthExpanded(currentBidder === 0);
                } else if (phase === 'playing') {
                    const turnSeat = (currentLeader + currentTrick.length) % 4;
                    setSouthExpanded(turnSeat === 2);
                    if (turnSeat === 0 && (!autoPlayDummy && (dummySeat === 0 ? openingLeadMade : true))) {
                        setNorthExpanded(true);
                    } else {
                        setNorthExpanded(false);
                    }
                } else if (phase === 'handFinished' || phase === 'scoring') {
                    setSouthExpanded(false);
                    setNorthExpanded(false);
                }
            }, [phase, currentBidder, currentLeader, currentTrick.length, autoPlayDummy, dummySeat, openingLeadMade]);

            const handleCardClick = (seat, card) => {
                if (phase !== 'playing') return;
                const turnSeat = (currentLeader + currentTrick.length) % 4;
                if (turnSeat !== seat) return;
                if (!isHumanTurn(seat, gameState)) return;
                const legal = legalCards(hands[seat], currentTrick, trumpSuit);
                if (!legal.find(c => c.id === card.id)) return;
                if (selectedCard && selectedCard.id === card.id) {
                    setSelectedCard(null);
                    setGameState(prev => playCard(prev, seat, card));
                } else {
                    setSelectedCard(card);
                }
            };

            const handleConfirmPlay = (seat) => {
                if (!selectedCard) return;
                const legal = legalCards(hands[seat], currentTrick, trumpSuit);
                if (!legal.find(c => c.id === selectedCard.id)) return;
                const card = selectedCard;
                setSelectedCard(null);
                setGameState(prev => playCard(prev, seat, card));
            };

            const handleBid = (call) => {
                if (phase !== 'bidding' || currentBidder !== HUMAN_SEAT) return;
                setGameState(prev => addBid(prev, call));
            };

            const turnSeat = phase === 'playing' ? (currentLeader + currentTrick.length) % 4 : -1;
            const isMyTurn = phase === 'playing' && isHumanTurn(turnSeat, gameState);
            const displayTrick = currentTrick.length > 0 ? currentTrick : lastCompletedTrick;
            const isLastTrick  = currentTrick.length === 0 && lastCompletedTrick !== null;
            const lastTrickWinner = isLastTrick ? trickWinner(lastCompletedTrick, contract && contract.strain !== 'N' ? contract.strain : null) : -1;

            const humanControlsDummy = !autoPlayDummy;
            const southLegal = phase === 'playing' && turnSeat === HUMAN_SEAT ? legalCards(hands[HUMAN_SEAT], currentTrick, trumpSuit).map(c => c.id) : [];
            const northIsHumanControlled = humanControlsDummy && (dummySeat !== 0 || openingLeadMade);
            const northLegal = phase === 'playing' && turnSeat === 0 && northIsHumanControlled ? legalCards(hands[0], currentTrick, trumpSuit).map(c => c.id) : [];
            const isNorthTurn = turnSeat === 0;
            const isSouthTurn = turnSeat === HUMAN_SEAT;
            const northClickable = isNorthTurn && northIsHumanControlled;
            const southClickable = isSouthTurn;

            // ── 渲染階段 ──────────────────────────────────────────────

            if (phase === 'menu') {
                const hasGame = gamesWon.NS > 0 || gamesWon.EW > 0 || rubberScore.NS.below.length > 0 || rubberScore.EW.below.length > 0 || rubberScore.NS.above.length > 0 || rubberScore.EW.above.length > 0;
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 gap-4 sm:gap-6 overflow-y-auto hide-scrollbar">
                        <div className="glass-panel rounded-3xl p-6 text-center w-full max-w-[24rem] animate-fade-in shadow-2xl">
                            <div className="text-5xl mb-2 flex justify-center gap-2">
                                <span style={{color:'#f8fafc'}}>♠</span><span style={{color:'#ef4444'}}>♥</span><span style={{color:'#f97316'}}>♦</span><span style={{color:'#4ade80'}}>♣</span>
                            </div>
                            <h1 className="text-white text-3xl font-black mb-1">橋牌單機版</h1>
                            <p className="text-green-300 text-base font-bold">橡皮橋制 · 南家視角</p>
                        </div>

                        {/* UI 縮放與字體設定 */}
                        <div className="glass-panel rounded-3xl p-4 sm:p-5 w-full max-w-[24rem] flex flex-col gap-3">
                            <div className="text-yellow-300 font-bold text-sm sm:text-base text-center tracking-widest">
                                介面字體與卡牌縮放
                            </div>
                            <div className="flex gap-2">
                                {[
                                    { id: 'sm', label: '小' },
                                    { id: 'md', label: '中' },
                                    { id: 'lg', label: '大' }
                                ].map(sz => (
                                    <button
                                        key={sz.id}
                                        onClick={() => setUiScale(sz.id)}
                                        className={`flex-1 py-2.5 rounded-xl font-bold text-sm sm:text-base transition-all active:scale-95 ${
                                            uiScale === sz.id
                                                ? 'bg-yellow-500 text-gray-900 shadow-md border-2 border-yellow-300'
                                                : 'bg-black/40 text-gray-300 border border-gray-600 hover:bg-black/60'
                                        }`}
                                    >
                                        {sz.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {hasGame && <ScoreCard rubberScore={rubberScore} gamesWon={gamesWon} vulnerable={vulnerable} />}

                        <div className="flex flex-col gap-3 w-full max-w-[24rem] px-2">
                            <button onClick={() => setGameState(prev => startHand(prev))}
                                className="w-full bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-black py-4 rounded-2xl text-xl shadow-[0_0_20px_rgba(250,204,21,0.4)] active:scale-95 transition-all">
                                {hasGame ? '繼續下一局 →' : '開始遊戲 →'}
                            </button>
                            <button onClick={() => setGameState(prev => ({ ...prev, autoPlayDummy: !prev.autoPlayDummy }))}
                                className={`w-full font-bold py-3 rounded-2xl text-sm shadow active:scale-95 transition-all border
                                    ${autoPlayDummy ? 'glass-panel border-gray-500/50 text-gray-300' : 'bg-blue-900/40 border-blue-400/50 text-blue-200'}`}>
                                北家(明手)：{autoPlayDummy ? 'AI 代出' : '自己出牌'} (點擊切換)
                            </button>
                            <button onClick={() => setGameState({ ...INITIAL_STATE, rubberCount: gameState.rubberCount + (hasGame ? 1 : 0) })}
                                className="w-full glass-panel border border-white/10 text-gray-400 font-bold py-3 rounded-2xl text-sm active:scale-95 transition-all">
                                清除分數 (新橡皮牌)
                            </button>
                        </div>
                    </div>
                );
            }

            if (phase === 'passedOut') {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4">
                        <div className="glass-panel rounded-3xl p-10 text-center animate-fade-in shadow-2xl">
                            <div className="text-6xl mb-4">🃏</div>
                            <h2 className="text-white text-3xl font-bold mb-2">四家皆過叫</h2>
                            <p className="text-green-300 text-lg">重新發牌...</p>
                        </div>
                    </div>
                );
            }

            if (phase === 'bidding') {
                const isHumanBidTurn = currentBidder === HUMAN_SEAT;
                const vulStr = vulnerable.NS && vulnerable.EW ? '雙方有局' : vulnerable.NS ? 'NS有局' : vulnerable.EW ? 'EW有局' : '無局';
                return (
                    <div className="flex-1 flex flex-col overflow-hidden relative">
                        <div className="glass-panel flex items-center px-2 py-2 shrink-0 border-b border-white/10 relative z-20">
                            <div className="flex-1 flex justify-start">
                                <PlayerBadge name="北" isActive={currentBidder === 0} isHuman={false} />
                            </div>
                            <div className="shrink-0 flex justify-center px-1">
                                <span className="text-gray-200 text-xs sm:text-sm font-bold bg-black/30 px-2 sm:px-3 py-1 rounded-full whitespace-nowrap">{vulStr}</span>
                            </div>
                            <div className="flex-1 flex justify-end items-center gap-1 sm:gap-2">
                                <PlayerBadge name="東" isActive={currentBidder === 1} isHuman={false} />
                                <button onClick={() => setShowBoardStats(!showBoardStats)} className={`w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center rounded-full border active:scale-95 transition-all text-xs sm:text-sm shadow-sm ${showBoardStats ? 'bg-yellow-500/20 border-yellow-400 text-yellow-300' : 'bg-white/10 hover:bg-white/20 border-white/20 text-gray-300'}`}>
                                    👁️
                                </button>
                                <button onClick={() => setShowInfoModal(true)} className="w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center bg-white/10 hover:bg-white/20 rounded-full border border-white/20 active:scale-95 transition-all text-xs sm:text-sm text-yellow-300 shadow-sm">
                                    ℹ️
                                </button>
                            </div>
                        </div>

                        <div className="glass-light mx-2 mt-2 rounded-2xl p-2 shrink-0 shadow-lg relative">
                            <div className="flex flex-col items-center gap-1">
                                <HandHCP hand={hands[0]} />
                                {/* 叫牌階段統一使用 'preview' 尺寸 */}
                                <div className="w-[90%] sm:w-[80%] mx-auto">
                                    <HandDisplay cards={hands[0]} isExpanded={northExpanded} disabledOverall={true} size="preview" />
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 flex items-center justify-center py-2 px-1">
                            <AuctionBox sequence={biddingSequence} dealer={dealer} />
                        </div>

                        <div className="glass-light mx-2 mb-2 rounded-2xl p-2 shrink-0 shadow-lg relative">
                            <div className="flex flex-col items-center gap-1.5">
                                <div className="flex justify-between w-full px-2 items-center">
                                    <PlayerBadge name="南家(您)" isActive={isHumanBidTurn} isHuman={true} />
                                    <button onClick={() => setSouthExpanded(!southExpanded)}
                                        className="text-xs text-yellow-300 bg-black/40 px-2 py-1 rounded font-bold border border-yellow-600/50">
                                        {southExpanded ? '收合 ▲' : '展開 ▼'}
                                    </button>
                                </div>
                                <HandHCP hand={hands[HUMAN_SEAT]} />
                                {/* 叫牌階段統一使用 'preview' 尺寸 */}
                                <div className="w-[90%] sm:w-[80%] mx-auto">
                                    <HandDisplay cards={hands[HUMAN_SEAT]} isExpanded={southExpanded} disabledOverall={true} size="preview" />
                                </div>
                            </div>
                        </div>

                        <BiddingSheet onBid={handleBid} sequence={biddingSequence} visible={isHumanBidTurn} />
                        
                        <BoardStatsOverlay visible={showBoardStats} hands={hands} />
                        <GameInfoModal visible={showInfoModal} onClose={() => setShowInfoModal(false)} gameState={gameState} />
                    </div>
                );
            }

            if (phase === 'playing' || phase === 'handFinished') {
                const contractStr = contractDisplay(contract);
                const declarerName = contract ? SEAT_NAME[contract.declarer] : '';

                return (
                    <div className="flex-1 flex flex-col overflow-hidden w-full h-full justify-between relative">
                        <div className="glass-panel flex items-center justify-between px-3 py-2 shrink-0 z-20 border-b border-white/10">
                            <div className="flex flex-col">
                                <span className="text-yellow-400 font-black text-lg sm:text-xl leading-tight">{contractStr}</span>
                                <span className="text-gray-300 text-[10px] sm:text-xs">{declarerName}家莊</span>
                            </div>
                            <div className="flex items-center gap-1.5 sm:gap-3">
                                <div className="text-xs sm:text-sm text-gray-200 flex items-center gap-1.5 bg-black/40 px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg border border-white/10">
                                    <span className="font-bold">NS <span className="text-yellow-300 ml-0.5 text-sm sm:text-lg">{tricksTaken.NS}</span></span>
                                    <span className="text-gray-500">|</span>
                                    <span className="font-bold">EW <span className="text-yellow-300 ml-0.5 text-sm sm:text-lg">{tricksTaken.EW}</span></span>
                                </div>
                                <button onClick={() => setShowBoardStats(!showBoardStats)} className={`w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center rounded-full border active:scale-95 transition-all text-xs sm:text-sm shadow-sm ${showBoardStats ? 'bg-yellow-500/20 border-yellow-400 text-yellow-300' : 'bg-white/10 hover:bg-white/20 border-white/20 text-gray-300'}`}>
                                    👁️
                                </button>
                                <button onClick={() => setShowInfoModal(true)} className="w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center bg-white/10 hover:bg-white/20 rounded-full border border-white/20 active:scale-95 transition-all text-xs sm:text-sm text-yellow-300 shadow-sm">
                                    ℹ️
                                </button>
                            </div>
                        </div>

                        {/* North hand - 打牌階段使用 'play' 尺寸並啟動雙排放大 */}
                        {(() => {
                            const northFaceUp = dummyRevealed || (humanControlsDummy && dummySeat !== 0);
                            return (
                                <div className="glass-light mx-1 sm:mx-4 mt-2 rounded-xl p-2 shrink-0 shadow-lg relative">
                                    <div className="flex justify-between items-center mb-1 px-2">
                                        <PlayerBadge name={northFaceUp ? "北(明手)" : "北家"} isActive={isNorthTurn} isHuman={false} />
                                        {northFaceUp && (
                                            <button onClick={() => setNorthExpanded(!northExpanded)} className="text-[10px] sm:text-xs text-yellow-300 bg-black/40 px-2 py-1 rounded font-bold border border-yellow-600/50">
                                                {northExpanded ? '收合 ▲' : '展開 ▼'}
                                            </button>
                                        )}
                                    </div>
                                    <div className="w-[90%] sm:w-[80%] mx-auto">
                                        {northFaceUp ? (
                                            <HandDisplay cards={hands[0]} isExpanded={northExpanded} onCardClick={(c) => handleCardClick(0, c)}
                                                legalIds={northLegal} selectedId={selectedCard && northClickable ? selectedCard.id : null}
                                                clickable={northClickable} size="play" />
                                        ) : (
                                            <div className="flex justify-center -space-x-5 py-1">
                                                {Array.from({ length: Math.min(hands[0].length, 13) }).map((_, i) => (
                                                    <div key={i} style={{ zIndex: i }}><Card isHidden size="hidden" /></div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })()}

                        {/* Center Table */}
                        <div className="flex-1 flex items-center justify-between px-1 w-full relative min-h-[13.75rem]">
                            <div className="flex flex-col items-center gap-1 shrink-0 w-10 sm:w-16">
                                <PlayerBadge name="西" isActive={turnSeat === 3} isHuman={false} />
                                <div className="flex flex-col -space-y-8 sm:-space-y-12 pt-2">
                                    {Array.from({ length: Math.min(hands[3].length, 13) }).map((_, i) => (
                                        <div key={i} style={{ zIndex: i }}><Card isHidden size="hidden" /></div>
                                    ))}
                                </div>
                            </div>

                            <div className="flex-1 flex flex-col items-center justify-center relative h-full max-h-[17.5rem]">
                                <div className="glass-panel rounded-2xl p-2 w-full max-w-[12.5rem] sm:max-w-[15rem] aspect-square flex flex-col items-center justify-center shadow-xl relative border border-white/20">
                                    {!displayTrick ? (
                                        <div className="text-gray-300 text-sm font-bold opacity-70">等待首攻...</div>
                                    ) : (
                                        <div className="flex flex-col items-center justify-center w-full relative">
                                            {isLastTrick && (
                                                <div className="absolute -top-4 left-1/2 -translate-x-1/2 text-yellow-300 text-sm font-bold bg-black/80 px-3 py-1 rounded-full shadow-md z-40 border border-yellow-600/50 whitespace-nowrap">
                                                    {SEAT_NAME[lastTrickWinner]}家贏墩
                                                </div>
                                            )}
                                            <div className="flex justify-center -mb-6 relative z-10">
                                                {displayTrick.find(t => t.seat === 0) ? <Card card={displayTrick.find(t => t.seat === 0).card} size="trick" disabled /> : <div className="w-12 h-16 sm:w-16 sm:h-24 md:w-20 md:h-28 opacity-0" />}
                                            </div>
                                            <div className="flex justify-between items-center w-full px-2 sm:px-4 relative z-20">
                                                {displayTrick.find(t => t.seat === 3) ? <Card card={displayTrick.find(t => t.seat === 3).card} size="trick" disabled /> : <div className="w-12 h-16 sm:w-16 sm:h-24 md:w-20 md:h-28 opacity-0" />}
                                                {displayTrick.find(t => t.seat === 1) ? <Card card={displayTrick.find(t => t.seat === 1).card} size="trick" disabled /> : <div className="w-12 h-16 sm:w-16 sm:h-24 md:w-20 md:h-28 opacity-0" />}
                                            </div>
                                            <div className="flex justify-center -mt-6 relative z-30">
                                                {displayTrick.find(t => t.seat === 2) ? <Card card={displayTrick.find(t => t.seat === 2).card} size="trick" disabled /> : <div className="w-12 h-16 sm:w-16 sm:h-24 md:w-20 md:h-28 opacity-0" />}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="h-8 mt-2 flex items-center justify-center">
                                    {phase === 'handFinished' ? (
                                        <button onClick={() => setGameState(prev => ({ ...prev, phase: 'scoring' }))}
                                            className="bg-yellow-500 text-gray-900 font-bold px-5 py-2 rounded-full text-sm shadow-[0_0_15px_rgba(250,204,21,0.6)] animate-pulse">
                                            結算成績 →
                                        </button>
                                    ) : isMyTurn ? (
                                        <span className="text-yellow-300 text-sm font-bold bg-black/50 px-3 py-1 rounded-full border border-yellow-500/30">
                                            {selectedCard ? '點擊確認按鈕出牌' : (isSouthTurn ? '請出牌 (南家)' : '請出牌 (明手)')}
                                        </span>
                                    ) : turnSeat >= 0 ? (
                                        <span className="text-gray-400 text-xs font-bold">{SEAT_NAME[turnSeat]}家出牌中...</span>
                                    ) : null}
                                </div>
                            </div>

                            <div className="flex flex-col items-center gap-1 shrink-0 w-10 sm:w-16">
                                <PlayerBadge name="東" isActive={turnSeat === 1} isHuman={false} />
                                <div className="flex flex-col -space-y-8 sm:-space-y-12 pt-2">
                                    {Array.from({ length: Math.min(hands[1].length, 13) }).map((_, i) => (
                                        <div key={i} style={{ zIndex: i }}><Card isHidden size="hidden" /></div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* South hand - 打牌階段使用 'play' 尺寸並啟動雙排放大 */}
                        <div className="glass-light mx-1 sm:mx-4 mb-2 rounded-xl p-2 shrink-0 shadow-[0_-5px_20px_rgba(0,0,0,0.3)] relative">
                            <div className="flex justify-between items-center mb-1 px-2">
                                <PlayerBadge name="南(您)" isActive={isSouthTurn} isHuman={true} />
                                <button onClick={() => setSouthExpanded(!southExpanded)} className="text-[10px] sm:text-xs text-yellow-300 bg-black/40 px-2 py-1 rounded font-bold border border-yellow-600/50">
                                    {southExpanded ? '收合 ▲' : '展開 ▼'}
                                </button>
                            </div>
                            <div className="relative w-[90%] sm:w-[80%] mx-auto">
                                <HandDisplay cards={hands[HUMAN_SEAT]} isExpanded={southExpanded}
                                    onCardClick={(c) => handleCardClick(HUMAN_SEAT, c)} legalIds={southLegal}
                                    selectedId={selectedCard && isSouthTurn ? selectedCard.id : null} clickable={southClickable} size="play" />
                                
                                <div className="absolute -top-14 left-0 right-0 flex justify-center z-50 pointer-events-none">
                                    {selectedCard && (isSouthTurn || (northClickable && turnSeat === 0)) && (
                                        <button onClick={() => handleConfirmPlay(turnSeat === 0 ? 0 : HUMAN_SEAT)}
                                            className="pointer-events-auto bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-black px-8 py-3 rounded-full text-lg shadow-[0_5px_20px_rgba(0,0,0,0.5)] border-2 border-yellow-200 animate-slide-up">
                                            確認打出 {RANK_LABEL[selectedCard.rank]}{SUIT_SYMBOL[selectedCard.suit]}
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>

                        <BoardStatsOverlay visible={showBoardStats} hands={hands} />
                        <GameInfoModal visible={showInfoModal} onClose={() => setShowInfoModal(false)} gameState={gameState} />
                    </div>
                );
            }

            if (phase === 'scoring') {
                const result = lastHandResult;
                const contractStr = contractDisplay(contract);
                const isNSResult = result && result.side === 'NS';

                return (
                    <div className="flex-1 flex flex-col items-center overflow-y-auto hide-scrollbar p-4 sm:p-8 gap-4 sm:gap-6 animate-slide-up pb-10">
                        <h2 className="text-white text-2xl sm:text-3xl md:text-4xl font-bold mt-2">本局結算</h2>

                        <div className={`glass-panel rounded-2xl sm:rounded-3xl p-6 sm:p-10 w-full max-w-[24rem] sm:max-w-lg md:max-w-xl text-center border-l-8 shadow-2xl
                            ${result.made ? (isNSResult ? 'border-l-green-400' : 'border-l-blue-400') : 'border-l-red-400'}`}>
                            <div className="text-4xl sm:text-5xl md:text-6xl font-black text-white mb-2">{contractStr}</div>
                            <div className="text-gray-300 text-sm sm:text-base md:text-xl mb-4">
                                {SEAT_NAME[contract.declarer]}家 · {vulnerable[contract.declarer % 2 === 0 ? 'NS' : 'EW'] ? '有局' : '無局'}
                            </div>
                            {result.made ? (
                                <>
                                    <div className="text-green-300 text-2xl sm:text-3xl md:text-4xl font-bold mb-1">✓ 完成{result.tricksWon > result.contractTricks ? ` +${result.tricksWon - result.contractTricks}` : ''}</div>
                                    <div className="text-gray-400 text-sm sm:text-lg">贏得 {result.tricksWon} 墩</div>
                                </>
                            ) : (
                                <>
                                    <div className="text-red-400 text-2xl sm:text-3xl md:text-4xl font-bold mb-1">✗ 倒 {result.down} 墩</div>
                                    <div className="text-gray-400 text-sm sm:text-lg">僅贏 {result.tricksWon || (contract.level + 6 - result.down)} 墩</div>
                                </>
                            )}
                        </div>

                        <div className="glass-panel rounded-2xl p-5 w-full max-w-[24rem] sm:max-w-lg shadow-md">
                            <h3 className="text-yellow-300 font-bold text-lg mb-3 text-center border-b border-white/10 pb-2">計分明細</h3>
                            {result.made ? (
                                <div className="space-y-2 text-base sm:text-lg">
                                    <div className="flex justify-between"><span className="text-gray-300">低線 (合約分)</span><span className="text-white font-bold">{result.below}</span></div>
                                    {result.above > 0 && <div className="flex justify-between"><span className="text-gray-300">高線 (獎勵分)</span><span className="text-green-300 font-bold">{result.above}</span></div>}
                                    <div className="flex justify-between pt-2 border-t border-white/10 mt-2"><span className="text-yellow-300 text-sm">得分方</span><span className="text-yellow-300 font-bold">{result.side}</span></div>
                                </div>
                            ) : (
                                <div className="space-y-2 text-base sm:text-lg">
                                    <div className="flex justify-between"><span className="text-gray-300">罰分</span><span className="text-red-300 font-bold">{result.penalty}</span></div>
                                    <div className="flex justify-between pt-2 border-t border-white/10 mt-2"><span className="text-yellow-300 text-sm">得分方 (防守)</span><span className="text-yellow-300 font-bold">{result.side}</span></div>
                                </div>
                            )}
                        </div>

                        <ScoreCard rubberScore={rubberScore} gamesWon={gamesWon} vulnerable={vulnerable} />

                        {rubberOver ? (
                            <div className="glass-panel border-2 border-yellow-500 rounded-2xl sm:rounded-3xl p-6 sm:p-10 w-full max-w-[24rem] sm:max-w-lg text-center shadow-2xl bg-yellow-900/30 mt-2">
                                <div className="text-5xl sm:text-6xl mb-3">🏆</div>
                                <div className="text-yellow-300 text-2xl sm:text-3xl font-black mb-2">橡皮牌結束！</div>
                                <div className="text-white font-bold text-xl sm:text-2xl mb-3">{rubberWinner} 獲勝</div>
                                <div className="text-gray-300 text-sm sm:text-lg mb-5 font-mono">NS: {totalScore(rubberScore, 'NS')} | EW: {totalScore(rubberScore, 'EW')}</div>
                                <button onClick={() => setGameState({ ...INITIAL_STATE, rubberCount: gameState.rubberCount + 1 })}
                                    className="w-full bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-black py-4 sm:py-5 rounded-xl sm:rounded-2xl text-lg sm:text-xl active:scale-95 transition-all shadow-lg">
                                    開始新橡皮牌 →
                                </button>
                            </div>
                        ) : (
                            <button onClick={() => setGameState(prev => startHand({ ...prev, dealer: (prev.dealer + 1) % 4 }))}
                                className="w-full max-w-[24rem] sm:max-w-lg bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-black py-4 sm:py-5 rounded-xl sm:rounded-2xl text-lg sm:text-xl shadow-lg active:scale-95 transition-all mt-2">
                                下一局 →
                            </button>
                        )}
                    </div>
                );
            }

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
