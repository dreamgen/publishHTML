<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bridgeGameBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f4c2a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background (green felt) -->
  <rect width="192" height="192" rx="38" ry="38" fill="url(#bridgeGameBg)"/>

  <!-- Card shape -->
  <rect x="44" y="28" width="104" height="136" rx="10" ry="10" fill="white" stroke="#d1d5db" stroke-width="3"/>

  <!-- Inner border -->
  <rect x="52" y="36" width="88" height="120" rx="6" ry="6" fill="none" stroke="#9ca3af" stroke-width="1.5" opacity="0.5"/>

  <!-- Spade symbol -->
  <text x="96" y="118" font-family="serif" font-size="80" font-weight="bold" fill="#111827"
        text-anchor="middle" dominant-baseline="auto">♠</text>
</svg>
