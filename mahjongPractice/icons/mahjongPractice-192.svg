<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="mahjongPracticeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#14532d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="mahjongPracticeTile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9c3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fef08a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background (green felt) -->
  <rect width="192" height="192" rx="38" ry="38" fill="url(#mahjongPracticeBg)"/>

  <!-- Mahjong tile shape -->
  <rect x="44" y="28" width="104" height="136" rx="10" ry="10" fill="url(#mahjongPracticeTile)" stroke="#ca8a04" stroke-width="4"/>

  <!-- Inner border -->
  <rect x="52" y="36" width="88" height="120" rx="6" ry="6" fill="none" stroke="#a16207" stroke-width="2" opacity="0.5"/>

  <!-- 中 character in red -->
  <text x="96" y="118" font-family="serif" font-size="80" font-weight="bold" fill="#dc2626"
        text-anchor="middle" dominant-baseline="auto">中</text>
</svg>
