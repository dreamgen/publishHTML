<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="mahjongPractice512Bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#14532d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="mahjongPractice512Tile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9c3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fef08a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background (green felt) -->
  <rect width="512" height="512" rx="102" ry="102" fill="url(#mahjongPractice512Bg)"/>

  <!-- Mahjong tile shape -->
  <rect x="118" y="74" width="276" height="364" rx="26" ry="26" fill="url(#mahjongPractice512Tile)" stroke="#ca8a04" stroke-width="10"/>

  <!-- Inner border -->
  <rect x="139" y="95" width="234" height="322" rx="16" ry="16" fill="none" stroke="#a16207" stroke-width="5" opacity="0.5"/>

  <!-- 中 character in red -->
  <text x="256" y="314" font-family="serif" font-size="214" font-weight="bold" fill="#dc2626"
        text-anchor="middle" dominant-baseline="auto">中</text>
</svg>
