<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>
  <!-- App background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>
  <!-- Dice body -->
  <rect x="88" y="88" width="336" height="336" rx="56" ry="56" fill="white" filter="url(#shadow)"/>
  <!-- Pips for value 5 -->
  <circle cx="174" cy="174" r="30" fill="#4f46e5"/>
  <circle cx="338" cy="174" r="30" fill="#4f46e5"/>
  <circle cx="256" cy="256" r="30" fill="#e11d48"/>
  <circle cx="174" cy="338" r="30" fill="#4f46e5"/>
  <circle cx="338" cy="338" r="30" fill="#4f46e5"/>
</svg>
